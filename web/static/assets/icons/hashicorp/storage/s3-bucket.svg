<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- S3 Bucket - Container/storage icon -->
  <defs>
    <style>
      .s3-main { fill: #FF9900; }
      .s3-accent { fill: #FFC169; }
      .s3-fg { fill: #FFFFFF; }
    </style>
  </defs>
  
  <!-- Front of bucket -->
  <rect x="12" y="24" width="40" height="28" rx="3" class="s3-main"/>
  
  <!-- Top of bucket (3D effect) -->
  <path d="M 12 24 L 18 16 L 54 16 L 48 24 Z" class="s3-accent"/>
  
  <!-- Handle -->
  <path d="M 20 16 Q 32 8 44 16" class="s3-fg" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Object dots inside -->
  <circle cx="28" cy="36" r="2.5" class="s3-fg"/>
  <circle cx="36" cy="36" r="2.5" class="s3-fg"/>
  <circle cx="44" cy="36" r="2.5" class="s3-fg"/>
  <circle cx="28" cy="46" r="2.5" class="s3-fg"/>
  <circle cx="36" cy="46" r="2.5" class="s3-fg"/>
</svg>
