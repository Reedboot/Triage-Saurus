<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Subnet - Smaller network container -->
  <defs>
    <style>
      .subnet-main { fill: none; stroke: #FF9900; stroke-width: 2.5; }
      .subnet-dots { fill: #FF9900; }
    </style>
  </defs>
  
  <!-- Outer rounded rectangle (VPC container) -->
  <rect x="8" y="12" width="48" height="40" rx="4" class="subnet-main"/>
  
  <!-- Inner rounded rectangle (Subnet) -->
  <rect x="16" y="20" width="32" height="24" rx="3" class="subnet-main"/>
  
  <!-- Network nodes inside subnet -->
  <circle cx="24" cy="28" r="2.5" class="subnet-dots"/>
  <circle cx="32" cy="28" r="2.5" class="subnet-dots"/>
  <circle cx="40" cy="28" r="2.5" class="subnet-dots"/>
  
  <circle cx="24" cy="36" r="2.5" class="subnet-dots"/>
  <circle cx="32" cy="36" r="2.5" class="subnet-dots"/>
  <circle cx="40" cy="36" r="2.5" class="subnet-dots"/>
  
  <!-- Connection lines -->
  <line x1="24" y1="28" x2="32" y2="28" stroke="#FF9900" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="28" x2="40" y2="28" stroke="#FF9900" stroke-width="1.5" opacity="0.6"/>
  <line x1="24" y1="28" x2="24" y2="36" stroke="#FF9900" stroke-width="1.5" opacity="0.6"/>
</svg>
