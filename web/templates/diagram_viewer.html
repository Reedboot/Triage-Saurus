<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ diagram_title }} - Architecture Diagram</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            color: #e0e0e0;
        }
        
        .container {
            max-width: none;
            width: 100%;
            height: 100vh;
            margin: 0;
            background: #2d2d2d;
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a8c 100%);
            color: white;
            padding: 20px 40px;
            text-align: center;
            flex-shrink: 0;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }
        
        .content {
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }
        
        .diagram-section {
            margin-bottom: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            flex: 1;
        }
        
        .diagram-section h2 {
            font-size: 1.8em;
            color: #e0e0e0;
            margin-bottom: 0;
            padding: 15px 40px;
            border-bottom: 3px solid #2d5a8c;
            flex-shrink: 0;
        }
        
        .mermaid {
            background: #1a1a1a;
            border-radius: 0;
            padding: 0;
            margin: 0;
            overflow: auto;
            width: 100%;
            flex: 1;
            min-height: auto;
        }
        
        .mermaid svg {
            cursor: grab;
        }
        
        .mermaid svg:active {
            cursor: grabbing;
        }
        
        .mermaid svg {
            width: 100% !important;
            height: auto !important;
            max-width: 100% !important;
            max-height: 100% !important;
            background: transparent !important;
        }
        
        .mermaid svg foreignObject {
            overflow: visible !important;
            height: auto !important;
            min-height: 120px !important;
        }
        
        .mermaid text {
            dominant-baseline: middle !important;
        }
        
        .diagram-description {
            background: #374550;
            padding: 20px 40px;
            border-radius: 0;
            border-left: 4px solid #2d5a8c;
            margin-bottom: 20px;
            margin: 0;
            line-height: 1.6;
            font-size: 1.05em;
            color: #d0d0d0;
        }
        
        .info-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .info-item {
            background: #374550;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #2d5a8c;
        }
        
        .info-label {
            font-size: 0.85em;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .info-value {
            font-size: 1.05em;
            color: #e0e0e0;
            font-weight: 500;
            margin-top: 6px;
        }
        
        .tech-stack-section {
            background: #374550;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #2d5a8c;
            margin-top: 30px;
        }
        
        .tech-stack-section strong {
            color: #d0d0d0;
            display: block;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        
        .tech-badge {
            display: inline-block;
            background: #2d5a8c;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-right: 8px;
            margin-top: 8px;
            vertical-align: middle;
        }
        
        .tech-badge img {
            vertical-align: middle;
            margin-right: 4px;
        }
        
        .footer {
            background: #374550;
            padding: 30px;
            text-align: center;
            border-top: 1px solid #444;
            font-size: 0.95em;
            color: #999;
        }
        
        .button-group {
            margin-top: 20px;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin-right: 10px;
            background: #2d5a8c;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.95em;
            border: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        .btn:hover {
            background: #1e3a5f;
        }
        
        .btn-secondary {
            background: #555;
            color: #e0e0e0;
        }
        
        .btn-secondary:hover {
            background: #666;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .content {
                padding: 20px;
            }
            
            .mermaid {
                padding: 15px;
                min-height: 400px;
            }
            
            .diagram-section h2 {
                font-size: 1.4em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗺️ {{ diagram_title }}</h1>
            <p>{{ description }}</p>
        </div>
        
        <div class="content">
            <div class="diagram-section">
                <h2>Architecture Overview</h2>
                
                <div class="diagram-description">
                    <strong>Experiment ID:</strong> {{ experiment_id }}<br>
                    <strong>Cloud Provider:</strong> {{ provider }}<br>
                    <strong>Icon Format:</strong> {{ icon_type }}
                </div>
                
                <div class="mermaid" id="diagram">
{{ mermaid_code | safe }}
                </div>
                
                <div class="button-group">
                    <a href="/" class="btn btn-secondary">← Back to Dashboard</a>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>Architecture diagram generated from cloud resource analysis</p>
        </div>
    </div>
    
    <script>
        mermaid.initialize({ 
            startOnLoad: true,
            theme: 'dark',
            securityLevel: 'loose',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                padding: 20,
                nodeSpacing: 100,
                rankSpacing: 100,
                curve: 'linear'
            }
        });
        mermaid.contentLoaded();
        
        // Add pan/zoom support via SVG manipulation after rendering
        document.addEventListener('DOMContentLoaded', function() {
            const svg = document.querySelector('.mermaid svg');
            if (!svg) return;
            
            let isPanning = false;
            let startX = 0;
            let startY = 0;
            let scrollLeft = 0;
            let scrollTop = 0;
            
            const container = document.querySelector('.mermaid');
            
            svg.addEventListener('mousedown', (e) => {
                isPanning = true;
                startX = e.pageX - container.offsetLeft;
                startY = e.pageY - container.offsetTop;
                scrollLeft = container.scrollLeft;
                scrollTop = container.scrollTop;
                svg.style.cursor = 'grabbing';
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isPanning) return;
                e.preventDefault();
                const x = e.pageX - container.offsetLeft;
                const y = e.pageY - container.offsetTop;
                const walkX = (x - startX);
                const walkY = (y - startY);
                container.scrollLeft = scrollLeft - walkX;
                container.scrollTop = scrollTop - walkY;
            });
            
            document.addEventListener('mouseup', () => {
                isPanning = false;
                svg.style.cursor = 'grab';
            });
            
            // Mousewheel zoom
            container.addEventListener('wheel', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    const scale = e.deltaY > 0 ? 0.9 : 1.1;
                    const currentScale = parseFloat(svg.getAttribute('data-scale') || 1);
                    const newScale = Math.min(5, Math.max(0.1, currentScale * scale));
                    svg.setAttribute('data-scale', newScale);
                    svg.style.transform = `scale(${newScale})`;
                    svg.style.transformOrigin = 'top left';
                }
            });
        });
    </script>
</body>
</html>
