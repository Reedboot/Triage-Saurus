<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triage-Saurus — Repo Scanner</title>
  <script src="/static/js/mermaid-loader.js"></script>
  <link rel="stylesheet" href="/static/app.css?v=3" />
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="/static/favicon.svg" />
  <link rel="apple-touch-icon" href="/static/favicon.svg" />


  <!-- Load icon injector for Mermaid diagrams -->
  <script src="/static/js/mermaid-icon-injector.js?v=2" defer></script>
</head>

<body>

  <header>
    <span class="dino">🦖</span>
    <h1>Triage-Saurus</h1>
    <span class="badge">Repo Scanner</span>
  </header>

  <div class="container">

    <!-- Scan form -->
    <div class="scan-card">
      <form id="scan-form" action="/scan" method="POST">
        <div class="form-row">
          <div class="field grow">
            <label for="repo-select">Repository</label>
            <select id="repo-select" name="repo_path" required>
              <option value="" disabled selected>— select a repository —</option>
              {% for repo in repos %}
              {% if repo.found %}
              <option value="{{ repo.path }}" data-name="{{ repo.name }}">{{ repo.name }} — {{ repo.path }}</option>
              {% else %}
              <option value="" disabled>No repos in Intake/ReposToScan.txt</option>
              {% endif %}
              {% endfor %}
            </select>
          </div>
          <div class="field compact">
            <label>&nbsp;</label>
            <button type="submit" id="scan-btn">▶ Run Scan</button>
          </div>

          <!-- Past scans row (shown when a repo with history is selected) -->
          <div class="past-scans-row" id="past-scans-row">
            <div class="row-inner">
              <span class="section-label">📁 Past Scans</span>
              <div class="field grow">
                <select id="past-scan-select">
                  <option value="" disabled selected>— select a past scan —</option>
                </select>
              </div>
            </div>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button type="button" class="btn-diagram" id="toggle-diagram-btn-persistent"
              title="Hide/show architecture diagram">Hide diagram</button>
          </div>

          <div class="field">
            <label>&nbsp;</label>
            <button type="button" class="btn-diagram" id="toggle-log-btn" title="Hide/show scan output">📜 Hide
              scan</button>
          </div>
        </div>
        <!-- Compare row (shown when Compare is clicked) -->

        <!-- Compare row: allow diffing two scans -->
        <div class="compare-row visible" id="compare-row">
          <div class="row-inner">
            <span class="section-label">🔁 Compare scans</span>
            <div class="field compact">
              <label for="compare-from-select">From</label>
              <select id="compare-from-select">
                <option value="" disabled selected>— select a scan —</option>
              </select>
            </div>
            <div class="field compact">
              <label for="compare-to-select">To</label>
              <select id="compare-to-select">
                <option value="" disabled selected>— select a scan —</option>
              </select>
            </div>
            <div class="field compact">
              <label>&nbsp;</label>
              <button type="button" id="run-compare-btn" class="btn-diagram">Run Compare</button>
            </div>
          </div>
        </div>





        <div class="status-bar" id="status-bar">
          <div class="spinner" id="spinner"></div>
          <span class="status-text" id="status-text">Starting…</span>
        </div>
      </form>
    </div>

    <!-- Workspace: log + diagram -->
    <div class="workspace">

      <!-- Log panel -->
      <div class="panel" id="log-panel">
        <div class="panel-header">
          <span class="panel-title">Scan Output</span>
          <div class="panel-actions">
            <button class="btn-small" id="toggle-log-autoscroll-btn" title="Pause auto-scroll">⏸ Auto-scroll</button>
            <button class="btn-small" id="copy-log-btn" title="Copy log">📋 Copy</button>
            <button class="btn-small" id="clear-log-btn" title="Clear log">🧹 Clear</button>
            <button class="btn-small" id="stop-ai-toolbar-btn" title="Stop AI scan" disabled hidden>⏹ Stop AI
              Scan</button>
            <button class="btn-small" id="toggle-sections-btn" title="Show sections">📑 Sections</button>
          </div>
        </div>

        <!-- Section tabs live inside the log panel (replaces raw log after scan completes) -->
        <div class="section-tab-bar" id="section-tab-bar">
          <span id="tab-bar-placeholder" style="padding:8px 14px;font-size:0.75rem;color:var(--text-faint)">
            Run or load a scan to see sections
          </span>
        </div>
        <div class="section-panel-content" id="section-panel-content">
          <div class="empty-state" id="section-placeholder">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 7h18M3 12h18M3 17h18" />
            </svg>
            <p>Run or load a scan to view<br />section details.</p>
          </div>

        </div>

        <div id="log-output"><span class="s-inline-0e3800">Scan output will appear here…</span></div>
      </div>

      <!-- Diagram panel: SPLIT LAYOUT (right=architecture) -->
      <div class="panel" id="diagram-panel">
        <div class="split-layout">

          <!-- RIGHT: Architecture diagram with zoom/pan -->
          <div class="split-right">
            <div class="right-panel-header">
              <span class="right-panel-title">Architecture</span>
              <div class="panel-actions">
                <button class="btn-small" id="zoom-in-btn" title="Zoom in">🔍+ Zoom</button>
                <button class="btn-small" id="zoom-out-btn" title="Zoom out">🔍- Zoom</button>
                <button class="btn-small" id="zoom-reset-btn" title="Reset / fit">🎯 Fit</button>
                <span id="zoom-level-display"
                  style="display: inline-block; min-width: 40px; text-align: center; font-size: 0.9em; color: var(--text-subtle);">100%</span>
                <button class="btn-small" id="refresh-diagram-btn" title="Refresh / re-render diagram">🔄
                  Refresh</button>
                <button class="btn-small" id="architecture-run-ai-btn"
                  title="Run AI against the architecture diagram and suggest code/rule changes">🤖 Run AI
                  (Architecture)</button>
                <button class="btn-small" id="toggle-api-ops-btn" title="API operation visibility mode">🧩 API ops: Auto
                  (&lt;10)</button>
                <button class="btn-small" id="copy-diagram-btn" title="Copy Mermaid source">📋 Copy source</button>
                <button class="btn-small" id="export-diagram-svg-btn"
                  title="Export diagram as SVG (scalable vector — ideal for zoom)">⬇ SVG</button>
                <button class="btn-small" id="export-diagram-png-btn" title="Export diagram as PNG image">⬇ PNG</button>
              </div>
            </div>
            <div class="diagram-tabs-panel">
              <div class="diagram-provider-tabs" id="diagram-tabs"></div>
            </div>
            <div class="diagram-zoom-wrap" id="diagram-zoom-wrap">
              <div class="diagram-zoom-inner" id="diagram-zoom-inner">
                <div id="diagram-views" class="diagram-views">
                  <div class="diagram-placeholder" id="diagram-placeholder">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                      stroke-width="1.5">
                      <rect x="3" y="3" width="7" height="7" />
                      <rect x="14" y="3" width="7" height="8" />
                      <rect x="3" y="14" width="7" height="7" />
                      <rect x="14" y="14" width="7" height="8" />
                    </svg>
                    <p>Architecture diagram will appear<br />after the scan completes.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- Scan confirmation modal -->
  <div id="scan-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h3 id="modal-title">Scan already in progress</h3>
      <p id="modal-message"></p>
      <div class="modal-buttons">
        <button id="modal-watch" class="modal-btn primary">👁 Watch Running Scan</button>
        <button id="modal-new" class="modal-btn">🔄 Start New Scan</button>
        <button id="modal-cancel" class="modal-btn cancel">✕ Cancel</button>
      </div>
    </div>
  </div>

  <!-- Modal styles -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="/static/table-resize.js" defer></script>
  <script src="/static/app.js?v=3" defer></script>
  <script src="/static/assets.js" defer></script>
  <script src="/static/findings.js" defer></script>
  <script src="/static/roles.js" defer></script>
  <script src="/static/overview.js" defer></script>
  <script src="/static/subscription.js" defer></script>
  <script src="/static/compare.js" defer></script>
  <script src="/static/open-questions.js" defer></script>
  <!-- Mermaid diagram library -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js" defer></script>
</body>

</html>
