<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triage-Saurus — Repo Scanner</title>
  <script>
    (function () {
      var mermaidLoaded = false;
      function loadScript(src, onload, onerror) {
        var s = document.createElement('script');
        s.src = src; s.defer = true;
        s.onload = function () { mermaidLoaded = true; if (onload) onload(); };
        s.onerror = function () { if (onerror) onerror(); };
        document.head.appendChild(s);
      }
      // Try local vendor first (works offline/intranet), then fall back to CDN
      loadScript('/static/vendor/mermaid.min.js', function () { console.info('mermaid loaded from /static/vendor'); }, function () {
        loadScript('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js', function () { console.info('mermaid loaded from CDN'); }, function () {
          console.warn('Mermaid library failed to load from vendor and CDN. Diagrams will not render.');
          try {
            var b = document.createElement('div');
            b.className = 'mermaid-error';
            b.textContent = 'Mermaid library unavailable — diagrams may not render. To fix: enable CDN access or place mermaid.min.js at /static/vendor/mermaid.min.js';
            b.style.cssText = 'position:fixed;bottom:8px;right:8px;background:#f44336;color:white;padding:8px;border-radius:6px;z-index:9999;font-size:12px;max-width:400px';
            document.body.appendChild(b);
          } catch (e) { }
        });
      });
    })();
  </script>
  <link rel="stylesheet" href="/static/app.css" />
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="/static/favicon.svg" />
  <link rel="apple-touch-icon" href="/static/favicon.svg" />
  <style>
    /* legacy: summary panels kept until full section-tabs migration */
    .diagram-views {
      min-height: 360px;
      overflow: auto;
    }

    .summary-tabs {
      display: none;
      gap: 4px;
      padding: 6px 12px 0;
      border-bottom: 1px solid #30363d;
      overflow-x: auto;
      flex-shrink: 0;
    }

    .summary-tabs.visible {
      display: flex;
    }

    .summary-tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #8b949e;
      font-size: 0.8rem;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .summary-tab-btn:hover:not(:disabled) {
      color: #c9d1d9;
    }

    .summary-tab-btn.active {
      color: #58a6ff;
      border-bottom-color: #58a6ff;
    }

    .summary-view {
      display: none;
      padding: 14px;
      overflow: auto;
    }

    .summary-view.active {
      display: block;
    }
  </style>
</head>

<body>

  <header>
    <span class="dino">🦖</span>
    <h1>Triage-Saurus</h1>
    <span class="badge">Repo Scanner</span>
  </header>

  <div class="container">

    <!-- Scan form -->
    <div class="scan-card">
      <h2>Scan</h2>
      <form id="scan-form">
        <div class="form-row">
          <div class="field grow">
            <label for="repo-select">Repository</label>
            <select id="repo-select" name="repo_path" required>
              <option value="" disabled selected>— select a repository —</option>
              {% for repo in repos %}
              {% if repo.found %}
              <option value="{{ repo.path }}" data-name="{{ repo.name }}">{{ repo.name }} — {{ repo.path }}</option>
              {% else %}
              <option value="" disabled class="not-found">{{ repo.name }} (not found locally)</option>
              {% endif %}
              {% else %}
              <option value="" disabled>No repos in Intake/ReposToScan.txt</option>
              {% endfor %}
            </select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button type="submit" id="scan-btn">▶ Run Scan</button>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button type="button" class="secondary s-inline-cb4589" id="reset-btn">↺ New Scan</button>
          </div>



          <!-- Past scans row (shown when a repo with history is selected) -->
          <div class="past-scans-row" id="past-scans-row">
            <div class="row-inner">
              <span class="section-label">📁 Past Scans</span>
              <div class="field grow">
                <select id="past-scan-select">
                  <option value="" disabled selected>— select a past scan —</option>
                </select>
              </div>

            </div>
          </div>
         <div class="field">
            <label>&nbsp;</label>
            <button type="button" class="btn-diagram" id="toggle-diagram-btn-persistent"
              title="Hide/show architecture diagram">Hide diagram</button>
          </div>
        </div>

        <!-- Compare row (shown when Compare is clicked) -->


        <div class="status-bar" id="status-bar">
          <div class="spinner" id="spinner"></div>
          <span class="status-text" id="status-text">Starting…</span>
        </div>
      </form>
    </div>

    <!-- Workspace: log + diagram -->
    <div class="workspace">

      <!-- Log panel -->
      <div class="panel" id="log-panel">
        <div class="panel-header">
          <span class="panel-title">Scan Output</span>
          <div class="panel-actions">
            <button class="btn-small" id="copy-log-btn" title="Copy log">Copy</button>
            <button class="btn-small" id="clear-log-btn" title="Clear log">Clear</button>
            <button class="btn-small" id="toggle-sections-btn" title="Show sections">Sections</button>
          </div>
        </div>

        <!-- Section tabs live inside the log panel (replaces raw log after scan completes) -->
        <div class="section-tab-bar" id="section-tab-bar">
          <span id="tab-bar-placeholder" style="padding:8px 14px;font-size:0.75rem;color:var(--text-faint)">
            Run or load a scan to see sections
          </span>
        </div>
        <div class="section-panel-content" id="section-panel-content">
          <div class="empty-state" id="section-placeholder">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 7h18M3 12h18M3 17h18" />
            </svg>
            <p>Run or load a scan to view<br />section details.</p>
          </div>

        </div>

        <div id="log-output"><span class="s-inline-0e3800">Scan output will appear here…</span></div>
      </div>

      <!-- Diagram panel: SPLIT LAYOUT (right=architecture) -->
      <div class="panel" id="diagram-panel">
        <div class="split-layout">

          <!-- RIGHT: Architecture diagram with zoom/pan -->
          <div class="split-right">
            <div class="right-panel-header">
              <span class="right-panel-title">Architecture</span>
              <div class="panel-actions">
                <div class="diagram-provider-tabs" id="diagram-tabs"
                  style="border:none;padding:0;background:transparent;"></div>
                <button class="btn-small" id="zoom-in-btn" title="Zoom in">＋</button>
                <button class="btn-small" id="zoom-out-btn" title="Zoom out">－</button>
                <button class="btn-small" id="zoom-reset-btn" title="Reset / fit">↺</button>
                <button class="btn-small" id="toggle-log-btn" title="Hide/show scan output">Hide log</button>
                <button class="btn-small" id="copy-diagram-btn" title="Copy Mermaid source">Copy source</button>
              </div>
            </div>
            <div class="diagram-zoom-wrap" id="diagram-zoom-wrap">
              <div class="diagram-zoom-inner" id="diagram-zoom-inner">
                <div id="diagram-views">
                  <div class="diagram-placeholder" id="diagram-placeholder">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                      stroke-width="1.5">
                      <rect x="3" y="3" width="7" height="7" />
                      <rect x="14" y="3" width="7" height="8" />
                      <rect x="3" y="14" width="7" height="7" />
                      <rect x="14" y="14" width="7" height="8" />
                    </svg>
                    <p>Architecture diagram will appear<br />after the scan completes.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <script src="/static/table-resize.js" defer></script>
  <script src="/static/app.js" defer></script>
  <script src="/static/assets.js" defer></script>
  <script src="/static/roles.js" defer></script>
  <!-- Direct fallback for mermaid if async loading fails -->
  <script src="/static/vendor/mermaid.min.js" defer></script>
</body>

</html>
