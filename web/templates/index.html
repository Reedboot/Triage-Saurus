<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triage-Saurus — Repo Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #58a6ff;
    }

    header .dino {
      font-size: 1.5rem;
      line-height: 1;
    }

    header span.badge {
      background: #388bfd26;
      color: #58a6ff;
      border: 1px solid #388bfd66;
      border-radius: 12px;
      font-size: 0.7rem;
      padding: 2px 8px;
    }

    .container {
      flex: 1;
      max-width: 1800px;
      width: 100%;
      margin: 0 auto;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Scan form ── */
    .scan-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
    }

    .scan-card h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field.grow { flex: 1; min-width: 200px; }

    label {
      font-size: 0.75rem;
      color: #8b949e;
      font-weight: 500;
    }

    select, input[type="text"] {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 0.85rem;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, input[type="text"]:focus { border-color: #58a6ff; }
    option.not-found { color: #484f58; }

    button[type="submit"], button.primary {
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 6px;
      color: #ffffff;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 7px 18px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button[type="submit"]:hover, button.primary:hover { background: #2ea043; }
    button[type="submit"]:disabled, button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

    button.secondary {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 0.85rem;
      padding: 7px 14px;
      cursor: pointer;
    }

    button.secondary:hover { background: #30363d; color: #c9d1d9; }

    /* ── Past scans row ── */
    .past-scans-row {
      display: none;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #21262d;
    }

    .past-scans-row.visible { display: flex; }

    .past-scans-row .row-inner {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: flex-end;
      width: 100%;
    }

    .past-scans-row .section-label {
      font-size: 0.72rem;
      color: #58a6ff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      align-self: flex-end;
      padding-bottom: 8px;
      white-space: nowrap;
    }

    /* ── Compare row ── */
    .compare-row {
      display: none;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #21262d;
    }

    .compare-row.visible { display: flex; }

    .compare-row .row-inner {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: flex-end;
      width: 100%;
    }

    /* ── Status bar ── */
    .status-bar {
      display: none;
      margin-top: 8px;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
    }

    .status-bar.visible { display: flex; }

    .status-text { color: #8b949e; }
    .status-text.success { color: #3fb950; }
    .status-text.error   { color: #f85149; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Workspace ── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 10px;
      flex: 1;
    }

    @media (max-width: 960px) { .workspace { grid-template-columns: 1fr; } }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 620px;
    }

    .panel-header {
      padding: 8px 12px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
      position: relative;
    }

    .panel-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .panel-actions { display: flex; gap: 6px; }

    /* Keep diagram panel actions visible when diagrams are very wide */
    #diagram-panel .panel { position: relative; }
    #diagram-panel .panel-actions { position: absolute; right: 12px; top: 8px; z-index: 50; }
    #diagram-panel .panel-header { padding-right: 160px; }

    .btn-small {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      font-size: 0.75rem;
      padding: 3px 8px;
      cursor: pointer;
    }

    .btn-small:hover { color: #c9d1d9; background: #30363d; }

    /* ── Log output ── */
    #log-output {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      padding: 8px 12px;
      max-height: 72vh;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      color: #8b949e;
      scrollbar-width: thin;
      scrollbar-color: #58a6ff #0d1117;
    }
    #log-output::-webkit-scrollbar { width: 12px; height: 12px; }
    #log-output::-webkit-scrollbar-track { background: transparent; }
    #log-output::-webkit-scrollbar-thumb { background: #1f6feb44; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
    #log-output::-webkit-scrollbar-thumb:hover { background: #1f6feb66; }

    #log-output .line-ok     { color: #3fb950; }
    #log-output .line-warn   { color: #e3b341; }
    #log-output .line-error  { color: #f85149; }
    #log-output .line-phase  { color: #58a6ff; font-weight: 600; }
    #log-output .line-done   { color: #3fb950; font-weight: 600; }
    #log-output .line-sep    { color: #30363d; }

    /* ── Diagram panel ── */
    #diagram-panel .panel-body {
      flex: 1;
      overflow: auto;
      padding: 14px;
    }

    .diagram-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 520px;
      color: #484f58;
      text-align: center;
      gap: 8px;
    }

    .diagram-placeholder svg { opacity: 0.3; }
    .diagram-placeholder p { font-size: 0.85rem; }

    .diagram-tabs {
      display: none;
      gap: 4px;
      padding: 6px 12px 0;
      border-bottom: 1px solid #30363d;
      overflow-x: auto;
      flex-shrink: 0;
    }

    .diagram-tabs.visible { display: flex; }

    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      color: #8b949e;
      font-size: 0.8rem;
      padding: 6px 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab-btn:hover:not(:disabled) { background: transparent; color: #c9d1d9; }
    .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }

    .diagram-view {
      display: none;
      padding: 14px;
    }

    .diagram-view.active { display: block; }

    .mermaid { overflow: auto; }

    .mermaid svg { background: transparent !important; }

    /* ── Side-by-side diff layout ── */
    .diff-side-by-side {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .diff-side {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px;
      overflow: auto;
    }

    .diff-side-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    /* ── Timeline ── */
    .diff-timeline {
      border-top: 1px solid #21262d;
      padding-top: 12px;
    }

    .diff-timeline h3 {
      font-size: 0.8rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .timeline-entry {
      margin-bottom: 12px;
      padding: 8px 12px;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 6px;
    }

    .timeline-scan-id {
      font-size: 0.72rem;
      font-weight: 700;
      color: #58a6ff;
      margin-bottom: 6px;
    }

    .change-item {
      font-size: 0.78rem;
      line-height: 1.7;
      padding-left: 4px;
    }

    .change-new     { color: #f0883e; }
    .change-resolved { color: #3fb950; }
    .change-added   { color: #3fb950; }
    .change-removed { color: #f85149; }

    .no-changes {
      font-size: 0.82rem;
      color: #484f58;
      text-align: center;
      padding: 24px 0;
    }

    /* ── Panel-level nav tabs (Architecture | Assets) ── */
    .panel-nav {
      display: flex;
      gap: 2px;
    }

    .panel-nav-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #8b949e;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 4px 12px;
      cursor: pointer;
      border-radius: 4px 4px 0 0;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .panel-nav-btn:hover { color: #c9d1d9; }
    .panel-nav-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; font-weight: 600; }

    .panel-section { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
    .panel-section.hidden { display: none; }

    /* ── Assets section ── */
    #assets-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .assets-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #21262d;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .assets-search {
      flex: 1;
      min-width: 140px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 0.8rem;
      padding: 5px 10px;
      outline: none;
    }

    .assets-search:focus { border-color: #58a6ff; }

    .assets-provider-filter {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 0.8rem;
      padding: 5px 8px;
      outline: none;
    }

    .assets-summary {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 8px 12px;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
    }

    .provider-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 12px;
      font-size: 0.72rem;
      padding: 2px 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .provider-badge:hover { border-color: #58a6ff; color: #c9d1d9; }
    .provider-badge.active { border-color: #58a6ff; background: #1f3a5f; color: #58a6ff; }

    .provider-badge .prov-count {
      background: #30363d;
      border-radius: 8px;
      padding: 0 5px;
      font-size: 0.68rem;
      color: #8b949e;
    }

    .provider-badge.active .prov-count {
      background: #1f6feb44;
      color: #79c0ff;
    }

    .assets-table-wrap {
      flex: 1;
      overflow: auto;
      padding: 0 12px 12px;
      max-height: 72vh;
      scrollbar-width: thin;
      scrollbar-color: #58a6ff #0d1117;
    }

    .assets-table-wrap::-webkit-scrollbar { width: 12px; height: 12px; }
    .assets-table-wrap::-webkit-scrollbar-track { background: transparent; }
    .assets-table-wrap::-webkit-scrollbar-thumb { background: #1f6feb44; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
    .assets-table-wrap::-webkit-scrollbar-thumb:hover { background: #1f6feb66; }

    .assets-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
    }

    .assets-table thead th {
      position: sticky;
      top: 0;
      background: #161b22;
      color: #8b949e;
      font-weight: 600;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 8px 8px 6px;
      text-align: left;
      border-bottom: 1px solid #30363d;
      white-space: nowrap;
    }

    .assets-table tbody tr {
      border-bottom: 1px solid #21262d;
      transition: background 0.1s;
    }

    .assets-table tbody tr:hover { background: #1c2129; }

    .assets-table td {
      padding: 6px 8px;
      vertical-align: middle;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .asset-type-badge {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.7rem;
      color: #79c0ff;
      background: #1f3a5f33;
      border-radius: 3px;
      padding: 1px 5px;
    }

    .asset-name { color: #c9d1d9; font-weight: 500; }

    .prov-pill {
      font-size: 0.68rem;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .prov-pill.azure   { background: #0078d433; color: #79c0ff; border: 1px solid #0078d466; }
    .prov-pill.aws     { background: #ff990033; color: #e3b341; border: 1px solid #ff990066; }
    .prov-pill.gcp     { background: #34a85333; color: #3fb950; border: 1px solid #34a85366; }
    .prov-pill.oracle  { background: #f8000033; color: #f85149; border: 1px solid #f8000066; }
    .prov-pill.alicloud { background: #ff6a0033; color: #ffa657; border: 1px solid #ff6a0066; }
    .prov-pill.unknown { background: #21262d;   color: #8b949e; border: 1px solid #30363d; }

    .file-link {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.7rem;
      color: #8b949e;
      cursor: default;
    }

    .line-num {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.7rem;
      color: #484f58;
    }

    .how-badge {
      font-size: 0.68rem;
      padding: 2px 6px;
      border-radius: 10px;
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
    }

    .finding-badge {
      font-size: 0.68rem;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 600;
    }

    .finding-badge.none  { color: #3fb950; }
    .finding-badge.info  { background: #1f3a5f33; color: #79c0ff; border: 1px solid #1f6feb44; }
    .finding-badge.low   { background: #e3b34122; color: #e3b341; border: 1px solid #e3b34144; }
    .finding-badge.medium { background: #ffa65722; color: #ffa657; border: 1px solid #ffa65744; }
    .finding-badge.high  { background: #f8514922; color: #f85149; border: 1px solid #f8514944; }
    .finding-badge.critical { background: #f8514944; color: #ff7b72; border: 1px solid #f85149; }

    .assets-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 520px;
      color: #484f58;
      text-align: center;
      gap: 8px;
    }

    .assets-placeholder p { font-size: 0.85rem; }

    .assets-empty {
      text-align: center;
      padding: 40px;
      color: #484f58;
      font-size: 0.82rem;
    }

    .asset-why-icon {
      cursor: help;
      font-size: 0.8rem;
    }

    /* Diagram zoom & scrolling */
    .diagram-view { overflow: auto; }
    .diagram-view .mermaid { transform-origin: 0 0; transition: transform 0.12s ease; }
    .diagram-views { min-height: 360px; overflow: auto; }
  </style>
</head>
<body>

<header>
  <span class="dino">🦕</span>
  <h1>Triage-Saurus</h1>
  <span class="badge">Repo Scanner</span>
</header>

<div class="container">

  <!-- Scan form -->
  <div class="scan-card">
    <h2>Scan</h2>
    <form id="scan-form">
      <div class="form-row">
        <div class="field grow">
          <label for="repo-select">Repository</label>
          <select id="repo-select" name="repo_path" required>
            <option value="" disabled selected>— select a repository —</option>
            {% for repo in repos %}
              {% if repo.found %}
                <option value="{{ repo.path }}" data-name="{{ repo.name }}">{{ repo.name }} — {{ repo.path }}</option>
              {% else %}
                <option value="" disabled class="not-found">{{ repo.name }} (not found locally)</option>
              {% endif %}
            {% else %}
              <option value="" disabled>No repos in Intake/ReposToScan.txt</option>
            {% endfor %}
          </select>
        </div>
        <div class="field" style="min-width:160px">
          <label for="scan-name">Scan name</label>
          <input type="text" id="scan-name" name="scan_name"
                 placeholder="web_scan" value="web_scan"
                 autocomplete="off" />
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button type="submit" id="scan-btn">▶ Run Scan</button>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button type="button" class="secondary" id="reset-btn" style="display:none">↺ New Scan</button>
        </div>
      </div>

      <!-- Past scans row (shown when a repo with history is selected) -->
      <div class="past-scans-row" id="past-scans-row">
        <div class="row-inner">
          <span class="section-label">📁 Past Scans</span>
          <div class="field grow">
            <label for="past-scan-select">Load previous result</label>
            <select id="past-scan-select">
              <option value="" disabled selected>— select a past scan —</option>
            </select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button type="button" class="secondary" id="load-scan-btn">📂 Load</button>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button type="button" class="secondary" id="compare-toggle-btn">↔ Compare</button>
          </div>
        </div>
      </div>

      <!-- Compare row (shown when Compare is clicked) -->
      <div class="compare-row" id="compare-row">
        <div class="row-inner">
          <span class="section-label">↔ Compare</span>
          <div class="field" style="min-width:180px">
            <label for="compare-from">From scan</label>
            <select id="compare-from">
              <option value="" disabled selected>— from —</option>
            </select>
          </div>
          <div class="field" style="min-width:180px">
            <label for="compare-to">To scan</label>
            <select id="compare-to">
              <option value="" disabled selected>— to —</option>
            </select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button type="button" class="primary" id="run-compare-btn">📊 Compare</button>
          </div>
        </div>
      </div>

      <div class="status-bar" id="status-bar">
        <div class="spinner" id="spinner"></div>
        <span class="status-text" id="status-text">Starting…</span>
      </div>
    </form>
  </div>

  <!-- Workspace: log + diagram -->
  <div class="workspace">

    <!-- Log panel -->
    <div class="panel" id="log-panel">
      <div class="panel-header">
        <span class="panel-title">Scan Output</span>
        <div class="panel-actions">
          <button class="btn-small" id="copy-log-btn" title="Copy log">Copy</button>
          <button class="btn-small" id="clear-log-btn" title="Clear log">Clear</button>
        </div>
      </div>
      <div id="log-output"><span style="color:#484f58">Scan output will appear here…</span></div>
    </div>

    <!-- Diagram panel -->
    <div class="panel" id="diagram-panel">
      <div class="panel-header">
        <div class="panel-nav">
          <button class="panel-nav-btn active" id="nav-arch-btn">🏗 Architecture</button>
          <button class="panel-nav-btn" id="nav-assets-btn">📦 Assets <span id="assets-nav-count" style="font-weight:400;color:#484f58"></span></button>
        </div>
        <div class="panel-actions">
          <button class="btn-small" id="zoom-in-btn" title="Zoom in">＋</button>
          <button class="btn-small" id="zoom-out-btn" title="Zoom out">－</button>
          <button class="btn-small" id="zoom-reset-btn" title="Reset zoom">Reset</button>
          <button class="btn-small" id="toggle-log-btn" title="Hide/Show scan output">Toggle log</button>
          <button class="btn-small" id="copy-diagram-btn" title="Copy Mermaid source">Copy source</button>
        </div>
      </div>

      <!-- Architecture section -->
      <div id="panel-arch" class="panel-section">
        <div class="diagram-tabs" id="diagram-tabs"></div>
        <div id="diagram-views">
          <div class="diagram-placeholder" id="diagram-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="8"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="8"/>
            </svg>
            <p>Architecture diagram will appear<br/>after the scan completes.</p>
          </div>
        </div>
      </div>

      <!-- Assets section -->
      <div id="panel-assets" class="panel-section hidden">
        <div id="assets-summary" class="assets-summary" style="display:none"></div>
        <div class="assets-toolbar" id="assets-toolbar" style="display:none">
          <input type="text" class="assets-search" id="assets-search" placeholder="Filter assets…" autocomplete="off" />
          <select class="assets-provider-filter" id="assets-provider-filter">
            <option value="">All providers</option>
          </select>
        </div>
        <div class="assets-table-wrap" id="assets-table-wrap">
          <div class="assets-placeholder" id="assets-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 7h18M3 12h18M3 17h18"/>
            </svg>
            <p>Select a repository to view<br/>its detected assets.</p>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
  const MERMAID_BASE_CONFIG = {
    startOnLoad: false,
    theme: 'dark',
    securityLevel: 'loose',
    flowchart: { curve: 'basis', useMaxWidth: false },
  };
  mermaid.initialize(MERMAID_BASE_CONFIG);

  const form            = document.getElementById('scan-form');
  const repoSelect      = document.getElementById('repo-select');
  const nameInput       = document.getElementById('scan-name');
  const scanBtn         = document.getElementById('scan-btn');
  const resetBtn        = document.getElementById('reset-btn');
  const statusBar       = document.getElementById('status-bar');
  const statusText      = document.getElementById('status-text');
  const spinner         = document.getElementById('spinner');
  const logOutput       = document.getElementById('log-output');
  const tabsEl          = document.getElementById('diagram-tabs');
  const viewsEl         = document.getElementById('diagram-views');
  const placeholder     = document.getElementById('diagram-placeholder');
  const copyDiagramBtn  = document.getElementById('copy-diagram-btn');
  const zoomInBtn       = document.getElementById('zoom-in-btn');
  const zoomOutBtn      = document.getElementById('zoom-out-btn');
  const zoomResetBtn    = document.getElementById('zoom-reset-btn');
  const toggleLogBtn    = document.getElementById('toggle-log-btn');

  // Zoom state
  let zoomLevel = 1;
  const ZOOM_STEP = 0.1, ZOOM_MIN = 0.2, ZOOM_MAX = 3;

  const pastScansRow    = document.getElementById('past-scans-row');
  const pastScanSelect  = document.getElementById('past-scan-select');
  const loadScanBtn     = document.getElementById('load-scan-btn');
  const compareToggle   = document.getElementById('compare-toggle-btn');
  const compareRow      = document.getElementById('compare-row');
  const compareFrom     = document.getElementById('compare-from');
  const compareTo       = document.getElementById('compare-to');
  const runCompareBtn   = document.getElementById('run-compare-btn');

  const navArchBtn      = document.getElementById('nav-arch-btn');
  const navAssetsBtn    = document.getElementById('nav-assets-btn');
  const panelArch       = document.getElementById('panel-arch');
  const panelAssets     = document.getElementById('panel-assets');
  const assetsNavCount  = document.getElementById('assets-nav-count');
  const assetsSummary   = document.getElementById('assets-summary');
  const assetsToolbar   = document.getElementById('assets-toolbar');
  const assetsSearch    = document.getElementById('assets-search');
  const assetsProvFilter= document.getElementById('assets-provider-filter');
  const assetsTableWrap = document.getElementById('assets-table-wrap');
  const assetsPlaceholder = document.getElementById('assets-placeholder');

  // Diagram state
  let diagrams = [];
  let activeTab = 0;
  let currentRepoName = '';

  // Assets state
  let allAssets = [];
  let activeProviderFilter = '';

  // ── Panel nav (Architecture ↔ Assets) ────────────────────────────────────────
  function switchPanel(panel) {
    const isArch = panel === 'arch';
    navArchBtn.classList.toggle('active', isArch);
    navAssetsBtn.classList.toggle('active', !isArch);
    panelArch.classList.toggle('hidden', !isArch);
    panelAssets.classList.toggle('hidden', isArch);
    copyDiagramBtn.style.display = isArch ? '' : 'none';
  }

  navArchBtn.addEventListener('click', () => switchPanel('arch'));
  navAssetsBtn.addEventListener('click', () => switchPanel('assets'));

  // Zoom & log controls
  if (zoomInBtn) zoomInBtn.addEventListener('click', () => { zoomLevel = Math.min(ZOOM_MAX, +(zoomLevel + ZOOM_STEP).toFixed(2)); applyZoomToActive(); });
  if (zoomOutBtn) zoomOutBtn.addEventListener('click', () => { zoomLevel = Math.max(ZOOM_MIN, +(zoomLevel - ZOOM_STEP).toFixed(2)); applyZoomToActive(); });
  if (zoomResetBtn) zoomResetBtn.addEventListener('click', () => { zoomLevel = 1; applyZoomToActive(); });
  if (toggleLogBtn) {
    // initial label
    toggleLogBtn.textContent = 'Hide log';
    toggleLogBtn.addEventListener('click', () => {
      const lp = document.getElementById('log-panel');
      if (!lp) return;
      if (lp.style.display === 'none') {
        lp.style.display = '';
        toggleLogBtn.textContent = 'Hide log';
      } else {
        lp.style.display = 'none';
        toggleLogBtn.textContent = 'Show log';
      }
    });
  }

  function applyZoomToActive() {
    const node = viewsEl.querySelector('.diagram-view.active .mermaid');
    if (!node) return;
    try { node.style.transform = `scale(${zoomLevel})`; } catch (e) { /* ignore */ }
  }

  // ── Assets helpers ──────────────────────────────────────────────────────────

  const PROVIDER_META = {
    azure:    { label: 'Azure',    icon: '☁️' },
    aws:      { label: 'AWS',      icon: '🟧' },
    gcp:      { label: 'GCP',      icon: '🔵' },
    oracle:   { label: 'Oracle',   icon: '🔴' },
    alicloud: { label: 'AliCloud', icon: '🟠' },
    unknown:  { label: 'Unknown',  icon: '❓' },
  };

  // Map resource type prefixes to a human-readable "why" tooltip
  function _resourceWhy(resourceType) {
    const t = (resourceType || '').toLowerCase();
    if (/key_vault|secret|kms|ssm.*param|secret_manager/.test(t))
      return 'Secrets & key management — high sensitivity';
    if (/storage|bucket|blob|s3|gcs/.test(t))
      return 'Object storage — potential data exposure';
    if (/sql|database|mysql|postgres|mssql|cosmosdb|dynamo|rds/.test(t))
      return 'Database — contains persistent data';
    if (/virtual_machine|instance|ec2|compute/.test(t))
      return 'Compute instance — potential attack surface';
    if (/aks|kubernetes|k8s|gke|eks/.test(t))
      return 'Container orchestration — broad blast radius';
    if (/application_gateway|load_balancer|alb|elb|waf/.test(t))
      return 'Internet-facing ingress — public exposure';
    if (/network|subnet|vnet|vpc|security_group|nsg|firewall/.test(t))
      return 'Network layer — controls traffic flow';
    if (/iam|role|policy|permission|identity|service_account/.test(t))
      return 'Identity & access — privilege escalation risk';
    if (/monitor|log|audit|diagnostic|siem/.test(t))
      return 'Logging & monitoring — visibility control';
    if (/function|lambda|app_service|web_app/.test(t))
      return 'Serverless / PaaS compute';
    if (/cdn|cloudfront|frontdoor/.test(t))
      return 'Content delivery — public edge';
    if (/dns|route53|traffic_manager/.test(t))
      return 'DNS — domain routing control';
    return 'Infrastructure resource';
  }

  function _findingBadgeClass(worstSeverity, count) {
    if (!count) return 'none';
    const s = (worstSeverity || '').toLowerCase();
    if (s === 'critical') return 'critical';
    if (s === 'high')     return 'high';
    if (s === 'medium')   return 'medium';
    if (s === 'low')      return 'low';
    return 'info';
  }

  function _shortFile(filePath) {
    if (!filePath) return '—';
    // Show last two path segments
    const parts = filePath.replace(/\\/g, '/').split('/');
    return parts.length > 2 ? '…/' + parts.slice(-2).join('/') : filePath;
  }

  function _howLabel(discoveredBy, discoveryMethod) {
    const method = (discoveryMethod || '').toLowerCase();
    if (method === 'terraform') return 'Terraform HCL';
    if (method.includes('arm'))  return 'ARM Template';
    if (method.includes('bicep')) return 'Bicep';
    if (method.includes('connection')) return 'Connection String';
    if (method.includes('k8s') || method.includes('kubernetes')) return 'Kubernetes YAML';
    if (discoveredBy) return discoveredBy.replace('Agent', '').trim();
    return method || '—';
  }

  function renderAssetsTable(assets) {
    // Remove old table
    assetsTableWrap.querySelectorAll('table, .assets-empty').forEach(el => el.remove());

    if (!assets.length) {
      const empty = document.createElement('div');
      empty.className = 'assets-empty';
      empty.textContent = 'No assets match the current filter.';
      assetsTableWrap.appendChild(empty);
      return;
    }

    const table = document.createElement('table');
    table.className = 'assets-table';

    const thead = document.createElement('thead');
    thead.innerHTML = `<tr>
      <th>Provider</th>
      <th>Resource Type</th>
      <th>Name</th>
      <th>Source File</th>
      <th title="Line number in source file">Line</th>
      <th title="How this asset was detected">How Detected</th>
      <th title="Why this asset matters">Why</th>
      <th title="Security findings linked to this asset">Findings</th>
    </tr>`;
    table.appendChild(thead);

    const tbody = document.createElement('tbody');

    for (const a of assets) {
      const prov = (a.provider || 'unknown').toLowerCase();
      const meta = PROVIDER_META[prov] || PROVIDER_META.unknown;
      const why = _resourceWhy(a.resource_type);
      const howText = _howLabel(a.discovered_by, a.discovery_method);
      const findCls = _findingBadgeClass(a.worst_severity, a.finding_count);
      const findLabel = a.finding_count
        ? `${a.finding_count} ${a.worst_severity || ''}`
        : '✓ none';

      const shortType = (a.resource_type || '')
        .replace(/^azurerm_|^aws_|^google_|^oci_|^alicloud_/, '');

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="prov-pill ${prov}" title="${meta.label}">${meta.icon} ${meta.label}</span></td>
        <td><span class="asset-type-badge" title="${a.resource_type}">${shortType}</span></td>
        <td class="asset-name" title="${a.resource_type || ''}">${shortType}: ${a.resource_name || '—'}</td>
        <td><span class="file-link" title="${a.source_file || ''}">${_shortFile(a.source_file)}</span></td>
        <td class="line-num">${a.source_line_start || '—'}</td>
        <td><span class="how-badge" title="Discovered by: ${a.discovered_by || '—'}\nMethod: ${a.discovery_method || '—'}">${howText}</span></td>
        <td><span class="asset-why-icon" title="${why}">ℹ️ ${why.split('—')[0].trim()}</span></td>
        <td><span class="finding-badge ${findCls}">${findLabel}</span></td>
      `;
      tbody.appendChild(tr);
    }

    table.appendChild(tbody);
    assetsPlaceholder.style.display = 'none';
    assetsTableWrap.appendChild(table);
  }

  function applyAssetsFilter() {
    const query = (assetsSearch.value || '').toLowerCase().trim();
    const prov  = (assetsProvFilter.value || '').toLowerCase();

    let filtered = allAssets;
    if (prov) {
      filtered = filtered.filter(a => (a.provider || '').toLowerCase() === prov);
    }
    if (query) {
      filtered = filtered.filter(a =>
        (a.resource_type || '').toLowerCase().includes(query) ||
        (a.resource_name || '').toLowerCase().includes(query) ||
        (a.source_file   || '').toLowerCase().includes(query)
      );
    }
    renderAssetsTable(filtered);
  }

  function renderAssetsSummary(byProvider, total) {
    assetsNavCount.textContent = total ? `(${total})` : '';
    assetsSummary.innerHTML = '';

    // All badge
    const allBadge = document.createElement('span');
    allBadge.className = 'provider-badge' + (!activeProviderFilter ? ' active' : '');
    allBadge.dataset.prov = '';
    allBadge.innerHTML = `All <span class="prov-count">${total}</span>`;
    allBadge.addEventListener('click', () => {
      activeProviderFilter = '';
      assetsProvFilter.value = '';
      assetsSummary.querySelectorAll('.provider-badge').forEach(b =>
        b.classList.toggle('active', b.dataset.prov === ''));
      applyAssetsFilter();
    });
    assetsSummary.appendChild(allBadge);

    for (const [prov, count] of Object.entries(byProvider).sort((a, b) => b[1] - a[1])) {
      const meta = PROVIDER_META[prov] || PROVIDER_META.unknown;
      const badge = document.createElement('span');
      badge.className = 'provider-badge' + (activeProviderFilter === prov ? ' active' : '');
      badge.dataset.prov = prov;
      badge.innerHTML = `${meta.icon} ${meta.label} <span class="prov-count">${count}</span>`;
      badge.addEventListener('click', () => {
        activeProviderFilter = prov;
        assetsProvFilter.value = prov;
        assetsSummary.querySelectorAll('.provider-badge').forEach(b =>
          b.classList.toggle('active', b.dataset.prov === prov));
        applyAssetsFilter();
      });
      assetsSummary.appendChild(badge);
    }

    assetsSummary.style.display = 'flex';
    assetsToolbar.style.display = 'flex';
  }

  async function loadAssets(repoName, experimentId) {
    if (!repoName) return;
    allAssets = [];
    renderAssetsTable([]);
    assetsPlaceholder.style.display = '';
    assetsPlaceholder.innerHTML = '<p style="color:#484f58">Loading assets…</p>';
    assetsSummary.style.display = 'none';
    assetsToolbar.style.display = 'none';
    assetsNavCount.textContent = '';

    try {
      let url = `/api/assets/${encodeURIComponent(repoName)}`;
      if (experimentId) url += `?experiment_id=${encodeURIComponent(experimentId)}`;
      const resp = await fetch(url);
      const data = await resp.json();

      if (data.error && !data.assets?.length) {
        assetsPlaceholder.innerHTML = `<p style="color:#f85149">Error: ${data.error}</p>`;
        return;
      }

      allAssets = data.assets || [];

      // Filter out identity-only resources (roles, policies, service accounts) by default — these clutter the view.
      const identityPattern = /iam|role|policy|permission|identity|service_account|serviceaccount|serviceprincipal|profile/i;
      const originalCount = allAssets.length;
      allAssets = allAssets.filter(a => {
        const combined = ((a.resource_type || '') + ' ' + (a.resource_name || '')).toLowerCase();
        return !identityPattern.test(combined);
      });

      activeProviderFilter = '';
      assetsProvFilter.innerHTML = '<option value="">All providers</option>';
      for (const prov of Object.keys(data.by_provider || {}).sort()) {
        const opt = document.createElement('option');
        opt.value = prov;
        const meta = PROVIDER_META[prov] || PROVIDER_META.unknown;
        opt.textContent = meta.label;
        assetsProvFilter.appendChild(opt);
      }

      if (allAssets.length) {
        renderAssetsSummary(data.by_provider || {}, data.total || allAssets.length);
        assetsPlaceholder.style.display = 'none';
        applyAssetsFilter();
      } else {
        assetsPlaceholder.style.display = '';
        if (originalCount && !allAssets.length) {
          assetsPlaceholder.innerHTML = '<p style="color:#484f58">No visible assets after filtering (identity-only assets are hidden by default).</p>';
        } else {
          assetsPlaceholder.innerHTML = '<p style="color:#484f58">No assets found for this scan.</p>';
        }
      }
    } catch (err) {
      assetsPlaceholder.innerHTML = `<p style="color:#f85149">Failed to load assets: ${err}</p>`;
    }
  }

  assetsSearch.addEventListener('input', applyAssetsFilter);
  assetsProvFilter.addEventListener('change', () => {
    activeProviderFilter = assetsProvFilter.value.toLowerCase();
    // Sync summary badges
    assetsSummary.querySelectorAll('.provider-badge').forEach(b =>
      b.classList.toggle('active', b.dataset.prov === activeProviderFilter));
    applyAssetsFilter();
  });

  // ── Log helpers ─────────────────────────────────────────────────────────────
  function classifyLine(line) {
    if (/^─+$/.test(line) || /^={3,}/.test(line)) return 'line-sep';
    if (/\[ERROR\]|✗|error/i.test(line))           return 'line-error';
    if (/\[WARN\]|WARNING/i.test(line))             return 'line-warn';
    if (/^▶|Phase \d|Pipeline|Rendering|Experiment/i.test(line)) return 'line-phase';
    if (/✓|✅|complete|success/i.test(line))        return 'line-ok';
    if (/\[Web\]/.test(line))                       return 'line-done';
    return '';
  }

  function appendLog(line) {
    const wasEmpty = logOutput.querySelector('span[style]');
    if (wasEmpty) logOutput.innerHTML = '';
    const span = document.createElement('span');
    const cls = classifyLine(line);
    if (cls) span.className = cls;
    span.textContent = line + '\n';
    logOutput.appendChild(span);
    logOutput.scrollTop = logOutput.scrollHeight;
  }

  // ── Diagram rendering ────────────────────────────────────────────────────────
  async function _runMermaid(nodes) {
    // Render each node individually so one bad diagram can't block the others.
    async function tryRender(node, config) {
      try {
        mermaid.initialize(config);
        await mermaid.run({ nodes: [node] });
        // Apply current zoom level so rendered SVG scales appropriately
        try { node.style.transform = `scale(${zoomLevel})`; } catch (e) { /* ignore */ }
        return null;
      } catch (e) {
        return e;
      }
    }

    for (const node of nodes) {
      const origText = node.textContent || '';
      let lastErr = null;

      // Attempt 1: base config
      let err = await tryRender(node, MERMAID_BASE_CONFIG);
      if (!err) continue;
      lastErr = err;

      // Attempt 2: linear curve
      const cfgLinear = JSON.parse(JSON.stringify(MERMAID_BASE_CONFIG));
      cfgLinear.flowchart = Object.assign({}, cfgLinear.flowchart, { curve: 'linear' });
      err = await tryRender(node, cfgLinear);
      if (!err) continue;
      lastErr = err;

      // Attempt 3: useMaxWidth true
      const cfgMax = JSON.parse(JSON.stringify(MERMAID_BASE_CONFIG));
      cfgMax.flowchart = Object.assign({}, cfgMax.flowchart, { useMaxWidth: true });
      err = await tryRender(node, cfgMax);
      if (!err) continue;
      lastErr = err;

      // Attempt 4: remove edge labels and try base config again
      const stripped = sanitizeMermaid(origText.replace(/\|[^|]*\|/g, ''));
      node.textContent = stripped;
      err = await tryRender(node, MERMAID_BASE_CONFIG);
      if (!err) continue;
      lastErr = err;

      // Restore original sanitized content and show error
      node.textContent = sanitizeMermaid(origText);
      node.innerHTML = `<div style="color:#f85149;font-size:0.78rem;padding:12px;font-family:monospace;white-space:pre-wrap">⚠ Diagram parse error:\n${(lastErr && lastErr.message) || lastErr}</div>`;
      console.error('Mermaid render error:', lastErr);
    }

    // Restore base config after attempts
    try { mermaid.initialize(MERMAID_BASE_CONFIG); } catch (e) { /* ignore */ }
  }

  // Sanitize Mermaid source to fix common issues emitted by generator
  function sanitizeMermaid(src) {
    if (!src || typeof src !== 'string') return src;
    let s = src;
    // Hyphenate known underscored CSS props
    s = s.replace(/stroke_width/g, 'stroke-width')
         .replace(/stroke_dasharray/g, 'stroke-dasharray')
         .replace(/stroke_opacity/g, 'stroke-opacity')
         .replace(/fill_opacity/g, 'fill-opacity')
         .replace(/font_size/g, 'font-size')
         .replace(/font_weight/g, 'font-weight')
         .replace(/text_anchor/g, 'text-anchor')
         .replace(/line_height/g, 'line-height');
    // Remove invisible variation selectors
    s = s.replace(/\uFE0F/g, '');
    // Replace & inside quoted labels with 'and'
    s = s.replace(/"([^"\\]*(?:\\.[^"\\]*)*)"/g, (m, g1) => '"' + g1.replace(/&/g, 'and') + '"');
    // Convert space-separated stroke-dasharray values to comma-separated
    s = s.replace(/stroke-dasharray\s*:\s*(\d+(?:\.\d+)?)\s+(\d+(?:\.\d+)?)/g, (m, a, b) => `stroke-dasharray:${a},${b}`);
    // Remove px units from numeric stroke widths (Mermaid prefers numbers)
    s = s.replace(/stroke-width\s*:\s*(\d+)px/g, 'stroke-width:$1');
    // Remove linkStyle lines which can reference out-of-range indices and crash the renderer
    s = s.replace(/^\s*linkStyle\s+\d+[^\n]*\n/gm, '');

    // Remove explicit "contains" edges: containment should be represented via subgraphs
    s = s.split('\n').filter(line => !/\bcontains\b/i.test(line)).join('\n');

    // Remove self-edges (node linking to itself) which add clutter
    const lines = s.split('\n');
    const filtered = [];
    for (let line of lines) {
      if (/[-.]+>/.test(line)) {
        const parts = line.split(/[-.]+>/);
        if (parts.length >= 2) {
          const left = parts[0].replace(/["'`\[\]\(\)\{\}\s]/g, '').trim().toLowerCase();
          const right = parts[1].replace(/["'`\[\]\(\)\{\}\s:].*$/g, '').replace(/["'`\[\]\(\)\{\}\s]/g, '').trim().toLowerCase();
          if (left && right && left === right) {
            // skip self-edge
            continue;
          }
        }
      }
      filtered.push(line);
    }
    s = filtered.join('\n');

    // Deduplicate subgraph blocks, node definitions and style lines which often
    // occur repeatedly in generated output and can confuse the renderer.
    const linesArr = s.split('\n');
    const out = [];
    const seenSubgraphs = new Set();
    const seenNodes = new Set();
    const seenStyles = new Set();
    let skipSubgraph = 0;

    for (let i = 0; i < linesArr.length; i++) {
      const line = linesArr[i];
      const trimmed = line.trim();

      if (skipSubgraph > 0) {
        if (/^\s*end\s*$/i.test(trimmed)) {
          skipSubgraph -= 1;
        }
        continue;
      }

      // subgraph <id>[Label]
      const subMatch = trimmed.match(/^subgraph\s+([^\s\[]+)/i);
      if (subMatch) {
        const id = subMatch[1];
        if (seenSubgraphs.has(id)) {
          // skip until the matching 'end'
          skipSubgraph = 1;
          continue;
        }
        seenSubgraphs.add(id);
        out.push(line);
        continue;
      }

      // node definition like: nodeId[Label] or nodeId("Label")
      const nodeMatch = trimmed.match(/^([^\s\[]+)\s*(?:\[\[|\[\(|\[|\(\[|\(\"|\(\(|\{)/);
      if (nodeMatch) {
        const id = nodeMatch[1];
        if (seenNodes.has(id)) continue;
        seenNodes.add(id);
        out.push(line);
        continue;
      }

      // style <id> ...
      const styleMatch = trimmed.match(/^style\s+([^\s]+)/i);
      if (styleMatch) {
        const key = trimmed; // include full style string to detect duplicates
        if (seenStyles.has(key)) continue;
        seenStyles.add(key);
        out.push(line);
        continue;
      }

      out.push(line);
    }

    s = out.join('\n');

    return s;
  }

  async function renderDiagrams(data) {
    diagrams = data;
    placeholder.style.display = 'none';
    tabsEl.innerHTML = '';
    viewsEl.querySelectorAll('.diagram-view, .diff-view').forEach(el => el.remove());

    for (let i = 0; i < diagrams.length; i++) {
      const { title, code } = diagrams[i];
      const tab = document.createElement('button');
      tab.className = 'tab-btn' + (i === 0 ? ' active' : '');
      tab.textContent = title;
      tab.dataset.idx = i;
      tab.addEventListener('click', () => switchTab(i));
      tabsEl.appendChild(tab);

      const view = document.createElement('div');
      view.className = 'diagram-view' + (i === 0 ? ' active' : '');
      view.dataset.idx = i;
      const mermaidEl = document.createElement('div');
      mermaidEl.className = 'mermaid';
      mermaidEl.textContent = sanitizeMermaid(code);
      view.appendChild(mermaidEl);
      viewsEl.appendChild(view);
    }

    if (diagrams.length > 1) tabsEl.classList.add('visible');
    await _runMermaid(viewsEl.querySelectorAll('.mermaid'));
    activeTab = 0;
  }

  function switchTab(idx) {
    activeTab = idx;
    tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', +b.dataset.idx === idx));
    viewsEl.querySelectorAll('.diagram-view, .diff-view').forEach(v => {
      v.classList.toggle('active', +v.dataset.idx === idx);
    });
    // Re-apply zoom to the newly active diagram
    applyZoomToActive();
  }

  // ── Diff rendering ───────────────────────────────────────────────────────────
  async function renderDiff(data) {
    const { from: idFrom, to: idTo, diagrams_from, diagrams_to, timeline } = data;

    placeholder.style.display = 'none';
    tabsEl.innerHTML = '';
    viewsEl.querySelectorAll('.diagram-view, .diff-view').forEach(el => el.remove());
    tabsEl.classList.add('visible');
    diagrams = [];
    activeTab = 0;

    // Build compare tab (index 0)
    const diffTab = document.createElement('button');
    diffTab.className = 'tab-btn active';
    diffTab.textContent = `📊 Diff ${idFrom} → ${idTo}`;
    diffTab.dataset.idx = 0;
    diffTab.addEventListener('click', () => switchTab(0));
    tabsEl.appendChild(diffTab);

    const diffView = document.createElement('div');
    diffView.className = 'diff-view active';
    diffView.dataset.idx = 0;

    // Side-by-side diagrams
    const sbs = document.createElement('div');
    sbs.className = 'diff-side-by-side';

    async function buildSide(label, diags) {
      const side = document.createElement('div');
      side.className = 'diff-side';
      const lbl = document.createElement('div');
      lbl.className = 'diff-side-label';
      lbl.textContent = label;
      side.appendChild(lbl);
      if (diags && diags.length > 0) {
          const m = document.createElement('div');
          m.className = 'mermaid';
          m.textContent = sanitizeMermaid(diags[0].code);  // show first provider diagram (sanitized)
          side.appendChild(m);
        } else {
          side.innerHTML += '<p style="color:#484f58;font-size:0.8rem">No diagram available</p>';
        }
        return side;
    }

    const sideFrom = await buildSide(`Scan ${idFrom}`, diagrams_from);
    const sideTo   = await buildSide(`Scan ${idTo}`, diagrams_to);
    sbs.appendChild(sideFrom);
    sbs.appendChild(sideTo);
    diffView.appendChild(sbs);

    // Render mermaid in both sides
    const mermaidNodes = diffView.querySelectorAll('.mermaid');
    if (mermaidNodes.length) {
      await _runMermaid(mermaidNodes);
    }

    // Timeline
    const tl = document.createElement('div');
    tl.className = 'diff-timeline';
    const tlTitle = document.createElement('h3');
    tlTitle.textContent = `Change timeline — Scan ${idFrom} → ${idTo}`;
    tl.appendChild(tlTitle);

    if (!timeline || timeline.length === 0) {
      const none = document.createElement('div');
      none.className = 'no-changes';
      none.textContent = 'No changes detected between these scans.';
      tl.appendChild(none);
    } else {
      for (const entry of timeline) {
        const el = document.createElement('div');
        el.className = 'timeline-entry';
        const scanLabel = document.createElement('div');
        scanLabel.className = 'timeline-scan-id';
        scanLabel.textContent = `Scan ${entry.experiment_id}`;
        el.appendChild(scanLabel);

        for (const f of (entry.new_findings || [])) {
          const item = document.createElement('div');
          item.className = 'change-item change-new';
          item.textContent = `⚠ New finding: ${f.title || f.rule_id}${f.severity ? ' [' + f.severity + ']' : ''}`;
          el.appendChild(item);
        }
        for (const ruleId of (entry.resolved_findings || [])) {
          const item = document.createElement('div');
          item.className = 'change-item change-resolved';
          item.textContent = `✅ Resolved: ${ruleId}`;
          el.appendChild(item);
        }
        for (const r of (entry.resources_added || [])) {
          const item = document.createElement('div');
          item.className = 'change-item change-added';
          item.textContent = `➕ Resource added: ${r}`;
          el.appendChild(item);
        }
        for (const r of (entry.resources_removed || [])) {
          const item = document.createElement('div');
          item.className = 'change-item change-removed';
          item.textContent = `➖ Resource removed: ${r}`;
          el.appendChild(item);
        }
        tl.appendChild(el);
      }
    }

    diffView.appendChild(tl);
    viewsEl.appendChild(diffView);

    // Also add individual diagram tabs for "from" scan
    const allDiags = diagrams_from || [];
    diagrams = allDiags;
    for (let i = 0; i < allDiags.length; i++) {
      const tab = document.createElement('button');
      tab.className = 'tab-btn';
      tab.textContent = `${idFrom}: ${allDiags[i].title}`;
      tab.dataset.idx = i + 1;
      tab.addEventListener('click', () => switchTab(i + 1));
      tabsEl.appendChild(tab);

      const view = document.createElement('div');
      view.className = 'diagram-view';
      view.dataset.idx = i + 1;
      const mermaidEl = document.createElement('div');
      mermaidEl.className = 'mermaid';
      mermaidEl.textContent = sanitizeMermaid(allDiags[i].code);
      view.appendChild(mermaidEl);
      viewsEl.appendChild(view);
    }

    // Render mermaid in the individual tabs too
    const remaining = viewsEl.querySelectorAll('.diagram-view .mermaid');
    if (remaining.length) {
      await _runMermaid(remaining);
    }
  }

  // ── Past scans ───────────────────────────────────────────────────────────────
  function _scanOptionLabel(scan) {
    const dt = scan.scanned_at ? scan.scanned_at.replace('T', ' ').slice(0, 16) : '';
    const flag = scan.has_diagrams ? ' 🖼' : '';
    return `Scan ${scan.experiment_id}${dt ? ' — ' + dt : ''}${flag}`;
  }

  function _populateScanSelects(scans) {
    [pastScanSelect, compareFrom, compareTo].forEach(sel => {
      sel.innerHTML = '<option value="" disabled selected>— select —</option>';
      for (const s of scans) {
        const opt = document.createElement('option');
        opt.value = s.experiment_id;
        opt.textContent = _scanOptionLabel(s);
        sel.appendChild(opt);
      }
    });
  }

  async function loadPastScans(repoName) {
    if (!repoName) return [];
    try {
      const resp = await fetch(`/api/scans/${encodeURIComponent(repoName)}`);
      const data = await resp.json();
      const scans = data.scans || [];
      if (scans.length > 0) {
        _populateScanSelects(scans);
        pastScansRow.classList.add('visible');
      } else {
        pastScansRow.classList.remove('visible');
        compareRow.classList.remove('visible');
      }
      return scans;
    } catch {
      pastScansRow.classList.remove('visible');
      return [];
    }
  }

  async function _loadDiagrams(expId, { silent = false } = {}) {
    try {
      const resp = await fetch(`/api/diagrams/${encodeURIComponent(expId)}`);
      const data = await resp.json();
      if (data.diagrams && data.diagrams.length > 0) {
        await renderDiagrams(data.diagrams);
        if (!silent) setStatus(`Loaded scan ${expId}`, 'success');
        return true;
      }
      if (!silent) setStatus(`No diagrams found for scan ${expId}`, 'error');
      return false;
    } catch (err) {
      if (!silent) setStatus('Load failed: ' + err, 'error');
      return false;
    }
  }

  loadScanBtn.addEventListener('click', async () => {
    const expId = pastScanSelect.value;
    if (!expId) return;
    loadScanBtn.disabled = true;
    setStatus(`Loading scan ${expId}…`);
    spinner.style.display = '';
    statusBar.classList.add('visible');
    try {
      await _loadDiagrams(expId);
      // Always load assets for the selected experiment
      if (currentRepoName) loadAssets(currentRepoName, expId);
    } finally {
      spinner.style.display = 'none';
      loadScanBtn.disabled = false;
    }
  });

  compareToggle.addEventListener('click', () => {
    compareRow.classList.toggle('visible');
  });

  runCompareBtn.addEventListener('click', async () => {
    const from = compareFrom.value;
    const to   = compareTo.value;
    if (!from || !to) { setStatus('Select both From and To scans', 'error'); return; }
    if (from === to)  { setStatus('From and To must be different scans', 'error'); return; }
    const repo = currentRepoName;
    runCompareBtn.disabled = true;
    spinner.style.display = '';
    setStatus(`Comparing scan ${from} → ${to}…`);
    statusBar.classList.add('visible');
    try {
      const url = `/api/diff?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&repo=${encodeURIComponent(repo)}`;
      const resp = await fetch(url);
      const data = await resp.json();
      if (data.error) { setStatus('Error: ' + data.error, 'error'); return; }
      await renderDiff(data);
      setStatus(`Comparison ready: Scan ${from} → ${to}`, 'success');
    } catch (err) {
      setStatus('Compare failed: ' + err, 'error');
    } finally {
      spinner.style.display = 'none';
      runCompareBtn.disabled = false;
    }
  });

  // ── SSE stream parsing ───────────────────────────────────────────────────────
  let buffer = '';

  function parseSSEChunk(chunk) {
    buffer += chunk;
    const messages = buffer.split('\n\n');
    buffer = messages.pop();
    for (const msg of messages) {
      if (!msg.trim()) continue;
      const eventMatch = msg.match(/^event:\s*(.+)$/m);
      const dataMatch  = msg.match(/^data:\s*(.+)$/m);
      if (!dataMatch) continue;
      const eventType = eventMatch ? eventMatch[1].trim() : 'message';
      let payload;
      try { payload = JSON.parse(dataMatch[1].trim()); } catch { payload = dataMatch[1].trim(); }
      handleEvent(eventType, payload);
    }
  }

  function handleEvent(type, payload) {
    if (type === 'log') {
      appendLog(payload);
    } else if (type === 'diagrams') {
      renderDiagrams(payload);
    } else if (type === 'error') {
      appendLog('[ERROR] ' + payload);
      setStatus('Error: ' + payload, 'error');
    } else if (type === 'done') {
      const code  = payload.exit_code;
      const expId = payload.experiment_id;
      if (code === 0) {
        setStatus(`✅ Scan complete — Experiment ${expId}`, 'success');
        // Refresh past scans list and assets
        if (currentRepoName) {
          loadPastScans(currentRepoName);
          loadAssets(currentRepoName, expId);
        }
      } else {
        setStatus(`⚠ Pipeline exited with code ${code}`, 'error');
      }
      spinner.style.display = 'none';
      scanBtn.disabled = false;
      repoSelect.disabled = false;
      nameInput.disabled = false;
      resetBtn.style.display = 'inline-block';
    }
  }

  function setStatus(text, cls) {
    statusText.textContent = text;
    statusText.className = 'status-text' + (cls ? ' ' + cls : '');
    statusBar.classList.add('visible');
  }

  // ── Form submit ──────────────────────────────────────────────────────────────
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const repoPath = repoSelect.value;
    const scanName = (nameInput.value.trim() || 'web_scan');

    logOutput.innerHTML = '';
    viewsEl.querySelectorAll('.diagram-view, .diff-view').forEach(el => el.remove());
    tabsEl.innerHTML = '';
    tabsEl.classList.remove('visible');
    placeholder.style.display = '';
    buffer = '';
    diagrams = [];

    scanBtn.disabled = true;
    repoSelect.disabled = true;
    nameInput.disabled = true;
    resetBtn.style.display = 'none';
    spinner.style.display = '';
    setStatus('Connecting…');

    const formData = new FormData();
    formData.append('repo_path', repoPath);
    formData.append('scan_name', scanName);

    let response;
    try {
      response = await fetch('/scan', { method: 'POST', body: formData });
    } catch (err) {
      setStatus('Connection failed: ' + err, 'error');
      scanBtn.disabled = false; repoSelect.disabled = false; nameInput.disabled = false;
      spinner.style.display = 'none';
      return;
    }

    if (!response.ok) {
      const err = await response.text();
      setStatus('Server error: ' + err, 'error');
      scanBtn.disabled = false; repoSelect.disabled = false; nameInput.disabled = false;
      spinner.style.display = 'none';
      return;
    }

    setStatus('Scanning…');
    const reader  = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      parseSSEChunk(decoder.decode(value, { stream: true }));
    }
  });

  // ── Reset button ─────────────────────────────────────────────────────────────
  resetBtn.addEventListener('click', () => {
    repoSelect.disabled = false;
    nameInput.disabled = false;
    repoSelect.value = '';
    currentRepoName = '';
    allAssets = [];
    activeProviderFilter = '';
    resetBtn.style.display = 'none';
    statusBar.classList.remove('visible');
    pastScansRow.classList.remove('visible');
    compareRow.classList.remove('visible');
    assetsNavCount.textContent = '';
    assetsSummary.style.display = 'none';
    assetsToolbar.style.display = 'none';
    assetsTableWrap.querySelectorAll('table, .assets-empty').forEach(el => el.remove());
    assetsPlaceholder.style.display = '';
    assetsPlaceholder.innerHTML = `
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 7h18M3 12h18M3 17h18"/>
      </svg>
      <p>Select a repository to view<br/>its detected assets.</p>`;
  });

  // Auto-fill scan name from selected repo, load past scans, assets, and latest diagram
  repoSelect.addEventListener('change', async () => {
    const selected = repoSelect.options[repoSelect.selectedIndex];
    if (selected && selected.value) {
      const name = selected.dataset.name || selected.text.split(' — ')[0].trim();
      nameInput.value = name;
      currentRepoName = name;

      // Fetch scan history and assets in parallel
      const [scans] = await Promise.all([
        loadPastScans(name),
        loadAssets(name),
      ]);

      // Auto-load the most recent scan that has a diagram (if any).
      if (scans && scans.length > 0) {
        let latest = null;
        for (let i = scans.length - 1; i >= 0; i--) {
          if (scans[i].has_diagrams) { latest = scans[i]; break; }
        }
        if (!latest) latest = scans[scans.length -1];
        if (latest && latest.experiment_id) {
          try {
            setStatus(`Loading latest scan ${latest.experiment_id}…`);
            spinner.style.display = '';
            await _loadDiagrams(latest.experiment_id);
            await loadAssets(name, latest.experiment_id);
            setStatus(`Loaded latest scan ${latest.experiment_id}`, 'success');
          } catch (err) {
            setStatus('Failed to load latest scan: ' + err, 'error');
          } finally {
            spinner.style.display = 'none';
          }
        }
      }
    }
  });

  document.getElementById('copy-log-btn').addEventListener('click', () => {
    navigator.clipboard.writeText(logOutput.innerText).catch(() => {});
  });

  document.getElementById('clear-log-btn').addEventListener('click', () => {
    logOutput.innerHTML = '<span style="color:#484f58">Scan output will appear here…</span>';
  });

  // Annotate repository options with a small icon if a past scan contains diagrams.
  // Runs in the background so the UI remains responsive.
  async function annotateRepoOptions() {
    const opts = Array.from(repoSelect.options || []);
    for (const opt of opts) {
      try {
        const name = opt.dataset.name;
        if (!name) continue;
        const resp = await fetch(`/api/scans/${encodeURIComponent(name)}`);
        if (!resp.ok) continue;
        const data = await resp.json();
        const scans = data.scans || [];
        if (scans.length) {
          let hasDiags = false;
          for (let i = scans.length - 1; i >= 0; i--) {
            if (scans[i].has_diagrams) { hasDiags = true; break; }
          }
          if (hasDiags) {
            if (!opt.textContent.includes('🖼')) opt.textContent = opt.textContent + ' 🖼';
          } else {
            if (!opt.textContent.includes('⬜')) opt.textContent = opt.textContent + ' ⬜';
          }
        }
      } catch (err) {
        // Ignore per-repo errors
      }
    }
  }

  // Run annotation in background
  annotateRepoOptions();

  copyDiagramBtn.addEventListener('click', () => {
    if (diagrams[activeTab]) {
      navigator.clipboard.writeText(diagrams[activeTab].code).catch(() => {});
    }
  });
</script>
</body>
</html>
