<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Subscriptions — Triage-Saurus</title>
  <link rel="stylesheet" href="/static/tailwind.css?v=1" />
  <link rel="stylesheet" href="/static/app.css?v=8" />
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <script src="/static/js/mermaid-loader.js"></script>
  <script src="/static/js/mermaid-icon-injector.js" defer></script>
  <script>
    // Expose render function that works with mermaid.run()
    window.TriageMermaid = {
      render: async function(container) {
        console.log('[TriageMermaid] render() called');
        
        // Wait for mermaid to be ready
        let attempts = 0;
        while (!window.mermaid && attempts < 50) {
          console.log('[TriageMermaid] waiting for mermaid...');
          await new Promise(r => setTimeout(r, 100));
          attempts++;
        }
        
        if (!window.mermaid) {
          console.error('[TriageMermaid] Mermaid failed to load after 5s');
          return;
        }
        
        try {
          console.log('[TriageMermaid] Calling mermaid.run()');
          const result = await window.mermaid.run();
          console.log('[TriageMermaid] mermaid.run() completed, result:', result);
        } catch (e) {
          console.error('[TriageMermaid] Error calling mermaid.run():', e);
        }
      }
    };
  </script>
</head>
<body>

  <header>
    <div class="header-scan-form">
      <div class="header-left-controls">
        {% include "partials/burger_menu.html" %}
      </div>
      <div class="header-brand">
        <span class="dino">☁</span>
        <h1>Cloud Subscriptions</h1>
        <span class="dino">☁</span>
      </div>
      <div class="header-right-controls">
      </div>
    </div>
  </header>

  <div class="container" style="padding: 16px 24px; max-width: 100%;">
    {% include "partials/subscriptions.html" %}
  </div>

</body>
</html>
