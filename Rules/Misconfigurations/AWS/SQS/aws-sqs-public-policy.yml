rules:
  - id: aws-sqs-public-policy
    message: |
      SQS queue has a resource policy that allows access from Principal "*" (any principal).
      This permits unauthenticated sending and/or receiving of messages over the internet.
      Attackers can inject messages to poison processing pipelines, or consume messages
      to exfiltrate data and cause denial-of-service by deleting messages before consumers process them.

      Restrict the resource policy Principal to specific AWS accounts, IAM roles, or
      use a condition with aws:SourceArn / aws:SourceAccount to limit the scope.
      ATTACK: Discover public SQS queue → aws sqs send-message with malicious payload → inject into processing pipeline → trigger SSRF/RCE in message consumer
      TOOLS: aws-cli, curl, Pacu, SQS message replay tools
      CHAIN: Public queue discovery → unauthenticated SendMessage → malicious payload injection → consumer processing → SSRF/RCE in backend application
      IMPACT: Message injection enabling backend exploitation; unauthorized ReceiveMessage exfiltrates data and deletes messages causing consumer DoS
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "aws_sqs_queue_policy" $NAME {
            ...
          }
      - pattern-either:
          - pattern-regex: '"Principal"\s*:\s*["\{]?\s*\*\s*["\}]?'
          - pattern-regex: 'Principal\s*=\s*"?\*"?'
    metadata:
      category: security
      subcategory: [messaging, exposure, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, aws, sqs]
      five_pillars: Pillar 2 (Identity & Access Management)
      internet_exposure: true
