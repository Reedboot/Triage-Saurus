rules:
  - id: aws-eks-no-secrets-encryption
    message: |
      EKS cluster does not have secrets encryption configured. Without an encryption_config
      block specifying a KMS key for the "secrets" resource type, Kubernetes secrets
      (including service account tokens, TLS certificates, and user-defined secrets) are
      stored in etcd without envelope encryption. An attacker who gains access to the etcd
      data store can read all secrets in plaintext.
      Add an encryption_config block:
        encryption_config {
          provider { key_arn = aws_kms_key.eks.arn }
          resources  = ["secrets"]
        }
      ATTACK: Gain etcd access (compromised node, kubectl exec, or misconfigured RBAC) → etcdctl get --prefix / → read all Kubernetes secrets in plaintext
      TOOLS: kubectl, etcdctl, aws-cli, Pacu, kube-hunter, kube-bench
      CHAIN: Cluster access (kubectl or direct etcd) → unencrypted secret enumeration → service account token theft → workload impersonation → full cluster control
      IMPACT: All Kubernetes secrets exposed in plaintext; service account tokens enable impersonation of any workload identity and lateral movement across namespaces
    severity: ERROR
    languages: [terraform, hcl]
    pattern-either:
      - patterns:
          - pattern: |
              resource "aws_eks_cluster" $NAME {
                ...
              }
          - pattern-not: |
              resource "aws_eks_cluster" $NAME {
                ...
                encryption_config {
                  ...
                }
                ...
              }
      - patterns:
          - pattern: |
              resource aws_eks_cluster $NAME {
                ...
              }
          - pattern-not: |
              resource aws_eks_cluster $NAME {
                ...
                encryption_config {
                  ...
                }
                ...
              }
    metadata:
      category: security
      subcategory: [encryption, kubernetes, secrets]
      cwe: CWE-311
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, aws, eks, kubernetes]
      five_pillars: Pillar 5 (Data Protection)
