rules:
  - id: aws-rds-hardcoded-password
    message: |
      RDS database password is stored as a plaintext Terraform literal. Anyone with
      access to the configuration can read it, and it will likely end up in state
      files or deployment logs. Store the secret in AWS Secrets Manager or another
      secret store and reference it at deploy time.
      ATTACK: Read Terraform state file or git history → extract plaintext RDS password → connect directly to database endpoint → dump all tables
      TOOLS: truffleHog, git-secrets, gitleaks, mysql/psql client, sqlmap, aws-cli, terraform state pull
      CHAIN: Config/state file access (git, S3 backend, CI logs) → plaintext password extraction → direct DB connection → full schema and data exfiltration
      IMPACT: Full database compromise; hardcoded password enables direct DB access and persistent authentication independent of any IAM controls
    severity: ERROR
    languages: [terraform, hcl]
    pattern-either:
      - patterns:
          - pattern-inside: |
              resource "aws_db_instance" $NAME {
                ...
              }
          - pattern-regex: '(?s)password\s*=\s*"[^"$\{][^"]*"'
      - patterns:
          - pattern-inside: |
              resource "aws_rds_cluster" $NAME {
                ...
              }
          - pattern-regex: '(?s)master_password\s*=\s*"[^"$\{][^"]*"'
    metadata:
      category: security
      subcategory: [secrets, credentials, database]
      cwe: CWE-798
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, aws, rds]
      five_pillars: Pillar 5 (Data Protection)
