rules:
  - id: aws-ecs-task-env-credentials
    message: |
      ECS task definition contains hardcoded credentials in container environment variables.
      
      Credentials in ECS task definition environment variables are:
      1. Stored in plaintext in the task definition JSON (visible in AWS Console/API)
      2. Exposed via `docker inspect` on any EC2 instance running the task
      3. Logged to CloudWatch if the application prints environment variables
      4. Visible in `ecs describe-task-definition` API calls
      
      Remediation: Use ECS secrets (valueFrom with SSM Parameter Store or Secrets Manager)
      instead of value for sensitive environment variables.
    severity: ERROR
    languages: [terraform, hcl]
    pattern-either:
      - pattern-regex: "\"name\"\\s*:\\s*\"(?:PASSWORD|SECRET|TOKEN|API_KEY|AWS_SECRET|CREDENTIAL)[^\"]*\",\\s*\"value\"\\s*:\\s*\"[^\"]{4,}\""
      - pattern-regex: "\"name\"\\s*:\\s*\"[^\"]*(?:password|secret|token|api_key|credential)[^\"]*\",\\s*\"value\"\\s*:\\s*\"[^\"${][^\"]*\""
    metadata:
      category: security
      subcategory: [secrets, containers]
      cwe: CWE-798
      owasp: "A02:2021 – Cryptographic Failures"
      technology: [terraform, aws, ecs]
