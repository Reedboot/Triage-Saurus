rules:
  - id: aws-secrets-manager-no-rotation
    message: |
      Secrets Manager secret has no automatic rotation configured.
      
      Without rotation, a compromised secret (leaked in logs, git history, or
      via insider threat) provides persistent access indefinitely. The attacker
      continues to use the credential long after the breach occurs. Rotation
      limits the blast radius of a credential compromise to the rotation interval.
      
      Remediation: Enable rotation with rotation_rules.automatically_after_days
      set to 30-90 days depending on sensitivity. Use Lambda rotation functions.
      ATTACK: Discover secret value (via git leak, logs, or insider) → use static credential indefinitely → persistent unauthorized access with no expiry
      TOOLS: truffleHog, aws-cli, Pacu, git-secrets, gitleaks, CloudSploit
      CHAIN: Secret discovery (git/logs/config) → static credential use → persistent authentication → long-term unauthorized access without revocation
      IMPACT: Indefinite credential validity; compromised secrets provide persistent access until manually revoked, giving attackers unlimited exploitation window
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "aws_secretsmanager_secret" "$_" {
            ...
          }
      - pattern-not: |
          resource "aws_secretsmanager_secret" "$_" {
            ...
            rotation_rules {
              ...
            }
            ...
          }
    metadata:
      category: security
      subcategory: [secrets, rotation]
      cwe: CWE-324
      technology: [terraform, aws, secrets-manager]
