rules:
  - id: aws-cognito-weak-password-policy
    message: |
      Cognito User Pool has a weak password policy.
      
      A minimum password length less than 12 characters or missing complexity
      requirements (uppercase, lowercase, numbers, symbols) enables automated
      password spray attacks. Attackers with a list of common passwords can
      successfully authenticate to the user pool.
      
      Remediation: Set minimum_length >= 12 and require all character types.
    severity: WARNING
    languages: [terraform, hcl]
    pattern-either:
      - patterns:
          - pattern-inside: |
              resource "aws_cognito_user_pool" "$_" {
                ...
                password_policy {
                  ...
                }
                ...
              }
          - pattern: |
              require_symbols = false
      - patterns:
          - pattern-inside: |
              resource "aws_cognito_user_pool" "$_" {
                ...
                password_policy {
                  ...
                }
                ...
              }
          - pattern: |
              require_uppercase = false
    metadata:
      category: security
      subcategory: [authentication, password-policy]
      cwe: CWE-521
      technology: [terraform, aws, cognito]
