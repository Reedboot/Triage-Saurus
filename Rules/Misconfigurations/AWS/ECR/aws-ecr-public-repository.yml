rules:
  - id: aws-ecr-public-repository
    message: |
      ECR repository is publicly accessible. Public ECR repositories allow any
      unauthenticated user to pull container images. Attackers can pull images and
      perform layer-by-layer analysis to discover hardcoded credentials, API keys,
      or sensitive configuration baked into image layers via ENV or COPY instructions.

      Use private ECR repositories with appropriate IAM resource policies limiting
      pull access to specific AWS accounts and roles.
      ATTACK: aws ecr-public get-login-password → docker pull public.ecr.aws/<registry>/<repo> → extract image layers → grep for secrets, API keys, passwords
      TOOLS: aws-cli, docker, dive, truffleHog, strings, grep, container-explorer
      CHAIN: Public image pull (no auth required) → layer-by-layer extraction → static secret analysis → credential harvest → AWS/external API access
      IMPACT: Any internet user can pull images and extract hardcoded secrets, proprietary code, and internal configuration baked into image layers
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "aws_ecrpublic_repository" $NAME {
            ...
          }
    metadata:
      category: security
      subcategory: [container, exposure, cloud]
      cwe: CWE-200
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, aws, ecr, containers]
      five_pillars: Pillar 5 (Data Protection)
      internet_exposure: true
