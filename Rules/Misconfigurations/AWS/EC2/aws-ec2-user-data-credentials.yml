rules:
  - id: aws-ec2-user-data-credentials
    message: |
      EC2 instance user_data contains what appears to be hardcoded AWS credentials
      (ACCESS_KEY or SECRET). User data is retrievable via the instance metadata service
      (IMDS) at http://169.254.169.254/latest/user-data and may be logged in CloudTrail.
      Store credentials in Secrets Manager or use IAM instance profiles instead.
      
      Template variables (${VAR}, $(VAR), %VAR%) are safe - these get replaced by CI/CD.
    severity: ERROR
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "aws_instance" $NAME {
            ...
          }
      - pattern-regex: 'user_data\s*=\s*<<[A-Z]+.*(?:AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|aws_access_key|aws_secret_key).*[A-Z0-9/+]{16,}'
      - pattern-not-regex: '(\$\{[^}]+\}|\$\([^)]+\)|%[A-Za-z_][A-Za-z0-9_]*%)'
    metadata:
      category: security
      subcategory: [secrets, credentials]
      cwe: CWE-798
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL
      technology: [terraform, aws, ec2]
      five_pillars: Pillar 2 (Identity & Access Management)
