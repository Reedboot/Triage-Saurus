rules:
  - id: aws-ec2-user-data-credentials
    message: |
      EC2 instance user_data contains what appears to be hardcoded AWS credentials
      (ACCESS_KEY or SECRET). User data is retrievable via the instance metadata service
      (IMDS) at http://169.254.169.254/latest/user-data and may be logged in CloudTrail.
      Store credentials in Secrets Manager or use IAM instance profiles instead.
      
      Template variables (${VAR}, $(VAR), %VAR%) are safe - these get replaced by CI/CD.
      ATTACK: Exploit SSRF or compromise EC2 → GET http://169.254.169.254/latest/user-data → extract hardcoded AWS credentials → use keys for full API access
      TOOLS: curl, SSRFmap, aws-cli, Pacu, imds-leak-scanner, Burp Suite
      CHAIN: IMDS access via SSRF or local shell → user-data retrieval → credential extraction → AWS API calls with stolen long-lived keys
      IMPACT: Long-lived AWS access key compromise; attacker gains persistent API access with full permissions of the credential owner until manually rotated
    severity: ERROR
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "aws_instance" $NAME {
            ...
          }
      - pattern-regex: '(?s)user_data\s*=\s*<<-?[A-Z]+\s.*?(?:AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|aws_access_key|aws_secret_key|DB_PASSWORD).*?[A-Za-z0-9/+=!@#$]{8,}'
      - pattern-not-regex: '(\$\{[^}]+\}|\$\([^)]+\)|%[A-Za-z_][A-Za-z0-9_]*%)'
    metadata:
      category: security
      subcategory: [secrets, credentials]
      cwe: CWE-798
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL
      technology: [terraform, aws, ec2]
      five_pillars: Pillar 2 (Identity & Access Management)
