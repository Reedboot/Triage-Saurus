rules:
  - id: aws-guardduty-disabled
    message: |
      AWS GuardDuty detector is disabled.
      
      GuardDuty provides threat detection for IMDS credential abuse, DNS tunneling,
      crypto mining, port scanning, brute force attacks, and S3 data exfiltration.
      A disabled detector means all these attack patterns go undetected.
      Attackers specifically check for GuardDuty status and prefer environments
      where it is disabled or has findings silenced.
      
      Remediation: Set enable = true on aws_guardduty_detector.
      ATTACK: Verify GuardDuty is disabled → perform IMDS credential abuse, crypto mining, port scanning, or S3 exfiltration → all attacker activity proceeds undetected
      TOOLS: Pacu, aws-cli, ScoutSuite, Prowler, CloudSploit
      CHAIN: Detection evasion (GuardDuty disabled) → unrestricted attacker TTPs → persistence establishment → data exfiltration with zero automated alerting
      IMPACT: Zero threat detection; all attack patterns (credential abuse, C2, crypto mining, data exfiltration) proceed silently with no GuardDuty findings
    severity: ERROR
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "aws_guardduty_detector" "$_" {
            ...
          }
      - pattern: |
          enable = false
    metadata:
      category: security
      subcategory: [detection, monitoring]
      cwe: CWE-778
      technology: [terraform, aws, guardduty]
