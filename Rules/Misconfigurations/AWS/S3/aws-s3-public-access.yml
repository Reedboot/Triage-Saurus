rules:
  - id: aws-s3-public-access
    message: |
      S3 bucket allows public access via ACL or public access block disabled.
      Ensure block_public_acls and block_public_policy are enabled and avoid public ACLs.
      ATTACK: aws s3 ls s3://bucket (no creds) → enumerate objects → aws s3 cp to exfiltrate data → extract credentials if secrets stored in bucket
      TOOLS: aws-cli, S3Scanner, GrayHatWarfare, bucket-finder, Pacu, truffleHog
      CHAIN: Public bucket discovery → object enumeration → bulk exfiltration → credential theft if secrets stored → AWS account compromise via stolen keys
      IMPACT: Full data exfiltration; potential credential theft enabling AWS account compromise; compliance violations for PII/PHI/PCI data stored in S3
    severity: ERROR
    languages: [terraform, hcl]
    pattern-either:
      # Old-style inline ACL on aws_s3_bucket resource
      - patterns:
          - pattern-inside: |
              resource "aws_s3_bucket" $NAME {
                ...
              }
          - pattern-either:
              - pattern: |
                  acl = "public-read"
              - pattern: |
                  acl = "public-read-write"
              - pattern: |
                  block_public_acls = false
              - pattern: |
                  block_public_policy = false
      # Modern separate aws_s3_bucket_public_access_block resource
      - patterns:
          - pattern-inside: |
              resource "aws_s3_bucket_public_access_block" $NAME {
                ...
              }
          - pattern-either:
              - pattern: |
                  block_public_acls = false
              - pattern: |
                  block_public_policy = false
              - pattern: |
                  ignore_public_acls = false
              - pattern: |
                  restrict_public_buckets = false
      # Modern separate ACL resource
      - patterns:
          - pattern-inside: |
              resource "aws_s3_bucket_acl" $NAME {
                ...
              }
          - pattern-either:
              - pattern: |
                  acl = "public-read"
              - pattern: |
                  acl = "public-read-write"
    metadata:
      category: security
      subcategory: [storage, exposure]
      technology: [terraform, aws, s3]
