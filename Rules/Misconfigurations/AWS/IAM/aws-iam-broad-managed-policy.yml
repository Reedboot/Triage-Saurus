rules:
  - id: aws-iam-broad-managed-policy
    message: |
      IAM role attachment uses a broad AWS-managed policy such as IAMFullAccess or
      AdministratorAccess. These managed policies violate least privilege and give the
      attached workload far more access than it should have. Attach only the minimal
      policies required for the role's job.
      ATTACK: Compromise workload with AdministratorAccess/IAMFullAccess → create new IAM user with admin rights → generate persistent access keys → full account control
      TOOLS: aws-cli, Pacu, enumerate-iam, CloudSploit, Prowler, PMapper
      CHAIN: Workload compromise → broad managed policy discovery → IAM admin exploitation → backdoor credential creation → full AWS account persistence
      IMPACT: Full AWS account takeover; AdministratorAccess allows creating persistent backdoor credentials and accessing all services and data in the account
    severity: ERROR
    languages: [terraform, hcl]
    pattern-either:
      - patterns:
          - pattern-inside: |
              resource "aws_iam_role_policy_attachment" $NAME {
                ...
              }
          - pattern-either:
              - pattern: |
                  policy_arn = "arn:aws:iam::aws:policy/IAMFullAccess"
              - pattern: |
                  policy_arn = "arn:aws:iam::aws:policy/AdministratorAccess"
              - pattern: |
                  policy_arn = "arn:aws:iam::aws:policy/PowerUserAccess"
    metadata:
      category: security
      subcategory: [iam, least-privilege]
      cwe: CWE-269
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, aws, iam]
      five_pillars: Pillar 2 (Identity & Access Management)
