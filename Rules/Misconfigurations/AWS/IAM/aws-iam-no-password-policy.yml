rules:
  - id: aws-iam-no-password-policy
    message: |
      AWS IAM account password policy is absent or too weak.
      
      Without a strong password policy, IAM console users can set trivially
      guessable passwords. Combined with exposed IAM usernames (visible in
      ARNs, CloudTrail logs, error messages), attackers can brute force console
      credentials. The AWS console provides access to all services the user
      has permissions for.
      
      Remediation: Create an aws_iam_account_password_policy resource with:
      minimum_password_length >= 14, require_symbols = true, 
      require_numbers = true, max_password_age <= 90, 
      password_reuse_prevention >= 12.
    severity: WARNING
    languages: [terraform, hcl]
    pattern-either:
      - patterns:
          - pattern-inside: |
              resource "aws_iam_account_password_policy" "$_" {
                ...
              }
          - pattern: |
              require_symbols = false
      - patterns:
          - pattern-inside: |
              resource "aws_iam_account_password_policy" "$_" {
                ...
              }
          - pattern-regex: "minimum_password_length\\s*=\\s*[0-9]$"
    metadata:
      category: security
      subcategory: [authentication, password-policy]
      cwe: CWE-521
      technology: [terraform, aws, iam]
