rules:
  - id: aws-lambda-no-vpc
    message: |
      AWS Lambda function is not deployed inside a VPC (vpc_config block is missing).
      A Lambda outside a VPC cannot access private VPC resources (RDS, ElastiCache)
      securely, and its outbound traffic routes through the internet without network-level
      controls. Placing Lambda inside a VPC with appropriate security groups limits
      egress and enables private connectivity to data stores without public endpoints.

      Note: Lambda in VPC requires NAT Gateway for internet access. Ensure VPC has
      private subnets with NAT if internet egress is required.
      ATTACK: Exploit Lambda function code (RCE/SSRF) → unrestricted outbound internet connection → exfiltrate data or establish C2 channel without network controls
      TOOLS: aws-cli, Pacu, custom Lambda exploit payloads, curl, DNS tunneling tools
      CHAIN: Lambda RCE or SSRF → unrestricted internet egress → data exfiltration to attacker server → C2 channel establishment → persistent data access
      IMPACT: Unconstrained data exfiltration path from Lambda; no VPC means no egress filtering, enabling C2 and exfiltration to any internet destination
    severity: INFO
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "aws_lambda_function" $NAME {
            ...
          }
      - pattern-not: |
          resource "aws_lambda_function" $NAME {
            ...
            vpc_config {
              ...
            }
            ...
          }
    metadata:
      category: security
      subcategory: [network, cloud, lambda]
      cwe: CWE-284
      confidence: LOW
      likelihood: LOW
      impact: MEDIUM
      technology: [terraform, aws, lambda]
      five_pillars: Pillar 1 (Network Security)
