rules:
  - id: aws-lambda-env-credentials
    message: |
      Lambda function environment variables contain what appears to be a hardcoded AWS access
      key or secret key. Lambda environment variables are visible in the AWS Console, Lambda
      API responses, and CloudTrail logs. They are also included in function configuration
      exports and may appear in deployment packages.
      Store secrets in AWS Secrets Manager or SSM Parameter Store (SecureString) and retrieve
      them at runtime, or use IAM execution roles to avoid long-lived credentials entirely.
    severity: ERROR
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "aws_lambda_function" $NAME {
            ...
            environment {
              variables = {
                ...
              }
            }
            ...
          }
      - pattern-either:
          - pattern-regex: 'access_key\s*=\s*"[A-Z0-9]{16,}"'
          - pattern-regex: 'secret_key\s*=\s*"[A-Za-z0-9/+]{20,}"'
          - pattern-regex: 'aws_access_key_id\s*=\s*"[A-Z0-9]{16,}"'
          - pattern-regex: 'aws_secret_access_key\s*=\s*"[A-Za-z0-9/+]{20,}"'
          - pattern-regex: 'AKIA[A-Z0-9]{16}'
          - pattern-regex: '(?i)(?:AWS_ACCESS_KEY|DB_PASSWORD|API_SECRET|PASSWORD|SECRET|TOKEN|CREDENTIAL)\s*=\s*"[A-Za-z0-9!@#$%^&*_+\-\.]{8,}"'
      - pattern-not-regex: '\$\{[^}]+\}'
    metadata:
      category: security
      subcategory: [secrets, credentials, lambda]
      cwe: CWE-798
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL
      technology: [terraform, aws, lambda, secrets]
      five_pillars: Pillar 2 (Identity & Access)
