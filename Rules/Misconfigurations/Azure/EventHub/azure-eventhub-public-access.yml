rules:
  - id: azure-eventhub-public-access
    message: |
      Event Hub namespace has public network access enabled. Restrict access via
      Private Endpoint or network rules.
      ATTACK: Obtain Event Hub connection string → connect to public endpoint → intercept real-time event streams → inject poisoned events into downstream consumers
      TOOLS: az-cli, ServiceBusExplorer, MicroBurst, Azure Event Hubs SDK, Shodan
      CHAIN: public endpoint + connection string leak → event stream connection → real-time event eavesdropping → malicious event injection → downstream consumer manipulation
      IMPACT: Real-time event streams intercepted; sensitive telemetry and business events exposed; event injection corrupts downstream consumers and pipelines
    severity: WARNING
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "azurerm_eventhub_namespace" "$NAME" {
            ...
            public_network_access_enabled = true
            ...
          }
      - pattern: |
          resource azurerm_eventhub_namespace "$NAME" {
            ...
            public_network_access_enabled = true
            ...
          }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, azure]
      five_pillars: Pillar 1 (Network Security)
      internet_exposure: true
