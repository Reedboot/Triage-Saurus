rules:
  - id: azure-mysql-ssl-disabled
    message: |
      Azure MySQL server has SSL enforcement explicitly disabled.
      All data in transit between clients and the server is unencrypted.
      Set ssl_enforcement_enabled = true to require TLS for all connections.
      ATTACK: ARP spoof or intercept network path → capture MySQL wire protocol in plaintext → extract credentials and query results
      TOOLS: Wireshark, tcpdump, mitmproxy, arpspoof, MITMf, Bettercap
      CHAIN: unencrypted MySQL traffic → network-level interception → plaintext credential capture → offline credential reuse → database access
      IMPACT: Full credential theft and query data interception; stolen credentials enable lateral movement to all connected services
    severity: ERROR
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "azurerm_mysql_server" "$NAME" {
            ...
            ssl_enforcement_enabled = false
            ...
          }
    metadata:
      category: security
      subcategory: [encryption, cloud, database]
      cwe: CWE-319
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, azure, mysql]
      five_pillars: Pillar 4 (Data Protection)
