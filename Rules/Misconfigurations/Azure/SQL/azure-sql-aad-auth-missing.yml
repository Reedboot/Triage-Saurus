rules:
  - id: azure-sql-aad-auth-missing
    message: |
      SQL Server does not have Azure AD authentication configured.
      Using only SQL logins bypasses centralized identity management.
      Add azuread_administrator block or azurerm_mssql_server_aad_administrator resource.
      ATTACK: Enumerate SQL logins → spray weak passwords → authenticate as SQL admin without MFA or Conditional Access enforcement
      TOOLS: SQLRecon, MicroBurst, az-cli, sqlcmd, CrackMapExec, Hydra
      CHAIN: SQL-only auth bypasses Conditional Access → password spray SQL logins → admin access → full database control
      IMPACT: Unauthorized database access bypassing MFA; no Conditional Access policies applied to SQL credentials
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "azurerm_mssql_server" $NAME {
            ...
          }
      - pattern-not: |
          resource "azurerm_mssql_server" $NAME {
            ...
            azuread_administrator {
              ...
            }
            ...
          }
      - pattern-not-inside: |
          resource "azurerm_mssql_server_aad_administrator" $AADNAME {
            server_id = azurerm_mssql_server.$NAME.id
            ...
          }
    metadata:
      category: security
      subcategory: [authentication, cloud]
      cwe: CWE-287
      confidence: MEDIUM
      likelihood: LOW
      impact: MEDIUM
      technology: [terraform, azure]
      five_pillars: Pillar 2 (Access Control)
