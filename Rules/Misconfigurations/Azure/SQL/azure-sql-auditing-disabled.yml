rules:
  - id: azure-sql-auditing-disabled
    message: |
      Azure SQL Database auditing is not configured. Without auditing enabled,
      there is no visibility into database access patterns, suspicious activities,
      or potential credential theft. Enable extended auditing policy with Log
      Analytics or Storage Account destination.
      ATTACK: Authenticate to SQL server → exfiltrate all tables → drop/modify data → no audit trail left behind
      TOOLS: sqlcmd, mssql-cli, SQLRecon, MicroBurst, Burp Suite
      CHAIN: no auditing configured → undetected authentication → bulk SELECT exfiltration → data modification → zero forensic evidence
      IMPACT: Undetected data exfiltration and manipulation; incident response severely hampered with no audit trail
    severity: ERROR
    languages: [terraform, hcl]
    pattern-either:
      - pattern-regex: '(?s)^(?=[\s\S]*resource "azurerm_mssql_database")(?![\s\S]*resource "azurerm_mssql_database_extended_auditing_policy")'
      - pattern-regex: '(?s)^(?=[\s\S]*resource "azurerm_mssql_server")(?![\s\S]*resource "azurerm_mssql_server_extended_auditing_policy")'
    metadata:
      category: security
      subcategory: [logging, monitoring, cloud]
      cwe: CWE-778
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, azure, sql]
      remediation: |
        Add extended auditing policy:
        
        resource "azurerm_mssql_database_extended_auditing_policy" "example" {
          database_id                             = azurerm_mssql_database.example.id
          storage_endpoint                        = azurerm_storage_account.example.primary_blob_endpoint
          storage_account_access_key              = azurerm_storage_account.example.primary_access_key
          storage_account_access_key_is_secondary = false
          retention_in_days                       = 90
        }
      notes: |
        Detection requires checking that:
        1. Each azurerm_mssql_database has a corresponding auditing policy
        2. The policy references the correct database_id
        3. A valid destination (Storage or Log Analytics) is configured
