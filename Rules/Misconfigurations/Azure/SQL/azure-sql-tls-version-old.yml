rules:
  - id: azure-sql-tls-version-old
    message: |
      SQL Server allows TLS version < 1.2.
      TLS 1.0/1.1 are deprecated and vulnerable to attacks.
      Set minimum_tls_version = "1.2".
      ATTACK: Force TLS downgrade to 1.0/1.1 → exploit POODLE/BEAST → decrypt SQL Server wire traffic → extract credentials
      TOOLS: testssl.sh, nmap ssl-enum-ciphers, SSLstrip, Wireshark, POODLE PoC exploit, Bettercap
      CHAIN: TLS downgrade accepted → POODLE/BEAST exploit → SQL wire protocol decryption → credential extraction → unauthorized DB access
      IMPACT: SQL Server communications decrypted; credential theft enabling full unauthorized database access
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "azurerm_mssql_server" "$NAME" {
            ...
          }
      - pattern-not: |
          resource "azurerm_mssql_server" "$NAME" {
            ...
            minimum_tls_version = "1.2"
            ...
          }
    metadata:
      category: security
      subcategory: [encryption, cloud]
      cwe: CWE-327
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [terraform, azure]
      five_pillars: Pillar 5 (Data Protection)
