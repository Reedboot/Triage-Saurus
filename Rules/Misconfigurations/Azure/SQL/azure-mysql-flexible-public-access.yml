rules:
  - id: azure-mysql-flexible-public-access
    message: |
      MySQL Flexible Server has public network access enabled. Disable and deploy
      in a VNet using delegated subnet.
      ATTACK: nmap scan discovers port 3306 → brute force credentials with Hydra → dump all databases with mysqldump
      TOOLS: nmap, Hydra, mysqldump, MicroBurst, az-cli, Prowler
      CHAIN: public MySQL endpoint discovered → credential brute force → authenticated database access → full data exfiltration
      IMPACT: Full database exfiltration; credential theft enabling lateral movement to connected Azure services
    severity: ERROR
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "azurerm_mysql_flexible_server" "$NAME" {
            ...
            public_network_access_enabled = "Enabled"
            ...
          }
      - patterns:
          - pattern: |
              resource "azurerm_mysql_flexible_server" "$NAME" {
                ...
              }
          - pattern-not: |
              resource "azurerm_mysql_flexible_server" "$NAME" {
                ...
                public_network_access_enabled = "Disabled"
                ...
              }
      - pattern: |
          resource azurerm_mysql_flexible_server "$NAME" {
            ...
            public_network_access_enabled = "Enabled"
            ...
          }
      - patterns:
          - pattern: |
              resource azurerm_mysql_flexible_server "$NAME" {
                ...
              }
          - pattern-not: |
              resource azurerm_mysql_flexible_server "$NAME" {
                ...
                public_network_access_enabled = "Disabled"
                ...
              }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, azure]
      five_pillars: Pillar 1 (Network Security)
      internet_exposure: true
