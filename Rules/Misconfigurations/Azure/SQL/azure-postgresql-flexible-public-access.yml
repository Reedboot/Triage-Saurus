rules:
  - id: azure-postgresql-flexible-public-access
    message: |
      PostgreSQL Flexible Server has public network access enabled. Use
      `public_network_access_enabled = "Disabled"` and deploy within a VNet.
      ATTACK: Scan for port 5432 → brute force PostgreSQL credentials → execute COPY TO for bulk data exfiltration
      TOOLS: nmap, Hydra, psql, pg_dump, MicroBurst, az-cli, Prowler
      CHAIN: public PostgreSQL endpoint → credential brute force → authenticated access → bulk COPY TO exfiltration
      IMPACT: Full database exfiltration; potential RCE via COPY FROM PROGRAM on unpatched PostgreSQL instances
    severity: ERROR
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "azurerm_postgresql_flexible_server" "$NAME" {
            ...
            public_network_access_enabled = "Enabled"
            ...
          }
      - patterns:
          - pattern: |
              resource "azurerm_postgresql_flexible_server" "$NAME" {
                ...
              }
          - pattern-not: |
              resource "azurerm_postgresql_flexible_server" "$NAME" {
                ...
                public_network_access_enabled = "Disabled"
                ...
              }
      - pattern: |
          resource azurerm_postgresql_flexible_server "$NAME" {
            ...
            public_network_access_enabled = "Enabled"
            ...
          }
      - patterns:
          - pattern: |
              resource azurerm_postgresql_flexible_server "$NAME" {
                ...
              }
          - pattern-not: |
              resource azurerm_postgresql_flexible_server "$NAME" {
                ...
                public_network_access_enabled = "Disabled"
                ...
              }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, azure]
      five_pillars: Pillar 1 (Network Security)
      internet_exposure: true
