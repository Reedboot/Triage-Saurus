rules:
  - id: azure-user-force-password-change-disabled
    message: |
      Azure AD user created with force_password_change = false. Users should
      be required to change their initial password on first login.
      Set force_password_change = true for better security.
      ATTACK: Obtain initial temporary password (from provisioning email/ticket) → login to Azure AD without forced change → use known credentials for persistent access
      TOOLS: az-cli, ROADtools, MicroBurst, spray365, AADInternals
      CHAIN: credential exposure via provisioning channel → login with initial password → no forced change enforced → persistent access via known credentials → lateral movement
      IMPACT: Known initial credentials provide persistent unauthorized access; user may never change password enabling long-term access with predictable credentials
    severity: "INFO"
    languages: [terraform, hcl]
    pattern: |
      resource "azuread_user" "$NAME" {
        ...
        force_password_change = false
        ...
      }
    metadata:
      category: security
      subcategory: [iam]
      cwe: CWE-262
      confidence: HIGH
      likelihood: LOW
      impact: LOW
      technology: [terraform, azure]
