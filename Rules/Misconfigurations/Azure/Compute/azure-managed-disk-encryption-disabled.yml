rules:
  - id: azure-managed-disk-encryption-disabled
    message: |
      Azure Managed Disk has encryption_settings with enabled = false.
      Disabling disk encryption exposes data at rest if underlying storage is compromised.
      Remove the encryption_settings block (encryption is on by default) or set enabled = true.
    severity: ERROR
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "azurerm_managed_disk" "$NAME" {
            ...
            encryption_settings {
              enabled = false
            }
            ...
          }
    metadata:
      category: security
      subcategory: [encryption, cloud, storage]
      cwe: CWE-311
      confidence: HIGH
      likelihood: LOW
      impact: HIGH
      technology: [terraform, azure]
      five_pillars: Pillar 4 (Data Protection)
