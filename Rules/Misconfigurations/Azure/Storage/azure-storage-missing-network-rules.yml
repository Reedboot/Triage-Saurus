rules:
  - id: azure-storage-missing-network-rules
    message: |
      Storage accounts without network_rules blocks allow traffic from any network.
      Add network_rules with default_action = "Deny" and explicit allowlists or private endpoints.
      ATTACK: Enumerate storage endpoints → authenticate with leaked shared key → exfiltrate all containers from any network
      TOOLS: MicroBurst, az-cli, azcopy, AzureHound, BlobHunter, Storage Explorer
      CHAIN: no network restrictions → internet-accessible storage → shared key authentication → full container enumeration and bulk download
      IMPACT: Full storage account access from any network; all blob data exposed to exfiltration or ransomware encryption
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "azurerm_storage_account" "$NAME" {
            ...
          }
      - pattern-not: |
          resource "azurerm_storage_account" "$NAME" {
            ...
            network_rules {
              ...
            }
            ...
          }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, azure]
      five_pillars: Pillar 1 (Network Security)
      internet_exposure: true
