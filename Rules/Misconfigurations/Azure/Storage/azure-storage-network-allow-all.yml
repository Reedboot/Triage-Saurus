rules:
  - id: azure-storage-network-allow-all
    message: |
      Storage Account network rules set to 'Allow' by default.
      This allows public access. Set default_action to 'Deny' and
      whitelist specific networks.
      ATTACK: Access storage from any internet IP → enumerate all containers with shared key → bulk download all blobs
      TOOLS: az-cli, azcopy, MicroBurst, AzureHound, BlobHunter, Storage Explorer
      CHAIN: default Allow network rule → unrestricted internet access → container enumeration → bulk blob exfiltration or ransomware encryption
      IMPACT: Unrestricted internet access to storage account; complete data theft or ransomware encryption of all stored blobs
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "azurerm_storage_account" "$NAME" {
            ...
          }
      - pattern-not: |
          resource "azurerm_storage_account" "$NAME" {
            ...
            network_rules {
              default_action = "Deny"
              ...
            }
            ...
          }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-16
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, azure]
      five_pillars: Pillar 1 (Network Security)
      internet_exposure: true
