rules:
  - id: azure-function-app-no-ip-restrictions
    message: |
      Function App has no IP access restrictions. Add `ip_restriction` rules to
      limit access.
    severity: WARNING
    languages: [terraform, hcl]
    pattern-either:
      - patterns:
          - pattern: |
              resource "azurerm_linux_function_app" "$NAME" {
                ...
                site_config {
                  ...
                }
                ...
              }
          - pattern-not: |
              resource "azurerm_linux_function_app" "$NAME" {
                ...
                site_config {
                  ...
                  ip_restriction {
                    ...
                  }
                  ...
                }
                ...
              }
      - patterns:
          - pattern: |
              resource "azurerm_windows_function_app" "$NAME" {
                ...
                site_config {
                  ...
                }
                ...
              }
          - pattern-not: |
              resource "azurerm_windows_function_app" "$NAME" {
