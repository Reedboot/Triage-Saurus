rules:
  - id: azure-appservice-tls-version-old
    message: |
      Azure App Service is configured with a minimum TLS version below 1.2.
      TLS 1.0 and 1.1 have known vulnerabilities (POODLE, BEAST, SWEET32) and are
      deprecated by PCI-DSS, Microsoft, and most compliance frameworks.
      Set min_tls_version = "1.2" in the site_config block. TLS 1.3 is preferred
      where supported.
      ATTACK: Negotiate legacy TLS 1.0/1.1 with App Service → POODLE/BEAST/SWEET32 exploit → decrypt HTTPS → steal credentials
      TOOLS: testssl.sh, nmap ssl-enum-ciphers, SSLscan, Bettercap, Wireshark, SSLstrip
      CHAIN: legacy TLS negotiated → protocol downgrade attack → HTTPS session decryption → credential and token extraction → account takeover
      IMPACT: Application HTTPS traffic decrypted; authentication credential theft enabling persistent unauthorized application access
    severity: ERROR
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "azurerm_app_service" $NAME {
            ...
            site_config {
              ...
            }
            ...
          }
      - pattern-either:
          - pattern: |
              min_tls_version = "1.0"
          - pattern: |
              min_tls_version = "1.1"
    metadata:
      category: security
      subcategory: [tls, web, transport-security]
      cwe: CWE-326
      confidence: HIGH
      likelihood: HIGH
      impact: MEDIUM
      technology: [terraform, azure, app-service, tls]
      five_pillars: Pillar 4 (Encryption in Transit)
