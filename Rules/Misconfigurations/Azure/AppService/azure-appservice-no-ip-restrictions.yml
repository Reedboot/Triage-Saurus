rules:
  - id: azure-appservice-no-ip-restrictions
    message: |
      App Service has no IP access restrictions configured. The application is
      accessible from any internet IP. Add `ip_restriction` rules in `site_config`
      to limit access to known IP ranges.
    severity: WARNING
    languages: [terraform, hcl]
    pattern-either:
      - patterns:
          - pattern: |
              resource "azurerm_linux_web_app" "$NAME" {
                ...
                site_config {
                  ...
                }
                ...
              }
          - pattern-not: |
              resource "azurerm_linux_web_app" "$NAME" {
                ...
                site_config {
                  ...
                  ip_restriction {
                    ...
                  }
                  ...
                }
                ...
              }
      - patterns:
          - pattern: |
              resource "azurerm_windows_web_app" "$NAME" {
                ...
                site_config {
                  ...
                }
                ...
              }
          - pattern-not: |
              resource "azurerm_windows_web_app" "$NAME" {
                ...
                site_config {
                  ...
                  ip_restriction {
                    ...
                  }
                  ...
                }
                ...
              }
      - patterns:
          - pattern: |
              resource azurerm_linux_web_app "$NAME" {
                ...
                site_config {
                  ...
                }
                ...
              }
          - pattern-not: |
              resource azurerm_linux_web_app "$NAME" {
                ...
