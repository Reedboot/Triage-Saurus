          - pattern: |
              resource "azurerm_app_service" $NAME {
                ...
                site_config {
                  ...
                }
                ...
              }
          - pattern-not: |
              resource "azurerm_app_service" $NAME {
                ...
                site_config {
                  ...
                  ip_restriction {
                    ...
                  }
                  ...
                }
                ...
              }
