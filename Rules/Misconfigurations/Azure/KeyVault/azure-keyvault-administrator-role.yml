rules:
  - id: azure-keyvault-administrator-role
    message: |
      User group assigned Key Vault Administrator role. This grants full control
      over all secrets, keys, and certificates. Use principle of least privilege
      with specific roles like 'Key Vault Secrets User' instead.
      ATTACK: Compromise any group member identity → use Key Vault Administrator role → enumerate and read all secrets/keys/certs → use stolen credentials for lateral movement
      TOOLS: az-cli, AzureHound, MicroBurst, Stormspotter, ROADtools
      CHAIN: group member identity compromise → Key Vault Administrator access → secret/key/certificate exfiltration → lateral movement with stolen credentials
      IMPACT: All Key Vault secrets, keys, and certificates compromised; enables lateral movement across all services using those credentials
    severity:WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "azurerm_role_assignment" "$NAME" {
            ...
            role_definition_name = "Key Vault Administrator"
            ...
            principal_id = $GROUP_ID
            ...
          }
      - metavariable-regex:
          metavariable: $GROUP_ID
          regex: .*group.*
    metadata:
      category: security
      subcategory: [iam, cloud]
      cwe: CWE-269
      confidence: MEDIUM
      likelihood: LOW
      impact: HIGH
      technology: [terraform, azure]
