rules:
  - id: azure-keyvault-logging-disabled
    message: |
      Key Vault does not have diagnostic settings configured.
      Secret access and key operations will not be logged.
      Add azurerm_monitor_diagnostic_setting resource.
      ATTACK: Gain Key Vault access with over-privileged identity → enumerate and read all secrets → no diagnostic logs record the access → sustained undetected exfiltration
      TOOLS: az-cli, MicroBurst, AzureHound, Prowler, Stormspotter
      CHAIN: over-privileged identity access → Key Vault secret enumeration → secret reading without audit trail → sustained exfiltration undetected → compliance violation
      IMPACT: Secret access completely undetected; no forensic evidence of exfiltration; PCI-DSS/GDPR audit failures; impossible to determine blast radius after breach
    severity:WARNING
    languages: [terraform, hcl]
    pattern-regex: '(?s)^(?=[\s\S]*resource "azurerm_key_vault")(?![\s\S]*resource "azurerm_monitor_diagnostic_setting")'
    metadata:
      category: security
      subcategory: [audit-logging, cloud]
      cwe: CWE-778
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [terraform, azure]
      five_pillars: Pillar 3 (Audit Logging)
      compliance: [pci-dss, gdpr, soc2]
