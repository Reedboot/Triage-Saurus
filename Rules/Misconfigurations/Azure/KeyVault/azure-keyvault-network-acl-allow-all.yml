rules:
  - id: azure-keyvault-network-acl-allow-all
    message: |
      Key Vault network ACLs set to 'Allow' by default.
      This allows access from any network. Set default_action to 'Deny'
      and whitelist specific networks/IPs.
      ATTACK: Compromise identity with Key Vault access → connect from any internet IP → enumerate secrets → exfiltrate all credentials → lateral movement using stolen secrets
      TOOLS: az-cli, MicroBurst, AzureHound, curl, Stormspotter
      CHAIN: identity compromise → Key Vault access from any internet IP (default Allow) → secret exfiltration → lateral movement across all services using those credentials
      IMPACT: Default Allow network policy means any compromised identity with KV permissions can reach vault globally; no IP-based restriction as defense-in-depth
    severity: "WARNING"
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "azurerm_key_vault" "$NAME" {
            ...
          }
      - pattern-not: |
          resource "azurerm_key_vault" "$NAME" {
            ...
            network_acls {
              default_action = "Deny"
              ...
            }
            ...
          }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-16
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, azure]
      five_pillars: Pillar 1 (Network Security)
      internet_exposure: true
