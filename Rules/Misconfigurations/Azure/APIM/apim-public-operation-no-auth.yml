rules:
  - id: apim-public-operation-no-auth
    message: |
      APIM API operation policy has no authentication check.
      Operation policies without validate-jwt, check-header, or authentication-basic
      allow unauthenticated requests to reach the backend.
      Add JWT validation or authentication to the operation policy.
    languages:
      - hcl
    severity: WARNING
    patterns:
      - pattern-inside: |
          resource "azurerm_api_management_api_operation_policy" $NAME {
            ...
          }
      - pattern: xml_content = $CONTENT
      - pattern-not-regex: 'validate-jwt|authentication-basic|check-header'
    metadata:
      category: authorization
      cwe: "CWE-284: Improper Access Control"
      owasp: "A01:2021 - Broken Access Control"
