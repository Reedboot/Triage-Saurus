rules:
  - id: apim-public-operation-no-auth
    message: |
      APIM API operation policy has no authentication check.
      Operation policies without validate-jwt, check-header, or authentication-basic
      allow unauthenticated requests to reach the backend.
      Add JWT validation or authentication to the operation policy.
      ATTACK: Enumerate APIM API operations → send unauthenticated requests directly → call backend APIs without credentials
      TOOLS: curl, Postman, Burp Suite, ffuf, apim-cli
      CHAIN: public APIM endpoint discovery → unauthenticated operation invocation → backend API access → data exfiltration
      IMPACT: Unauthenticated access to backend APIs; full data exposure and potential abuse of API-connected services
    languages:
      - hcl
    severity: WARNING
    patterns:
      - pattern-inside: |
          resource "azurerm_api_management_api_operation_policy" $NAME {
            ...
          }
      - pattern: xml_content = $CONTENT
      - pattern-not-regex: 'validate-jwt|authentication-basic|check-header'
    metadata:
      category: authorization
      cwe: "CWE-284: Improper Access Control"
      owasp: "A01:2021 - Broken Access Control"
