rules:
  - id: azure-apim-no-vnet
    message: |
      API Management is not integrated with a Virtual Network. Without VNet
      integration, the management plane and API gateway endpoint are publicly
      accessible. Set `virtual_network_type` to `"Internal"` or `"External"` and
      use an Application Gateway for WAF protection.
    severity: WARNING
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "azurerm_api_management" "$NAME" {
            ...
            virtual_network_type = "None"
            ...
          }
      - patterns:
          - pattern: |
              resource "azurerm_api_management" "$NAME" {
                ...
              }
          - pattern-not: |
              resource "azurerm_api_management" "$NAME" {
                ...
                virtual_network_type = "..."
                ...
              }
      - pattern: |
          resource azurerm_api_management "$NAME" {
            ...
            virtual_network_type = "None"
            ...
          }
      - patterns:
          - pattern: |
              resource azurerm_api_management "$NAME" {
                ...
              }
          - pattern-not: |
              resource azurerm_api_management "$NAME" {
                ...
                virtual_network_type = "..."
                ...
              }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, azure]
      five_pillars: Pillar 1 (Network Security)
      internet_exposure: true
