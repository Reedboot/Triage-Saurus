rules:
  - id: apim-missing-jwt-validation
    message: |
      APIM API Policy missing JWT validation. Current policy only forwards requests without
      cryptographic authentication verification. This allows any holder of subscription key
      to access all API operations.
      
      CRITICAL RISK: Custom headers (CB-Logical-Execution-Context, CB-User-Context) are NOT
      cryptographically verified and can be spoofed.
      
      Recommended fix: Add JWT validation policy with validate-jwt element
      ATTACK: Capture APIM subscription key → forge custom header values (CB-User-Context) → skip JWT auth → access all operations as any user
      TOOLS: curl, Burp Suite, jwt_tool, Postman, mitmproxy
      CHAIN: subscription key enumeration → absent JWT validation → forged user context headers → access all backends as arbitrary identity
      IMPACT: Complete authentication bypass; attacker impersonates any user and accesses all API backends without valid tokens
    languages:
      - hcl
    severity: ERROR
    patterns:
      - pattern-inside: |
          resource "azurerm_api_management_api_policy" $NAME {
            ...
          }
      - pattern: xml_content = $CONTENT
      - pattern-not-regex: 'validate-jwt'
    metadata:
      category: authentication
      cwe: "CWE-306: Missing Authentication for Critical Function"
      owasp: "A07:2021 - Identification and Authentication Failures"
