rules:
  - id: azure-vm-password-auth-enabled
    message: |
      Linux VM allows password authentication.
      Passwords are vulnerable to brute force. Set
      disable_password_authentication = true and use SSH keys.
      ATTACK: Discover public SSH port via Shodan → brute force username/password → VM shell access → query IMDS at 169.254.169.254 → steal managed identity token → Azure API abuse
      TOOLS: nmap, Shodan, Hydra, Medusa, ssh, curl (IMDS), MicroBurst, spray365
      CHAIN: public SSH discovery → password brute force → interactive shell → IMDS query → managed identity token → Azure API access → lateral movement
      IMPACT: VM shell via brute force; managed identity token grants access to all Azure resources the identity can reach
    severity: ERROR
    languages: [terraform, hcl]
    pattern: |
      resource "azurerm_linux_virtual_machine" "$NAME" {
        ...
        disable_password_authentication = false
        ...
      }
    metadata:
      category: security
      subcategory: [authentication, cloud]
      cwe: CWE-521
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, azure]
      five_pillars: Pillar 2 (Access Control)
