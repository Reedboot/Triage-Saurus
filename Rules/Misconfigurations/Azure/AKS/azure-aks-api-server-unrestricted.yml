rules:
  - id: azure-aks-api-server-unrestricted
    message: |
      AKS cluster has no api_server_authorized_ip_ranges configured.
      The Kubernetes API server is publicly accessible from any IP address.
      Set api_server_authorized_ip_ranges to trusted CIDR ranges or use a private cluster.
      ATTACK: Shodan discovers public Kubernetes API server → authenticate with leaked kubeconfig → full cluster access and malicious pod deployment
      TOOLS: Shodan, kubectl, kube-hunter, az-cli, AzureHound, Peirates, masscan
      CHAIN: public API server → leaked kubeconfig or credential brute force → kubectl access → deploy privileged pods → node escape
      IMPACT: Full cluster takeover from internet; attacker deploys privileged containers, steals node credentials, and pivots to Azure IMDS
    severity: WARNING
    languages: [terraform, hcl]
    pattern-either:
      # Public cluster with no IP restrictions
      - patterns:
          - pattern: |
              resource "azurerm_kubernetes_cluster" "$NAME" {
                ...
              }
          - pattern-not: |
              resource "azurerm_kubernetes_cluster" "$NAME" {
                ...
                api_server_authorized_ip_ranges = [...]
                ...
              }
          - pattern-not: |
              resource "azurerm_kubernetes_cluster" "$NAME" {
                ...
                private_cluster_enabled = true
                ...
              }
      - patterns:
          - pattern: |
              resource azurerm_kubernetes_cluster "$NAME" {
                ...
              }
          - pattern-not: |
              resource azurerm_kubernetes_cluster "$NAME" {
                ...
                api_server_authorized_ip_ranges = [...]
                ...
              }
          - pattern-not: |
              resource azurerm_kubernetes_cluster "$NAME" {
                ...
                private_cluster_enabled = true
                ...
              }
      # Explicitly catch empty list [] which is equally insecure as absent (public cluster only)
      - patterns:
          - pattern-inside: |
              resource "azurerm_kubernetes_cluster" $NAME {
                ...
              }
          - pattern-not-inside: |
              resource "azurerm_kubernetes_cluster" $NAME {
                ...
                private_cluster_enabled = true
                ...
              }
          - pattern: |
              api_server_authorized_ip_ranges = []
      - patterns:
          - pattern-inside: |
              resource azurerm_kubernetes_cluster $NAME {
                ...
              }
          - pattern-not-inside: |
              resource azurerm_kubernetes_cluster $NAME {
                ...
                private_cluster_enabled = true
                ...
              }
          - pattern: |
              api_server_authorized_ip_ranges = []
    metadata:
      category: security
      subcategory: [network, cloud, kubernetes]
      cwe: CWE-284
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, azure, kubernetes]
      five_pillars: Pillar 1 (Network Security)
      internet_exposure: true
