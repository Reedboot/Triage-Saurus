rules:
  - id: azure-kubernetes-privileged-sp-in-secret
    message: |
      Kubernetes secret stores Service Principal credentials with broad
      permissions (Contributor/Owner). If pod is compromised, attacker gains
      full environment access. Use Managed Identity instead.
      ATTACK: Compromise pod via app exploit → kubectl get secret → extract SP client_id/secret → az login → full Azure subscription access
      TOOLS: kubectl, az-cli, AzureHound, Stormspotter, truffleHog, Peirates
      CHAIN: pod exploit → kubectl get secret → SP credentials extracted → az login --service-principal → Azure RBAC as Contributor/Owner
      IMPACT: Full Azure subscription compromise; Contributor/Owner SP credentials grant control of all Azure resources in scope
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "kubernetes_secret_v1" "$NAME" {
            ...
            data = {
              ...
              secret = $SP_SECRET
              ...
            }
            ...
          }
      - metavariable-regex:
          metavariable: $SP_SECRET
          regex: .*service_principal.*
    metadata:
      category: security
      subcategory: [secrets, cloud, kubernetes]
      cwe: CWE-522
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, azure, kubernetes]
