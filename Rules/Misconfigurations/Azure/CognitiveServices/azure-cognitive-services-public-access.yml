rules:
  - id: azure-cognitive-services-public-access
    message: |
      Azure Cognitive Services account has public network access enabled.
      
      Cognitive Services without private endpoint allows AI/ML API calls from
      any internet IP. This means:
      1. API key brute force from the internet (keys rotate slowly)
      2. All AI prompts and responses traverse the public internet without
         network-layer controls
      3. Model outputs containing sensitive completions are exposed to MITM
      4. Usage and billing can be abused by leaked API keys
      
      Remediation: Set public_network_access = "Disabled" and use
      private_endpoint to restrict access to VNet-connected clients only.
      ATTACK: Discover exposed Cognitive Services endpoint → brute force or steal API key → abuse AI inference API → exfiltrate sensitive completions or trigger cost spike
      TOOLS: az-cli, MicroBurst, Shodan, curl, Prowler, Burp Suite
      CHAIN: public endpoint discovery → API key brute force or leak → unauthorized API access → sensitive prompt/response interception or resource cost abuse
      IMPACT: API key compromise enables unlimited inference calls causing cost spike; sensitive AI prompts and responses exposed; MITM possible on public internet transit
    severity: "WARNING"
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "azurerm_cognitive_account" "$_" {
            ...
          }
      - pattern: |
          public_network_access = "Enabled"
    metadata:
      category: security
      subcategory: [network, ai]
      cwe: CWE-284
      technology: [terraform, azure, cognitive-services]
      internet_exposure: true
