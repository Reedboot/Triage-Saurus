rules:
  - id: azure-security-center-free-tier
    message: |
      Azure Security Center subscription pricing is set to the Free tier.
      The Free tier lacks Defender threat detection, vulnerability assessments, and just-in-time VM access.
      Set tier = "Standard" or higher to enable Microsoft Defender for the resource type.
      ATTACK: Attack any Azure resource without Defender threat detection → no JIT VM access control → no vulnerability assessments → no threat intelligence alerts → exploit proceeds undetected
      TOOLS: az-cli, MicroBurst, Prowler, Metasploit, nmap, Shodan
      CHAIN: Free tier gap → no Defender anomaly detection → no JIT access enforcement → open management ports exploited → VM or service compromise without any alert
      IMPACT: No threat detection coverage across Defender-covered resource types; VM JIT access unavailable; vulnerability assessments absent; attacks proceed fully undetected
    severity: WARNING
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "azurerm_security_center_subscription_pricing" "$NAME" {
            ...
            tier = "Free"
            ...
          }
      - pattern: |
          resource azurerm_security_center_subscription_pricing "$NAME" {
            ...
            tier = "Free"
            ...
          }
    metadata:
      category: security
      subcategory: [audit-logging, cloud, monitoring]
      cwe: CWE-778
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [terraform, azure]
      five_pillars: Pillar 3 (Audit Logging)
