rules:
  - id: azure-security-center-free-tier
    message: |
      Azure Security Center subscription pricing is set to the Free tier.
      The Free tier lacks Defender threat detection, vulnerability assessments, and just-in-time VM access.
      Set tier = "Standard" or higher to enable Microsoft Defender for the resource type.
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "azurerm_security_center_subscription_pricing" "$NAME" {
            ...
            tier = "Free"
            ...
          }
    metadata:
      category: security
      subcategory: [audit-logging, cloud, monitoring]
      cwe: CWE-778
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [terraform, azure]
      five_pillars: Pillar 3 (Audit Logging)
