rules:
  - id: azure-security-center-alerts-disabled
    message: |
      Azure Security Center contact has alert notifications or admin alerts explicitly disabled.
      Security incidents will not be surfaced to responsible contacts.
      Set alert_notifications = true and alerts_to_admins = true.
      ATTACK: Execute any attack (lateral movement, data exfiltration, identity abuse) → Defender detects and generates alerts → alerts never forwarded to contacts → attack proceeds unnoticed
      TOOLS: az-cli, AzureHound, Stormspotter, Prowler, Metasploit
      CHAIN: initial compromise → sustained attack activity → Defender alerts generated → alert notifications disabled → security team never notified → prolonged dwell time
      IMPACT: Security team receives no notifications of active attacks; mean time to detect (MTTD) increases dramatically; breach dwell time extended without any human response
    severity: WARNING
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "azurerm_security_center_contact" "$NAME" {
            ...
            alert_notifications = false
            ...
          }
      - pattern: |
          resource azurerm_security_center_contact "$NAME" {
            ...
            alert_notifications = false
            ...
          }
      - pattern: |
          resource "azurerm_security_center_contact" "$NAME" {
            ...
            alerts_to_admins = false
            ...
          }
      - pattern: |
          resource azurerm_security_center_contact "$NAME" {
            ...
            alerts_to_admins = false
            ...
          }
    metadata:
      category: security
      subcategory: [audit-logging, cloud, monitoring]
      cwe: CWE-778
      confidence: HIGH
      likelihood: LOW
      impact: MEDIUM
      technology: [terraform, azure]
      five_pillars: Pillar 3 (Audit Logging)
