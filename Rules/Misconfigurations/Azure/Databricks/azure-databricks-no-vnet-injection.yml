rules:
  - id: azure-databricks-no-vnet-injection
    message: |
      Azure Databricks workspace does not use VNet injection.
      
      Without VNet injection, Databricks clusters run in a Databricks-managed VNet
      with no organization-controlled egress filtering. This means:
      1. Clusters can establish outbound connections to any internet endpoint
      2. Compromised notebooks can exfiltrate data to attacker infrastructure
      3. No organization firewall/NSG rules apply to cluster traffic
      4. Data exfiltration via curl/python requests is undetectable
      
      Remediation: Configure custom_parameters with virtual_network_id,
      public_subnet_name, and private_subnet_name to enable VNet injection.
      ATTACK: Compromise Databricks notebook via misconfigured permissions → execute arbitrary Python/Scala → establish outbound connection to C2 → exfiltrate data via unfiltered internet egress
      TOOLS: az-cli, curl, Python (in notebook), MicroBurst, netcat, Databricks REST API
      CHAIN: notebook access via weak permissions → arbitrary code execution in cluster → unfiltered egress to internet → data exfiltration to attacker infrastructure
      IMPACT: No egress filtering means compromised notebooks can exfiltrate any data processed by cluster to internet; organization firewall and NSG rules do not apply
    severity: "WARNING"
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "azurerm_databricks_workspace" "$_" {
            ...
          }
      - pattern-not: |
          resource "azurerm_databricks_workspace" "$_" {
            ...
            custom_parameters {
              ...
              virtual_network_id = ...
              ...
            }
            ...
          }
    metadata:
      category: security
      subcategory: [network, data-platform]
      cwe: CWE-668
      technology: [terraform, azure, databricks]
