rules:
  - id: kubernetes-serviceaccount-token-automount
    message: |
      ServiceAccount does not explicitly set automountServiceAccountToken: false.
      By default Kubernetes automatically mounts a service-account token into every
      pod that uses this account (or any pod that omits serviceAccountName). The token
      is mounted at /var/run/secrets/kubernetes.io/serviceaccount/token and grants
      whatever RBAC rights the service account holds to any process inside the container.

      If the pod does not need to call the Kubernetes API, set:
        automountServiceAccountToken: false
      on the ServiceAccount or on the individual Pod spec to remove the token.
      This eliminates an entire class of privilege-escalation paths from compromised pods.

      ATTACK: Compromised container → cat /var/run/secrets/kubernetes.io/serviceaccount/token → kubectl --token=<token> → RBAC escalation
      TOOLS: kubectl, curl
      CHAIN: container compromise → read auto-mounted service account token → authenticate to K8s API → exploit bound RBAC permissions → cluster privilege escalation
      IMPACT: Kubernetes API access from any compromised container; privilege escalation dependent on bound RBAC roles
    severity: WARNING
    languages: [yaml]
    patterns:
      - pattern: |
          kind: ServiceAccount
          ...
      - pattern-not-regex: 'automountServiceAccountToken:\s*false'
    metadata:
      category: security
      subcategory: [kubernetes, rbac, token-exposure]
      cwe: CWE-522
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      technology: [kubernetes]
      five_pillars: Pillar 2 (Access Control)
