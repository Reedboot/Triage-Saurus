rules:
  - id: kubernetes-rbac-secrets-read
    message: |
      RBAC Role or ClusterRole grants read access (get, list, or watch) on Secrets.
      Any workload or user bound to this role can retrieve all Secrets in scope,
      including database passwords, API keys, and service-account tokens.

      In Kubernetes the default namespace often holds cross-service credentials.
      A single compromised pod with this role binding can exfiltrate all secrets
      accessible to it, enabling lateral movement to every dependent service.

      Use least-privilege RBAC — grant access to specific named Secrets only, and
      prefer external secret stores (Key Vault, AWS Secrets Manager, GCP Secret Manager)
      with workload identity rather than Kubernetes Secrets.

      ATTACK: Compromised pod → bound ClusterRole with secrets/get → kubectl get secret --all-namespaces → plaintext credentials
    severity: ERROR
    languages: [yaml]
    pattern-regex: '(?s)kind:\s+(?:Cluster)?Role[\s\S]*?resources:[\s\S]*?\bsecrets\b[\s\S]*?verbs:[\s\S]*?\b(?:get|list|watch|\*)\b'
    metadata:
      category: security
      subcategory: [kubernetes, rbac, credential-theft]
      cwe: CWE-732
      confidence: MEDIUM
      likelihood: HIGH
      impact: CRITICAL
      technology: [kubernetes]
      five_pillars: Pillar 2 (Access Control)
