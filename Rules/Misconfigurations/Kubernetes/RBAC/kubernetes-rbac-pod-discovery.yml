rules:
  - id: kubernetes-rbac-pod-discovery
    message: |
      RBAC role allows broad pod/service discovery (list/watch).
      This enables reconnaissance for lateral movement.
      Restrict to specific namespaces/resources.
    severity: WARNING
    languages: [yaml]
    pattern-regex: '(?s)kind:\s+ClusterRole[\s\S]*?resources:.*(?:pods|services|secrets)[\s\S]*?verbs:.*(?:list|watch|\*)'
    metadata:
      category: security
      subcategory: [kubernetes, iam]
      cwe: CWE-200
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [kubernetes]
