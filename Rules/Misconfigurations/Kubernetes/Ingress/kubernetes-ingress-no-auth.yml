rules:
  - id: kubernetes-ingress-no-auth
    message: |
      Ingress detected without authentication annotations.
      Publicly exposed services should have OAuth/OIDC/IP restrictions.
      Add nginx.ingress.kubernetes.io/auth annotations.
      ATTACK: curl https://<ingress-host>/admin → access internal APIs without auth → enumerate endpoints with ffuf → exfiltrate sensitive data
      TOOLS: curl, ffuf, gobuster, nuclei, Burp Suite
      CHAIN: unauthenticated ingress → internal API access → endpoint enumeration → data exfiltration → lateral movement to backend pods
      IMPACT: Unrestricted access to internal services; sensitive data exfiltration; potential pivot to backend pods and databases
    severity: WARNING
    languages: [yaml]
    patterns:
      - pattern: |
          kind: Ingress
          ...
      - pattern-not-regex: 'nginx\.ingress\.kubernetes\.io/auth-url'
      - pattern-not-regex: 'nginx\.ingress\.kubernetes\.io/whitelist-source-range'
    metadata:
      category: security
      subcategory: [kubernetes, authentication]
      cwe: CWE-306
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      technology: [kubernetes, nginx]
