rules:
  - id: kubernetes-ingress-no-rate-limit
    message: |
      Ingress without rate limiting annotations.
      Services are vulnerable to DoS/brute force attacks.
      Add nginx.ingress.kubernetes.io/limit-rps annotation.
      ATTACK: wfuzz/hydra → brute force login endpoints → exhaust application worker threads → service unavailable to legitimate users
      TOOLS: hydra, wfuzz, ab, vegeta, slowloris
      CHAIN: no rate limiting → brute force credentials → account takeover or DoS → service disruption for all users
      IMPACT: Credential brute force leading to account compromise; DoS causing service unavailability; amplified impact on downstream services
    severity: INFO
    languages: [yaml]
    patterns:
      - pattern: |
          kind: Ingress
          ...
      - pattern-not-regex: '(?m)^\s+nginx\.ingress\.kubernetes\.io/limit-rps\s*:'
    metadata:
      category: security
      subcategory: [kubernetes, dos-protection]
      cwe: CWE-770
      confidence: MEDIUM
      likelihood: LOW
      impact: MEDIUM
      technology: [kubernetes, nginx]
