rules:
  - id: kubernetes-secret-base64-credentials
    message: |
      Kubernetes Secret contains data values that decode from base64 to what appear
      to be database connection strings, passwords, or API keys. Kubernetes Secrets
      are base64-encoded by default — NOT encrypted. Any user or service account with
      get/list permissions on Secrets in the namespace (or cluster-wide via RBAC)
      can retrieve and decode the credentials trivially with:
        kubectl get secret <name> -o jsonpath='{.data.<key>}' | base64 -d

      Encrypt Secrets at rest using Azure Key Vault Provider (CSI driver), AWS Secrets
      Manager integration, or enable Kubernetes Encryption Configuration with KMS provider.
      Never commit Kubernetes manifests with hardcoded secret values to source control.

      ATTACK: kubectl get secret → base64 -d → plaintext DB password / API key → direct database / service access
    severity: ERROR
    languages: [yaml]
    patterns:
      - pattern: |
          apiVersion: v1
          kind: Secret
          ...
          data:
            ...
      - pattern-regex: '(?i)(password|passwd|pwd|secret|key|token|connectionstring):\s+[A-Za-z0-9+/]{20,}={0,2}'
    metadata:
      category: security
      subcategory: [secrets, credentials, kubernetes]
      cwe: CWE-798
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
      technology: [kubernetes, yaml, secrets]
      five_pillars: Pillar 5 (Data Protection)
