rules:
  - id: alicloud-oss-bucket-no-encryption
    message: |
      OSS bucket does not have server-side encryption configured.
      Without encryption, data at rest is unprotected.
      Add a server_side_encryption_rule block to enable SSE.
      ATTACK: compromised OSS credentials → ossutil cp oss://<bucket>/ . → download all plaintext unencrypted objects
      TOOLS: aliyun-cli, ossutil, cloud_enum
      CHAIN: storage access compromise → unencrypted object download → plaintext data exfiltration → data breach
      IMPACT: Plaintext exfiltration of all bucket data; no encryption layer to impede attackers with storage-level access
    severity: MEDIUM
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "alicloud_oss_bucket" "$NAME" {
            ...
          }
      - pattern-not: |
          resource "alicloud_oss_bucket" "$NAME" {
            ...
            server_side_encryption_rule {
              ...
            }
            ...
          }
    metadata:
      category: security
      subcategory: [encryption, cloud]
      cwe: CWE-311
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [terraform, alicloud]
      five_pillars: Pillar 5 (Data Protection)
