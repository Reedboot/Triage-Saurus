rules:
  - id: alicloud-oss-bucket-public-access
    message: |
      OSS bucket ACL allows public access.
      Public buckets expose data to the internet without authentication.
      Set acl = "private" to restrict access.
      ATTACK: ossutil ls oss://<bucket> --endpoint oss-<region>.aliyuncs.com → enumerate and download all objects unauthenticated
      TOOLS: aliyun-cli, ossutil, GrayhatWarfare, cloud_enum
      CHAIN: internet access → public OSS bucket discovery → unauthenticated object enumeration → mass data download → data breach
      IMPACT: Full unauthenticated access to all objects in the bucket; sensitive data exposed to the internet
    severity: HIGH
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "alicloud_oss_bucket" "$NAME" {
            ...
            acl = "public-read"
            ...
          }
      - pattern: |
          resource "alicloud_oss_bucket" "$NAME" {
            ...
            acl = "public-read-write"
            ...
          }
      - patterns:
          - pattern: |
              resource "alicloud_oss_bucket" "$NAME" {
                ...
              }
          - pattern-not: |
              resource "alicloud_oss_bucket" "$NAME" {
                ...
                acl = "..."
                ...
              }
    metadata:
      category: security
      subcategory: [access-control, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, alicloud]
      five_pillars: Pillar 1 (Network Security)
