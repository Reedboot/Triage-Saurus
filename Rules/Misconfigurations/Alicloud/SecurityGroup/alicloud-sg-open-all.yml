rules:
  - id: alicloud-sg-open-all
    message: |
      Security group rule allows all traffic from any IP (0.0.0.0/0).
      This exposes all ports and protocols to the internet, creating a critical attack surface.
      Restrict to only required ports and known source IP ranges.
      ATTACK: nmap -sV -p- <instance-ip> → enumerate all open services → exploit any vulnerable service → instance compromise
      TOOLS: nmap, masscan, Metasploit, Shodan
      CHAIN: internet scanning → all-port discovery → service enumeration → vulnerability exploitation → instance and network compromise
      IMPACT: Complete attack surface exposure; all services reachable from internet with no network-level controls
    severity: CRITICAL
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "alicloud_security_group_rule" "$NAME" {
            ...
            type = "ingress"
            ...
            port_range = "-1/-1"
            ...
            cidr_ip = "0.0.0.0/0"
            ...
          }
      - pattern: |
          resource "alicloud_security_group_rule" "$NAME" {
            ...
            type = "ingress"
            ...
            ip_protocol = "all"
            ...
            cidr_ip = "0.0.0.0/0"
            ...
          }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL
      technology: [terraform, alicloud]
      five_pillars: Pillar 1 (Network Security)
