rules:
  - id: alicloud-ram-policy-wildcard
    message: |
      RAM policy grants wildcard (*) permissions on Action or Resource.
      Wildcard permissions violate the principle of least privilege and can lead to privilege escalation.
      Restrict policy statements to only the required actions and specific resource ARNs.
      ATTACK: compromised RAM identity → aliyun ram list-policies → confirm wildcard Action → perform any operation on any resource
      TOOLS: aliyun-cli, ScoutSuite, Pacu (adapted)
      CHAIN: credential compromise → RAM policy enumeration → wildcard permissions confirmed → full account resource access → data exfiltration
      IMPACT: Full Alibaba Cloud account compromise; all services and data accessible to the overpermissioned identity
    severity: HIGH
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "alicloud_ram_policy" $NAME {
            ...
          }
      - pattern-regex: 'Action\s*=\s*\["?\*"?\]'
    metadata:
      category: security
      subcategory: [iam, cloud]
      cwe: CWE-250
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, alicloud]
      five_pillars: Pillar 3 (Identity & Access Management)
