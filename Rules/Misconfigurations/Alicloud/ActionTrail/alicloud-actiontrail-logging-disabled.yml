rules:
  - id: alicloud-actiontrail-logging-disabled
    message: |
      ActionTrail (Audit) is not enabled or logging is disabled. Without audit logs,
      user activity and configuration changes are not recorded. Enable ActionTrail
      with appropriate trails for security auditing.
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "alicloud_actiontrail_trail" $NAME {
            ...
          }
      - pattern: trail_name = $TRAIL_NAME
      - pattern-not-regex: 'oss_bucket_name\s*=|sls_project_arn\s*='
    metadata:
      category: audit
      subcategory: [logging]
      confidence: MEDIUM
      technology: [terraform, alicloud]
