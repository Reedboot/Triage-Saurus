rules:
  - id: gcp-cloud-functions-env-credentials
    message: |
      GCP Cloud Function has hardcoded credentials in environment variables.
      Environment variables in Cloud Functions are accessible to anyone with
      cloudfunctions.functions.get or cloudfunctions.functions.list IAM permissions,
      and are often logged in deployment pipelines. Secrets must not be stored as
      environment variable literals.

      Use Secret Manager to store credentials and reference secrets via the
      secret_environment_variables block in google_cloudfunctions_function, or
      use the Secret Manager API at runtime.
    severity: ERROR
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "google_cloudfunctions_function" $NAME {
            ...
            environment_variables = {
              ...
            }
            ...
          }
      - pattern-regex: '(?i)(password|secret|key|token|credential|passwd|pwd)\s*=\s*"[^"$\{]{6,}"'
    metadata:
      category: security
      subcategory: [secrets, credentials]
      cwe: CWE-798
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, gcp, cloud-functions, secrets]
      five_pillars: Pillar 5 (Data Protection)
