rules:
  - id: gcp-pubsub-public-policy
    message: |
      GCP Pub/Sub topic or subscription has an IAM binding granting access to allUsers
      or allAuthenticatedUsers. This allows unauthenticated message publishing or
      subscription from the internet. Attackers can inject messages to poison
      processing pipelines, or subscribe to drain the topic and exfiltrate event data.

      Remove allUsers/allAuthenticatedUsers from Pub/Sub IAM and grant access
      only to specific service accounts using least-privilege roles
      (roles/pubsub.publisher or roles/pubsub.subscriber).

      ATTACK: gcloud pubsub topics publish <topic> --message='{"type":"admin","payload":"..."}' (no auth for allUsers) → inject malicious message → poison downstream processing pipeline
      TOOLS: gcloud, curl (Pub/Sub REST API), google-cloud-pubsub Python SDK, nuclei
      CHAIN: allUsers publisher → inject crafted message → downstream Cloud Function/Dataflow/App Engine processes message → deserialization or injection vulnerability triggered → RCE or data corruption
      IMPACT: Message injection into processing pipelines enables business logic abuse, data poisoning, or RCE in downstream consumers; allUsers subscriber drains topic and exfiltrates all event data
    severity: WARNING
    languages: [terraform, hcl]
    pattern-either:
      - patterns:
          - pattern-inside: |
              resource "google_pubsub_topic_iam_binding" $NAME {
                ...
              }
          - pattern: |
              members = [..., "allUsers", ...]
      - patterns:
          - pattern-inside: |
              resource "google_pubsub_subscription_iam_member" $NAME {
                ...
              }
          - pattern: |
              member = "allUsers"
      - patterns:
          - pattern-inside: |
              resource "google_pubsub_topic_iam_member" $NAME {
                ...
              }
          - pattern: |
              member = "allUsers"
    metadata:
      category: security
      subcategory: [messaging, exposure, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, gcp, pubsub]
      five_pillars: Pillar 2 (Identity & Access Management)
      internet_exposure: true
