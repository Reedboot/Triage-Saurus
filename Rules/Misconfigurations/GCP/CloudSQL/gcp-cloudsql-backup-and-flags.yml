  - id: gcp-cloudsql-postgres-log-flags-missing
    message: |
      Cloud SQL PostgreSQL instance is missing recommended database_flags for audit logging.
      Without these flags, failed authentication attempts, connection events, and query
      activity are not logged, making forensic investigation and compliance reporting
      difficult.
      Add the following database_flags:
        - log_checkpoints = on
        - log_connections = on
        - log_disconnections = on
        - log_lock_waits = on
        - log_min_messages = WARNING
        - connection_throttling = on (for PostgreSQL 9.6+)

      ATTACK: brute-force PostgreSQL credentials → connections succeed silently → query sensitive tables → exfiltrate data with no log evidence due to missing log_connections/log_disconnections
      TOOLS: hydra, pgcli, metasploit (auxiliary/scanner/postgres/postgres_login), gcloud (gcloud sql instances describe)
      CHAIN: credential attack or SQL injection → DB access → exfiltration occurs → no log_connections/log_disconnections entries → incident response has no audit trail → dwell time extended
      IMPACT: Complete blind spot in forensic investigation; attacker can access, exfiltrate, or modify data with no connection or query audit trail surviving in Cloud Logging
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "google_sql_database_instance" $NAME {
            ...
          }
      - pattern-regex: 'database_version\s*=\s*"POSTGRES'
      - pattern-not: |
          database_flags {
            name  = "log_checkpoints"
            value = "on"
          }
    metadata:
      category: security
      subcategory: [logging, audit, database]
      cwe: CWE-778
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [terraform, gcp, cloud-sql, postgresql]
      five_pillars: Pillar 6 (Monitoring & Logging)

  - id: gcp-bigquery-dataset-public-access
    message: |
      BigQuery dataset grants access to allAuthenticatedUsers or allUsers, exposing data
      to all Google-authenticated users or the entire internet respectively.
      Remove the special_group access blocks granting these roles. Use specific
      service accounts, Google groups, or domain restrictions instead.

      ATTACK: bq ls --project_id=<project> (no auth for allUsers) → bq query 'SELECT * FROM dataset.table' → stream full dataset to attacker-controlled storage
      TOOLS: bq (BigQuery CLI), gcloud, curl (BigQuery REST API), google-cloud-bigquery Python SDK
      CHAIN: allUsers dataset access → enumerate tables → bulk query export → bq extract to attacker GCS bucket → full data exfiltration without any authentication
      IMPACT: Full exfiltration of all BigQuery tables in the dataset; for allUsers, accessible by the entire internet without any Google account
    severity: ERROR
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "google_bigquery_dataset" $NAME {
            ...
            access {
              ...
            }
            ...
          }
      - pattern-either:
          - pattern: |
              special_group = "allAuthenticatedUsers"
          - pattern: |
              special_group = "allUsers"
    metadata:
      category: security
      subcategory: [access-control, data-exposure, bigquery]
      cwe: CWE-284
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, gcp, bigquery]
      five_pillars: Pillar 2 (Identity & Access)
