rules:
  - id: oci-db-publicly-accessible
    message: |
      OCI Autonomous Database is publicly accessible.
      Set is_access_control_enabled = true to restrict access via ACL rules.
      ATTACK: nmap -p 1521 0.0.0.0/0 → discover public OCI ATP → Hydra brute force credentials → full data access
      TOOLS: nmap, masscan, sqlplus, Hydra, Metasploit
      CHAIN: internet scanning → public DB discovery → credential brute force → DB authentication → full data access
      IMPACT: Full database compromise including all stored data, PII, and application secrets
    severity: HIGH
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "oci_database_autonomous_database" "$NAME" {
            ...
          }
      - pattern-not: |
          resource "oci_database_autonomous_database" "$NAME" {
            ...
            is_access_control_enabled = true
            ...
          }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, oci]
      five_pillars: Pillar 1 (Network Security)
