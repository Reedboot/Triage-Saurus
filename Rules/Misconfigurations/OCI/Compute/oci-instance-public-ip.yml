rules:
  - id: oci-instance-public-ip
    message: |
      OCI Compute instance has a public IP assigned.
      Use private subnets and a load balancer for internet-facing traffic
      instead of assigning public IPs directly to instances.
      ATTACK: nmap -sV <public-ip> → identify open services → brute force SSH/RDP or exploit known CVEs → instance compromise
      TOOLS: nmap, masscan, Metasploit, Hydra
      CHAIN: internet scanning → public IP discovery → service enumeration → exploitation → instance compromise
      IMPACT: Direct compromise of compute instance and all data/services accessible from it
    severity: WARNING
    languages: [terraform, hcl]
    pattern: |
      resource "oci_core_instance" "$NAME" {
        ...
        create_vnic_details {
          ...
          assign_public_ip = true
          ...
        }
        ...
      }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [terraform, oci]
      five_pillars: Pillar 1 (Network Security)
