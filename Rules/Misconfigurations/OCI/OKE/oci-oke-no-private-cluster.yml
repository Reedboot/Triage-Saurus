rules:
  - id: oci-oke-no-private-cluster
    message: |
      OKE cluster API endpoint is publicly accessible.
      Set is_public_ip_enabled = false in the endpoint_config block
      to restrict API server access to private networks only.
      ATTACK: kubectl --server https://<public-endpoint> get secrets → enumerate K8s resources → extract cluster secrets
      TOOLS: kubectl, kube-hunter, k9s, Metasploit kubernetes modules
      CHAIN: internet access → public K8s API discovery → stolen kubeconfig or RBAC misconfiguration → cluster enumeration → secret extraction
      IMPACT: Full Kubernetes cluster compromise including all workloads, secrets, and service account tokens
    severity: HIGH
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "oci_containerengine_cluster" "$NAME" {
            ...
          }
      - pattern-not: |
          resource "oci_containerengine_cluster" "$NAME" {
            ...
            endpoint_config {
              ...
              is_public_ip_enabled = false
              ...
            }
            ...
          }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, oci]
      five_pillars: Pillar 1 (Network Security)
