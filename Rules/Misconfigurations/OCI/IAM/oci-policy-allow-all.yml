rules:
  - id: oci-policy-allow-all
    message: |
      OCI IAM policy grants all-resources access.
      Apply the principle of least privilege by specifying resource types
      instead of using all-resources wildcards.
    severity: HIGH
    languages: [terraform, hcl]
    patterns:
      - pattern-inside: |
          resource "oci_identity_policy" $NAME {
            ...
          }
      - pattern-regex: 'all-resources'
    metadata:
      category: security
      subcategory: [iam, cloud]
      cwe: CWE-250
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, oci]
      five_pillars: Pillar 3 (Identity & Access Management)
