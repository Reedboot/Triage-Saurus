rules:
  - id: oci-security-list-open-ssh
    message: |
      OCI Security List allows SSH (port 22) from the internet (0.0.0.0/0).
      Restrict SSH ingress to known, trusted IP ranges or use a bastion service.
      ATTACK: nmap -p 22 0.0.0.0/0 → discover open SSH → Hydra brute force credentials or leaked key → instance access
      TOOLS: nmap, masscan, Hydra, ssh-audit, Metasploit
      CHAIN: internet scanning → open SSH discovery → credential brute force → instance compromise → lateral movement
      IMPACT: Full instance compromise with potential for lateral movement across the VCN
    severity: HIGH
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "oci_core_security_list" "$NAME" {
            ...
            ingress_security_rules {
              ...
              source = "0.0.0.0/0"
              ...
              tcp_options {
                ...
                min = 22
                max = 22
                ...
              }
              ...
            }
            ...
          }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [terraform, oci]
      five_pillars: Pillar 1 (Network Security)
