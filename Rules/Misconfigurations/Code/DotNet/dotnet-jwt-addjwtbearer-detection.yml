rules:
  - id: dotnet-jwt-addjwtbearer-detection
    message: |
      JWT Bearer authentication is configured with insecure token validation parameters.
      ValidateIssuer=false, ValidateAudience=false, ValidateLifetime=false, or
      ValidateIssuerSigningKey=false allow attackers to forge tokens with arbitrary claims,
      use expired tokens, or bypass signature verification entirely.
      All validation parameters should be set to true in production.
      ATTACK: forge JWT with arbitrary claims (ValidateIssuer=false, alg:none) → set role=admin in payload → API accepts token → bypass authorization → privileged endpoint access
      TOOLS: jwt_tool, Burp Suite, jwt.io, python-jose, hashcat (alg:none attack)
      CHAIN: disabled JWT validation → forge arbitrary claims/identity → API accepts forged token → role/permission bypass → privileged endpoint access → data manipulation
      IMPACT: Complete authentication bypass; arbitrary identity and role claims accepted; token replay and alg:none attacks viable; full API access without valid credentials
    severity: ERROR
    languages: [csharp]
    pattern-either:
      - pattern-regex: 'ValidateIssuer\s*=\s*false'
      - pattern-regex: 'ValidateAudience\s*=\s*false'
      - pattern-regex: 'ValidateLifetime\s*=\s*false'
      - pattern-regex: 'ValidateIssuerSigningKey\s*=\s*false'
      - pattern-regex: 'RequireSignedTokens\s*=\s*false'
    metadata:
      category: security
      subcategory: [authentication, jwt]
      cwe: CWE-347
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL
      technology: [dotnet, csharp, aspnet, jwt]
      five_pillars: Pillar 2 (Identity & Access Management)
