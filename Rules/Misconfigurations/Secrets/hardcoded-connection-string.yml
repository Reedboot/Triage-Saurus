rules:
  - id: hardcoded-connection-string
    message: |
      Hardcoded connection string detected with embedded credentials (AccountKey, SharedAccessKey,
      or other secrets). Connection strings in source/config files are committed to version control
      and can expose production credentials to all repo contributors and CI/CD logs.
      Move connection strings to Key Vault, environment variables, or managed identity.
    severity: ERROR
    languages: [generic]
    pattern-regex: '(?i)(?:AccountKey|SharedAccessKey|AccountName=.*AccountKey|DefaultEndpointsProtocol=https.*AccountKey)=[A-Za-z0-9+/=]{20,}'
    pattern-not-regex: '(\$\{|\$\(|%)[A-Za-z_][A-Za-z0-9_]*(\}|\)|%)'
    metadata:
      category: security
      subcategory: [secrets, credentials]
      cwe: CWE-798
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [azure, storage, sql]
