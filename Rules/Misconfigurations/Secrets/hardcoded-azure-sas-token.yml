rules:
  - id: hardcoded-azure-sas-token
    message: |
      Azure Shared Access Signature (SAS) token found hardcoded in source code or config.
      A SAS token grants time-limited but fully authenticated access to Azure Storage,
      Service Bus, or Event Hubs at the permissions embedded in the token (read, write,
      delete, list). Once the token is in version control it is effectively permanent
      because it cannot be revoked until it expires or the storage account key is rotated.

      Replace SAS tokens with:
      - Managed Identity + RBAC for service-to-service access
      - Azure Key Vault secret references for tokens that must be stored
      - User Delegation SAS (signed with AAD identity, revokable via key rotation)

      Rotate the storage account key immediately if a SAS token has been committed.
    severity: ERROR
    languages: [generic]
    patterns:
      - pattern-regex: '(?i)(?:sig=)[A-Za-z0-9%+/]{20,}(?:&|$|\s|"|\'')'
      - pattern-not-regex: '(\$\{[^}]+\}|\$\([^)]+\)|%[A-Za-z_][A-Za-z0-9_]*%|\{\{[^}]+\}\})'
    metadata:
      category: security
      subcategory: [secrets, credentials, azure]
      cwe: CWE-798
      confidence: MEDIUM
      likelihood: HIGH
      impact: HIGH
      technology: [azure, storage]
      target_files: ["**/*.config", "**/*.json", "**/*.tf", "**/*.tfvars", "**/*.cs", "**/*.py", "**/*.js", "**/*.ts", "**/*.yml", "**/*.yaml", "**/*.env"]
