rules:
  - id: sql-connection-string
    message: |
      SQL connection string detected with embedded credentials.
      Connection strings should be stored in Key Vault or environment variables,
      never in source code or public storage.
    severity: ERROR
    languages: [generic]
    pattern-regex: Server=.*Password=[^$\{]|Server=.*Pwd=[^$\{]|Data Source=.*Password=[^$\{]
    pattern-not-regex: (\$\{|\$\(|%)[A-Za-z_][A-Za-z0-9_]*(\}|\)|%)
    metadata:
      category: security
      subcategory: [secrets]
      cwe: CWE-798
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [sql, azure]
      note: |
        Template variables (${VAR}, $(VAR), %VAR%, {{VAR}}) are pipeline replacements and are safe.
        Only flag actual hardcoded credentials with visible values.
      ATTACK: grep -r 'Server=.*Password=' . → extract SQL connection string → sqlcmd/psql direct DB authentication → full data access
      TOOLS: grep, gitleaks, truffleHog, sqlcmd, psql, sqlmap
      CHAIN: source code access → SQL connection string extraction → direct database authentication → full data access and exfiltration
      IMPACT: Full database access using extracted credentials; all tables, stored procedures, and data accessible
