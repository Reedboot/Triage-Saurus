rules:
  - id: sql-connection-string
    message: |
      SQL connection string detected with embedded credentials.
      Connection strings should be stored in Key Vault or environment variables,
      never in source code or public storage.
    severity: ERROR
    languages: [generic]
    pattern-regex: Server=.*Password=[^$\{]|Server=.*Pwd=[^$\{]|Data Source=.*Password=[^$\{]
    pattern-not-regex: (\$\{|\$\(|%)[A-Za-z_][A-Za-z0-9_]*(\}|\)|%)
    metadata:
      category: security
      subcategory: [secrets]
      cwe: CWE-798
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      technology: [sql, azure]
      note: |
        Template variables (${VAR}, $(VAR), %VAR%, {{VAR}}) are pipeline replacements and are safe.
        Only flag actual hardcoded credentials with visible values.
