rules:
  - id: hardcoded-gcp-service-account-key
    message: |
      GCP service account JSON key file or inline key material found in source code
      or configuration. Service account keys provide long-lived, non-expiring
      authentication to GCP APIs at the IAM roles bound to the account. A leaked
      key can be used to access GCP resources directly without MFA or conditional
      access policies.

      Remove the key file from source. Use:
      - Workload Identity Federation for GKE or GitHub Actions
      - Application Default Credentials (ADC) with gcloud auth for local dev
      - Secret Manager for cases where a key file must be stored

      Revoke the compromised key in IAM → Service Accounts → Keys immediately.
    severity: ERROR
    languages: [generic]
    patterns:
      - pattern-regex: '"type"\s*:\s*"service_account"'
      - pattern-not-regex: '(\$\{[^}]+\}|\$\([^)]+\)|%[A-Za-z_][A-Za-z0-9_]*%)'
    metadata:
      category: security
      subcategory: [secrets, credentials, gcp]
      cwe: CWE-798
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL
      technology: [gcp]
      target_files: ["**/*.json", "**/*.yaml", "**/*.yml", "**/*.tf", "**/*.env", "**/*.config", "**/*.py", "**/*.js", "**/*.ts"]
