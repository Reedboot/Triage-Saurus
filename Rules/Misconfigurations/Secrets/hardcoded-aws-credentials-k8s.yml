rules:
  - id: hardcoded-aws-credentials-k8s
    message: |
      Hardcoded AWS Access Key ID and Secret Access Key found in environment variables.
      This allows anyone with access to the manifest or pod to gain unauthorized access to the AWS account.
      Remove hardcoded credentials and use IAM Roles for Service Accounts (IRSA) or Pod Identity.
      
      Template variables (${VAR}, $(VAR), %VAR%) are safe - these get replaced by CI/CD.
      ATTACK: kubectl get pods -o yaml | grep -i 'AKIA' → extract AWS access key → aws sts get-caller-identity → full AWS API access
      TOOLS: kubectl, aws-cli, Pacu, ScoutSuite, gitleaks
      CHAIN: K8s manifest access → AWS credential extraction → AWS API authentication → IAM privilege escalation → full account access
      IMPACT: Full AWS account compromise using extracted access key; all IAM-accessible services and data at risk
    severity: ERROR
    languages: [yaml]
    patterns:
      - pattern-either:
          - pattern-regex: "AKIA[0-9A-Z]{16}"
          - pattern-regex: "(?i)aws_secret_access_key.*[A-Za-z0-9/+=]{40}"
      - pattern-not-regex: '(\$\{[^}]+\}|\$\([^)]+\)|%[A-Za-z_][A-Za-z0-9_]*%)'
    metadata:
      category: security
      subcategory: [secrets]
      cwe: CWE-798
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL
      technology: [kubernetes, aws]
