rules:
  - id: hardcoded-private-key
    message: |
      PEM-encoded private key found in source code or configuration.
      Private keys embedded in files are committed to version control and accessible
      to all contributors, CI/CD pipeline logs, and anyone with repository access.
      A leaked private key can be used to impersonate the service, decrypt TLS traffic,
      or forge JWT tokens — depending on what the key is used for.

      Remove the key from source. Store it in a secrets manager (Azure Key Vault,
      AWS Secrets Manager, GCP Secret Manager) and reference it via managed identity
      or a secrets CSI driver. Rotate the key immediately if it has been committed.

      Template variables (${VAR}, $(VAR), %VAR%) are safe — these are pipeline placeholders.
    severity: ERROR
    languages: [generic]
    patterns:
      - pattern-regex: '-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
      - pattern-not-regex: '(\$\{[^}]+\}|\$\([^)]+\)|%[A-Za-z_][A-Za-z0-9_]*%)'
    metadata:
      category: security
      subcategory: [secrets, credentials, cryptography]
      cwe: CWE-321
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL
      technology: [generic]
      target_files: ["**/*.pem", "**/*.key", "**/*.crt", "**/*.p12", "**/*.pfx", "**/*.json", "**/*.yaml", "**/*.yml", "**/*.tf", "**/*.env", "**/*.config", "**/*.cs", "**/*.py", "**/*.js", "**/*.ts"]
