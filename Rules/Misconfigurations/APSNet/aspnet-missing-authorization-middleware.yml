rules:
  - id: aspnet-missing-authorization-middleware
    message: |
      ASP.NET Core application has custom authentication middleware but is missing
      the UseAuthorization() call. While UseAuthentication() or custom authentication
      middleware may populate the user identity (ClaimsPrincipal), authorization
      enforcement requires UseAuthorization() to be called.
      
      Without UseAuthorization(), [Authorize] attributes on controllers/actions will
      be ignored, and all requests will bypass authorization checks. This creates a
      critical authentication bypass vulnerability.
      
      Common patterns indicating this vulnerability:
      - UseAuthentication() present but NO UseAuthorization()
      - Custom auth middleware (e.g., app.UseMiddleware<CustomAuthMiddleware>())
        without UseAuthorization()
      - Controllers have NO [Authorize] attributes (all endpoints publicly accessible)
      
      Add app.UseAuthorization() after authentication middleware and apply [Authorize]
      attributes to controllers/actions that require authentication.
    severity: ERROR
    languages: [csharp]
    patterns:
      - pattern-either:
          # Pattern 1: Has UseAuthentication but missing UseAuthorization
          - patterns:
              - pattern-inside: |
                  public void Configure(...)
                  {
                    ...
                  }
              - pattern: app.UseAuthentication();
              - pattern-not-inside: |
                  ...
                  app.UseAuthorization();
                  ...
          # Pattern 2: Has custom auth middleware (extension method) but missing UseAuthorization
          - patterns:
              - pattern-inside: |
                  public void Configure(...)
                  {
                    ...
                  }
              - pattern: app.Use$MIDDLEWARE();
              - metavariable-regex:
                  metavariable: $MIDDLEWARE
                  regex: .*(Auth|Principal|Identity).*
              - pattern-not-inside: |
                  ...
                  app.UseAuthorization();
                  ...
          # Pattern 3: Has UseMiddleware<T> but missing UseAuthorization
          - patterns:
              - pattern-inside: |
                  public void Configure(...)
                  {
                    ...
                  }
              - pattern: app.UseMiddleware<$T>();
              - metavariable-regex:
                  metavariable: $T
                  regex: .*(Auth|Principal|Identity).*
              - pattern-not-inside: |
                  ...
                  app.UseAuthorization();
                  ...
    metadata:
      category: security
      subcategory: [authentication, authorization]
      cwe: CWE-862
      confidence: HIGH
      likelihood: CRITICAL
      impact: CRITICAL
      remediation_effort: LOW
      references:
        - https://learn.microsoft.com/en-us/aspnet/core/security/authorization/introduction
        - https://learn.microsoft.com/en-us/aspnet/core/security/authentication/
      owasp: A07:2021 - Identification and Authentication Failures
      technology: [aspnet-core, dotnet, csharp]
      five_pillars: Pillar 5
