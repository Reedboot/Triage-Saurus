rules:
  - id: aspnet-missing-authorization-middleware
    message: |
      ASP.NET Core application has custom authentication middleware but is missing
      the UseAuthorization() call. This means [Authorize] attributes are ignored
      and all requests bypass authorization checks - a CRITICAL authentication bypass.
      
      Detected authentication middleware without UseAuthorization():
      - UseClearBankPrincipalMiddleware
      - UseAuthentication
      - Other custom auth middleware
      
      Add app.UseAuthorization() after authentication middleware.
      ATTACK: curl https://<app>/admin/endpoint → [Authorize] attribute bypassed without UseAuthorization() → unauthenticated route access
      TOOLS: curl, Burp Suite, OWASP ZAP, Postman
      CHAIN: HTTP request → ASP.NET middleware pipeline → UseAuthorization() absent → [Authorize] attributes ignored → all protected routes accessible
      IMPACT: Complete authorization bypass; all [Authorize]-protected routes accessible without valid credentials
    severity: ERROR
    languages: [csharp]
    patterns:
      - pattern-inside: |
          public void Configure($APP, ...)
          {
            ...
          }
      - pattern: $APP.Use$AUTHMW(...);
      - metavariable-regex:
          metavariable: $AUTHMW
          regex: .*(Auth|Principal).*
      - pattern-not-inside: |
          ...
          $APP.UseAuthorization(...);
          ...
    metadata:
      category: security
      subcategory: [authentication, authorization]
      cwe: CWE-862
      confidence: HIGH
      likelihood: CRITICAL
      impact: CRITICAL
      remediation_effort: LOW
      references:
        - https://learn.microsoft.com/en-us/aspnet/core/security/authorization/introduction
      owasp: A07:2021 - Identification and Authentication Failures
      technology: [aspnet-core, dotnet, csharp]
      five_pillars: Pillar 5
