rules:
  - id: terraform-resource-group-deletion-guard-disabled
    message: |
      Azure provider has prevent_deletion_if_contains_resources = false.
      This allows accidental deletion of resource groups containing resources.
      Set to true to prevent accidental infrastructure destruction.
      ATTACK: compromised pipeline or misconfigured operator → terraform destroy → deletion guard disabled → full resource group deleted
      TOOLS: terraform, az-cli
      CHAIN: Terraform pipeline compromise or operator error → terraform destroy → prevent_deletion = false → resource group and all children deleted
      IMPACT: Permanent deletion of entire Azure resource group and all contained resources; potential full environment destruction
    severity: WARNING
    languages: [terraform, hcl]
    pattern: |
      provider "azurerm" {
        ...
        features {
          ...
          resource_group {
            ...
            prevent_deletion_if_contains_resources = false
            ...
          }
          ...
        }
        ...
      }
    metadata:
      category: security
      subcategory: [infrastructure]
      cwe: CWE-404
      confidence: HIGH
      likelihood: LOW
      impact: HIGH
      technology: [terraform, azure]
