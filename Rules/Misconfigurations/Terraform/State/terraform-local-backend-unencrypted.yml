rules:
  - id: terraform-local-backend-unencrypted
    message: |
      Terraform state stored locally with 'backend "local"' is unencrypted and
      not backed up. Use remote backend (Azure Storage, S3, Terraform Cloud)
      with encryption and locking enabled.
      ATTACK: cat terraform.tfstate | jq '.resources' → extract plaintext secrets and connection strings from unencrypted local state
      TOOLS: cat, jq, grep, gitleaks, truffleHog
      CHAIN: filesystem access → local state file read → plaintext credential extraction → cloud API or database authentication → full access
      IMPACT: Full credential exposure from state file; all Terraform-managed resources accessible using extracted secrets
    severity: WARNING
    languages: [terraform, hcl]
    pattern: |
      terraform {
        ...
        backend "local" {
          ...
        }
        ...
      }
    metadata:
      category: security
      subcategory: [infrastructure]
      cwe: CWE-312
      confidence: HIGH
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [terraform]
      references:
        - https://developer.hashicorp.com/terraform/language/settings/backends/local
