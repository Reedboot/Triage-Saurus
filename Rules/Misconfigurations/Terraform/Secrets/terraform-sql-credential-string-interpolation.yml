rules:
  - id: terraform-sql-credential-string-interpolation
    message: |
      SQL query built with format() or string interpolation containing secrets.
      This can lead to SQL injection and credential leakage in logs.
      Use parameterized queries instead.
      ATTACK: grep -r 'password\|secret' .tf → extract interpolated SQL credentials → sqlcmd/psql direct DB connection → full data access
      TOOLS: grep, gitleaks, truffleHog, sqlcmd, psql
      CHAIN: source code access → interpolated credential extraction → SQL authentication → full database access
      IMPACT: Database credential exposure enabling direct authentication and full data access
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern-either:
          - pattern: format("... INSERT ... VALUES ... %s ...", $SECRET)
          - pattern: format("... UPDATE ... SET ... = '%s' ...", $SECRET)
          - pattern: '"... ${$SECRET} ..."'
      - metavariable-regex:
          metavariable: $SECRET
          regex: .*(password|secret|token|credential|passwd|pwd).*
    metadata:
      category: security
      subcategory: [injection, secrets]
      cwe: CWE-89
      confidence: MEDIUM
      likelihood: MEDIUM
      impact: MEDIUM
      technology: [terraform, sql]
