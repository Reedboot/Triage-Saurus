rules:
  - id: gitlab-ci-secret-exfil-webhook
    message: |
      GitLab CI pipeline sends a CI/CD variable (e.g. CI_JOB_JWT, CI secret) to an
      external webhook URL via curl or wget. This exfiltrates job tokens or secrets to
      a third-party endpoint. Remove external POST calls containing CI variables from
      pipeline scripts; use protected variables and internal artifact storage instead.
      ATTACK: curl with $CI_JOB_JWT → exfiltrate token to attacker webhook → replay JWT against GitLab API → access protected repos, registries, and environments
      TOOLS: curl, wget, jwt_tool, python-gitlab, glab
      CHAIN: CI pipeline trigger → secret-carrying curl to external URL → attacker receives JWT/token → API auth replay → repo/registry access → supply chain compromise
      IMPACT: GitLab job tokens exfiltrated; registry credentials leaked; protected environment variables exposed; supply chain compromise via malicious registry push
    severity: ERROR
    languages: [yaml]
    patterns:
      - pattern-inside: |
          script: ...
      - pattern-regex: 'curl.*\$(?:CI_JOB_JWT|CI_JOB_TOKEN|CI_REGISTRY_PASSWORD|CI_[A-Z_]+_TOKEN)[^''"\s]*.*https?://'
    metadata:
      category: security
      subcategory: [secrets, cicd]
      cwe: CWE-532
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL
      technology: [gitlab-ci, yaml]
      five_pillars: Pillar 2 (Identity & Access Management)
