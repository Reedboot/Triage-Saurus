rules:
  - id: azure-keyvault-missing-network-acls
    message: |
      Key Vault resources should define network_acls to restrict access.
      Add a network_acls block with default_action = "Deny" and explicit allow rules
      or private endpoints to avoid exposing secrets to the public internet.
    severity: WARNING
    languages: [terraform, hcl]
    patterns:
      - pattern: |
          resource "azurerm_key_vault" "$NAME" {
            ...
          }
      - pattern-not: |
          resource "azurerm_key_vault" "$NAME" {
            ...
            network_acls {
              ...
            }
            ...
          }
    metadata:
      category: security
      subcategory: [network, cloud]
      cwe: CWE-284
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      technology: [terraform, azure]
      five_pillars: Pillar 1 (Network Security)
