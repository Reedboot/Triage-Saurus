# Terraform Module Sources Extraction Rule
# Detects module blocks and extracts module name and source attribute

rules:
  - id: terraform_module_sources
    rule_id: terraform_module_sources
    name: Extract Terraform Module Sources
    message: Detected Terraform module usage with source attribute
    severity: INFO
    languages:
      - terraform
    patterns:
      # Match common single-line module declarations: module "name" { source = "..." }
      - pattern: 'module "(?P<module_name>[^\"]+)"\s*\{\s*source\s*=\s*"(?P<source>[^\"]+)"'
      # Match multi-line module blocks where source may be on a following line
      - pattern: '(?s)module "(?P<module_name>[^\"]+)".*?source\s*=\s*"(?P<source>[^\"]+)"'
    outputs:
      - summary: |
          Terraform module detected:
          - Module: {{module_name}}
            - Source: {{source}}

          Reference: {{file_path}}:{{line_number}}
