# Terraform Module Sources Extraction Rule
# Detects module blocks and extracts module name and source attribute

rules:
  - id: terraform_module_sources
    rule_id: terraform_module_sources
    name: Extract Terraform Module Sources
    message: Detected Terraform module usage with source attribute
    severity: INFO
    languages:
      - terraform
    patterns:
      - pattern-regex: 'module "(?P<module_name>[^"]+)"\s*\{\s*source\s*=\s*"(?P<source>[^"]+)"'
      - pattern-regex: '(?s)module "(?P<module_name>[^"]+)".*?source\s*=\s*"(?P<source>[^"]+)"'
    outputs:
      - summary: |
          Terraform module detected:
          - Module: {{module_name}}
            - Source: {{source}}

          Reference: {{file_path}}:{{line_number}}
