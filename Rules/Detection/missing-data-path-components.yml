rules:
  - id: missing-data-path-queue
    message: Data path component missing - queue resource not found in IaC
    severity: WARNING
    languages: [terraform, hcl, yaml]
    pattern: |
      resource "azurerm_service_bus" $NAME {
        ...
      }
    metadata:
      category: architecture-parity
      finding_kind: Gap
      description: |
        Documentation references queues, storage, or databases, but 
        Infrastructure-as-Code is missing these resource definitions.
        This indicates an incomplete or outdated IaC implementation.
      recommendation: |
        1. Review architecture documentation for referenced components
        2. Identify which queue/storage/database services are documented
        3. Add missing resource definitions to Terraform

  - id: missing-data-path-storage
    message: Data path component missing - storage resource not found in IaC
    severity: WARNING
    languages: [terraform, hcl, yaml]
    pattern: |
      resource "azurerm_storage_account" $NAME {
        ...
      }
    metadata:
      category: architecture-parity
      finding_kind: Gap

  - id: missing-data-path-database
    message: Data path component missing - database resource not found in IaC
    severity: WARNING
    languages: [terraform, hcl, yaml]
    pattern: |
      resource "azurerm_mssql_server" $NAME {
        ...
      }
    metadata:
      category: architecture-parity
      finding_kind: Gap
