rules:
  - id: missing-ingress-app-service
    message: Service has no internet ingress path defined - App Service without Application Gateway
    severity: WARNING
    languages: [terraform, hcl]
    pattern: |
      resource "azurerm_app_service" $NAME {
        ...
      }
    metadata:
      category: network-architecture
      finding_kind: Gap
      description: |
        A service resource (e.g., App Service, API Gateway, Load Balancer) exists
        but has no ingress route from the internet. This may indicate:
        - The service is isolated but should be public
        - Ingress resources (API Gateway, Load Balancer, Application Gateway) are missing
        - Network routing is incomplete or misconfigured
      recommendation: |
        1. Add Application Gateway or API Management for ingress
        2. Configure public endpoints and routing rules
        3. Update architecture documentation

  - id: missing-ingress-api-management
    message: Service has no internet ingress path defined - API Management without gateway listener
    severity: WARNING
    languages: [terraform, hcl]
    pattern: |
      resource "azurerm_api_management" $NAME {
        ...
      }
    metadata:
      category: network-architecture
      finding_kind: Gap

  - id: missing-ingress-load-balancer
    message: Service has no internet ingress path defined - Load Balancer without public IP
    severity: WARNING
    languages: [terraform, hcl]
    pattern: |
      resource "azurerm_lb" $NAME {
        ...
      }
    metadata:
      category: network-architecture
      finding_kind: Gap
