rules:
  - id: context-huaweicloud-ecs-instance
    message: |
      Huawei Cloud ECS instance detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern: |
      resource "huaweicloud_compute_instance" $NAME {
        ...
      }
    metadata:
      finding_kind: Asset
      asset_provider: huaweicloud
      rule_type: context_discovery
      category: infrastructure
      subcategory: compute
      technology: [terraform, huaweicloud, compute]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: ECS Instance
        resource_type: huaweicloud_compute_instance
        resource_name: $NAME
    description: |
      Detects Huawei Cloud ECS instances in Terraform configurations.

