      }
    metadata:
      finding_kind: Asset
      asset_provider: gcp
      rule_type: context_discovery
      category: infrastructure
      subcategory: database
      technology: [terraform, gcp, database, bigtable]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Bigtable Instance
        resource_type: google_bigtable_instance
        resource_name: $NAME
    description: |
      Detects Google Cloud Bigtable (NoSQL) instances.

  - id: context-gcp-firestore-database
    message: |
      GCP Firestore Database detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern: |
      resource "google_firestore_database" $NAME {
