      }
    metadata:
      finding_kind: Asset
      asset_provider: gcp
      rule_type: context_discovery
      category: infrastructure
      subcategory: database
      technology: [terraform, gcp, database, firestore]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Firestore Database
        resource_type: google_firestore_database
        resource_name: $NAME
    description: |
      Detects Google Cloud Firestore (NoSQL) databases.

  - id: context-gcp-bigquery-dataset
    message: |
      GCP BigQuery Dataset detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern: |
      resource "google_bigquery_dataset" $NAME {
        ...
