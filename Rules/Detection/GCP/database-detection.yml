      technology: [terraform, gcp, database, bigquery]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: BigQuery Dataset
        resource_type: google_bigquery_dataset
        resource_name: $NAME
    description: |
      Detects Google BigQuery Datasets (analytics/data warehouse).
