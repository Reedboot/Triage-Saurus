rules:
  - id: context-gcp-service-account
    message: |
      GCP Service Account detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern: |
      resource "google_service_account" $NAME {
        ...
      }
    metadata:
      finding_kind: Asset
      asset_provider: gcp
      rule_type: context_discovery
      category: infrastructure
      subcategory: identity
      technology: [terraform, gcp, iam]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Service Account
        resource_type: google_service_account
        resource_name: $NAME
    description: |
      Detects Google Service Accounts used for authentication and authorization.

