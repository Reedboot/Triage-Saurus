rules:
  - id: context-gcp-compute-backend-service
    message: |
      GCP Backend Service detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern: |
      resource "google_compute_backend_service" $NAME {
        ...
      }
    metadata:
      finding_kind: Asset
      asset_provider: gcp
      rule_type: context_discovery
      category: infrastructure
      subcategory: load-balancing
      technology: [terraform, gcp, load-balancing]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Backend Service
        resource_type: google_compute_backend_service
        resource_name: $NAME
    description: |
      Detects Google Compute Backend Services (load balancer backends).

