rules:
  - id: context-gcp-compute-network
    message: |
      GCP VPC Network detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern: |
      resource "google_compute_network" $NAME {
        ...
      }
    metadata:
      finding_kind: Asset
      asset_provider: gcp
      rule_type: context_discovery
      category: infrastructure
      subcategory: networking
      technology: [terraform, gcp, networking, vpc]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: VPC Network
        resource_type: google_compute_network
        resource_name: $NAME
    description: |
      Detects Google Compute Engine VPC Networks.
      These form the network boundary for compute and database resources.

  - id: context-gcp-compute-subnetwork
    message: |
