rules:
  - id: hashicorp-hcl-block-keyword-detection
    message: |
      Diagram coverage gap detected for Terraform/HCL block keyword.
      Resource appears in repo evidence but diagram is missing a required connection or representation.
    severity: WARNING
    languages: [regex]
    paths:
      include:
        - "**/*.tf"
        - "**/*.tfvars"
        - "**/*.hcl"
    patterns:
      - pattern-regex: '(?im)^\s*(terraform|provider|resource|module|data|variable|output|locals|moved)\b'
    metadata:
      category: security
      subcategory: [asset-discovery-gap]
      technology: [hashicorp]
      finding_kind: asset_detection
      generated_by: web_parallel_scan_validator
      note: placeholder_rule - consider mapping to existing context-detection rule
