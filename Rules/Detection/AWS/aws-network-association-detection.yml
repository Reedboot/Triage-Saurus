rules:
  - id: context-aws-route-table-association
    message: |
      AWS route table association detected in infrastructure.
      This rule extracts route-table-to-subnet linkage for network-path analysis.
    severity: INFO
    languages: [regex]
    pattern-regex: (?s)resource\s+"aws_route_table_association"\s+"[^"]+"\s*\{.*?route_table_id\s*=.*?subnet_id\s*=.*?\}
    metadata:
      finding_kind: Asset
      asset_provider: aws
      rule_type: context_discovery
      category: infrastructure
      subcategory: network
      technology: [terraform, aws, route_table]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Route Table Association
        resource_type: aws_route_table_association
      description: |
        Detects AWS route table associations so subnet routing links are preserved in diagrams.

  - id: context-aws-network-interface-attachment
    message: |
      AWS network interface attachment detected in infrastructure.
      This rule extracts ENI-to-instance linkage for compute/network analysis.
    severity: INFO
    languages: [regex]
    pattern-regex: (?s)resource\s+"aws_network_interface_attachment"\s+"[^"]+"\s*\{.*?network_interface_id\s*=.*?instance_id\s*=.*?\}
    metadata:
      finding_kind: Asset
      asset_provider: aws
      rule_type: context_discovery
      category: infrastructure
      subcategory: network
      technology: [terraform, aws, eni]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Network Interface Attachment
        resource_type: aws_network_interface_attachment
      description: |
        Detects AWS ENI attachments so instance-to-network relationships remain visible in diagrams.
