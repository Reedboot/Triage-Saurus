rules:
  - id: context-azure-nsg-nic-association
    message: |
      Azure Network Security Group to Network Interface association detected.
      This rule identifies NSG assignments to network interfaces.
    severity: INFO
    languages: [terraform, hcl]
    pattern: |
      resource "azurerm_network_interface_security_group_association" $ASSOC_NAME {
        ...
        network_interface_id = $NIC_ID
        network_security_group_id = $NSG_ID
        ...
      }
    metadata:
      finding_kind: Connection
      asset_provider: azure
      rule_type: context_discovery
      category: infrastructure
      subcategory: network
      technology: [terraform, azure, network]
      target_files: ["*.tf", "**/*.tf"]
      connection_type: applied_to
      source_resource: azurerm_network_security_group
      target_resource: azurerm_network_interface
      description: |
        Detects Azure Network Interface Security Group Association resources to identify
        Network Security Group → Network Interface relationships for security policy mapping.
  - id: context-azure-nsg-subnet-association
    message: |
      Azure Network Security Group to Subnet association detected.
      This rule identifies NSG assignments to subnets via explicit resource.
    severity: INFO
    languages: [terraform, hcl]
    pattern: |
      resource "azurerm_subnet_network_security_group_association" $ASSOC_NAME {
        ...
        subnet_id = $SUBNET_ID
        network_security_group_id = $NSG_ID
        ...
      }
    metadata:
      finding_kind: Connection
      asset_provider: azure
      rule_type: context_discovery
      category: infrastructure
      subcategory: network
      technology: [terraform, azure, network]
      target_files: ["*.tf", "**/*.tf"]
      connection_type: applied_to
      source_resource: azurerm_network_security_group
      target_resource: azurerm_subnet
      description: |
        Detects Azure Subnet Network Security Group Association resources to identify
        Network Security Group → Subnet relationships for subnet-level security policy mapping.
