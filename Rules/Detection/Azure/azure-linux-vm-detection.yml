rules:
  - id: context-azure-linux-vm
    message: |
      Azure Linux Virtual Machine detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "azurerm_linux_virtual_machine" $NAME {
            ...
            network_interface_ids = $NIC_IDS
            ...
          }
      - pattern: |
          resource "azurerm_linux_virtual_machine" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*linux[_-]?vm.*"
    metadata:
      finding_kind: Asset
      asset_provider: azure
      rule_type: context_discovery
      category: infrastructure
      subcategory: compute
      technology: [terraform, azure, compute]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Linux Virtual Machine
        resource_type: azurerm_linux_virtual_machine
        resource_name: $NAME
        properties:
          - name: network_interface_ids
            pattern: network_interface_ids = $NIC_IDS
          - name: size
            pattern: size = "$SIZE"
          - name: admin_username
            pattern: admin_username = "$ADMIN"
    description: |
      Detects Azure Linux Virtual Machine resources and captures network interface references for parent-child linking.
