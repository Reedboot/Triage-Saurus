rules:
  - id: azure-storage-sas-public-detection
    message: Detect Azure Storage public access combined with SAS tokens
    severity: HIGH
    languages: [terraform, json, generic, yaml, generic, sh]
    pattern-regex: |
      (?s)(sharedAccessSignature|sasToken|sharedAccessSignature|azurerm_storage_account_sas|\bSAS\b).{0,2000}(allowBlobPublicAccess\s*[:=]\s*(?:true|True)|allow_blob_public_access\s*=\s*true|"publicAccess"\s*:\s*"(?:Blob|Container)"|public_access\s*=\s*"?(?:blob|container)")
    metadata:
      category: misconfiguration
      tags: [azure, storage, sas, public-access]
  - id: azure-storage-sas-token-or-resource
    message: Detect SAS tokens or explicit storage-account-sas resources
    severity: INFO
    languages: [terraform, json, generic, yaml, generic, sh]
    pattern-regex: |
      (sharedAccessSignature|sasToken|azurerm_storage_account_sas|SharedAccessSignature)
    metadata:
      category: detection
  - id: azure-storage-public-access-properties
    message: Detect storage public access properties
    severity: INFO
    languages: [terraform, json, generic, yaml]
    pattern-regex: |
      (allowBlobPublicAccess\s*[:=]\s*(?:true|True)|allow_blob_public_access\s*=\s*true|"publicAccess"\s*:\s*"(?:Blob|Container)"|public_access\s*=\s*"?(?:blob|container)")
    metadata:
      category: detection
notes: |
  This rule is heuristic: it reports when a SAS-related artifact and a public-access setting appear close together in a file. For complete coverage the script-level extractor correlates signals across files and Terraform/ARM/Bicep constructs. Consider adding automated remediation guidance (revoke SAS, disable public access, restrict via SAS IP/network restrictions).
