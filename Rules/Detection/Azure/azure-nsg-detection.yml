rules:
  - id: context-azure-nsg
    message: |
      Terraform azurerm network security group detected.
      Detects azurerm_network_security_group resource declarations.
    severity: INFO
    languages: [terraform, hcl, generic]
    pattern-regex: |
      (?m)\bazurerm_network_security_group\b
    metadata:
      rule_type: detection
      category: infrastructure
      technology: [azure, terraform]
      target_files: ["**/*.tf"]
