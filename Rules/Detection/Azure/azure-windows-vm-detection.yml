rules:
  - id: context-azure-windows-vm
    message: |
      Terraform azurerm windows virtual machine detected.
      Detects azurerm_windows_virtual_machine resource declarations.
    severity: INFO
    languages: [terraform, hcl, generic]
    pattern-regex: |
      (?m)\bazurerm_windows_virtual_machine\b
    metadata:
      rule_type: detection
      category: infrastructure
      technology: [azure, terraform]
      target_files: ["**/*.tf"]
