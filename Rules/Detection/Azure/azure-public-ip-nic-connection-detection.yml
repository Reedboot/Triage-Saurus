rules:
  - id: context-azure-public-ip-nic-link
    message: |
      Azure Network Interface with Public IP reference detected.
      This rule identifies the association between network interfaces and public IPs.
    severity: INFO
    languages: [terraform, hcl]
    pattern: |
      resource "azurerm_network_interface" $NIC_NAME {
        ...
        ip_configuration {
          ...
          public_ip_address_id = $PIP_ID
          ...
        }
        ...
      }
    metadata:
      finding_kind: Connection
      asset_provider: azure
      rule_type: context_discovery
      category: infrastructure
      subcategory: network
      technology: [terraform, azure, network]
      target_files: ["*.tf", "**/*.tf"]
      connection_type: has_public_ip
      source_resource: azurerm_network_interface
      target_resource: azurerm_public_ip
      description: |
        Detects Azure Network Interface resources with public_ip_address_id references to identify
        Network Interface → Public IP relationships for internet-facing infrastructure mapping.
