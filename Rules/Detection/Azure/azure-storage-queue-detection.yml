rules:
  - id: context-azure-storage-queue
    message: |
      Azure Storage Queue detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "azurerm_storage_queue" $NAME {
            ...
            storage_account_name = $ACCOUNT_NAME
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*storage[_-]?queue.*"
    metadata:
      finding_kind: Asset
      asset_provider: azure
      rule_type: context_discovery
      category: infrastructure
      subcategory: storage
      technology: [terraform, azure, storage]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Storage Queue
        resource_type: azurerm_storage_queue
        resource_name: $NAME
        properties:
          - name: storage_account_name
            pattern: storage_account_name = $ACCOUNT_NAME
    description: |
      Detects Azure Storage Queue resources and captures the parent storage account reference via storage_account_name.
