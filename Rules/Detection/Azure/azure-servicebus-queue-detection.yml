rules:
  - id: context-azure-servicebus-queue
    message: |
      Azure Service Bus Queue detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "azurerm_servicebus_queue" $NAME {
            ...
            namespace_id = $NAMESPACE_ID
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*servicebus[_-]?queue.*"
    metadata:
      finding_kind: Asset
      asset_provider: azure
      rule_type: context_discovery
      category: infrastructure
      subcategory: servicebus
      technology: [terraform, azure, servicebus]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Service Bus Queue
        resource_type: azurerm_servicebus_queue
        resource_name: $NAME
        properties:
          - name: namespace_id
            pattern: namespace_id = $NAMESPACE_ID
          - name: max_size_in_megabytes
            pattern: max_size_in_megabytes = "$VAL"
    description: |
      Detects Azure Service Bus Queue resources and captures the parent namespace reference via namespace_id.
