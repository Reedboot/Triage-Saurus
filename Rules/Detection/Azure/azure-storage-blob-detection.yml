rules:
  - id: context-azure-storage-blob
    message: |
      Azure Storage Blob detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "azurerm_storage_blob" $NAME {
            ...
            storage_account_name = $ACCOUNT_NAME
            ...
          }
      - pattern: |
          resource "azurerm_storage_blob" $NAME {
            ...
            storage_container_name = $CONTAINER_NAME
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*storage[_-]?blob.*"
    metadata:
      finding_kind: Asset
      asset_provider: azure
      rule_type: context_discovery
      category: infrastructure
      subcategory: storage
      technology: [terraform, azure, storage]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Storage Blob
        resource_type: azurerm_storage_blob
        resource_name: $NAME
        properties:
          - name: storage_account_name
            pattern: storage_account_name = $ACCOUNT_NAME
          - name: storage_container_name
            pattern: storage_container_name = $CONTAINER_NAME
          - name: type
            pattern: type = "$VAL"
    description: |
      Detects Azure Storage Blob resources and captures the parent storage account and container references.
