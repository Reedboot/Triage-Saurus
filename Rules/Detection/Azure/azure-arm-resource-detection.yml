rules:
  - id: azure-arm-resource-detection
    message: Detect Azure ARM template resource types and risky configs
    severity: INFO
    languages: [json]
    pattern-regex: |
      "type"\s*:\s*"([A-Za-z0-9._\-/]+)"
    metadata:
      rule_type: detection
      category: infrastructure
      technology: [azure, arm]
      target_files: ["**/*.json"]
  - id: azure-arm-storage-public-access
    message: Detect storage account public access settings or SAS tokens in ARM templates
    severity: WARNING
    languages: [json]
    pattern-regex: |
      "allowBlobPublicAccess"\s*:\s*(true|false)|"publicAccess"\s*:\s*"(Blob|Container|None)"
    metadata:
      category: misconfiguration
      technology: [azure, storage]
  - id: azure-arm-key-vault-detection
    message: Detect Key Vault resources in ARM templates
    severity: INFO
    languages: [json]
    pattern-regex: |
      "type"\s*:\s*"Microsoft.KeyVault/.+"
    metadata:
      category: infrastructure
      technology: [azure, keyvault]
  - id: azure-arm-sql-server-detection
    message: Detect SQL server resources in ARM templates
    severity: INFO
    languages: [json]
    pattern-regex: |
      "type"\s*:\s*"(?:Microsoft.Sql/servers|Microsoft.DBforMySQL/servers|Microsoft.DBforPostgreSQL/servers)"
    metadata:
      category: infrastructure
      technology: [azure, sql]
  - id: azure-arm-mssql-firewall-allow-all
    message: Detect ARM SQL firewall rules allowing 0.0.0.0
    severity: WARNING
    languages: [json]
    pattern-regex: |
      "startIpAddress"\s*:\s*"0.0.0.0"|"endIpAddress"\s*:\s*"0.0.0.0"
    metadata:
      category: misconfiguration
      technology: [azure, sql]
# Notes: This ruleset is intentionally conservative; property extraction is best-effort and
# should be combined with more specific rules or script-level parsing for full fidelity.
