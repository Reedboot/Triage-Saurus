rules:
  - id: context-azure-servicebus-namespace
    message: |
      Azure Service Bus Namespace detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "azurerm_servicebus_namespace" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*servicebus[_-]?namespace.*"
    metadata:
      finding_kind: Asset
      asset_provider: azure
      rule_type: context_discovery
      category: infrastructure
      subcategory: servicebus
      technology: [terraform, azure, servicebus]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Service Bus Namespace
        resource_type: azurerm_servicebus_namespace
        resource_name: $NAME
        properties:
          - name: sku
            pattern: sku = "$SKU"
          - name: location
            pattern: location = "$LOC"
    description: |
      Detects Azure Service Bus Namespace resources for infrastructure mapping.
