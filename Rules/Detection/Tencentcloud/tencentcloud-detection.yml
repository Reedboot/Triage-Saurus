rules:
  - id: context-tencentcloud-cvm-instance
    message: |
      Tencent Cloud CVM instance detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern: |
      resource "tencentcloud_instance" $NAME {
        ...
      }
    metadata:
      finding_kind: Asset
      asset_provider: tencentcloud
      rule_type: context_discovery
      category: infrastructure
      subcategory: compute
      technology: [terraform, tencentcloud, compute]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: CVM Instance
        resource_type: tencentcloud_instance
        resource_name: $NAME
    description: |
      Detects Tencent Cloud CVM instances in Terraform configurations.

