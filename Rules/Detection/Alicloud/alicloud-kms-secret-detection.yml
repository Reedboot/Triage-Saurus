rules:
  - id: context-alicloud-kms-secret
    message: |
      Alibaba Cloud KMS Secret detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "alicloud_kms_secret" $NAME {
            ...
          }
      - pattern: |
          resource "alicloud_kms_secret" $NAME {
            ...
            encryption_key_id = $KEY_ID
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*kms[_-]?secret.*"
    metadata:
      finding_kind: Asset
      asset_provider: alicloud
      rule_type: context_discovery
      category: infrastructure
      subcategory: kms
      technology: [terraform, alicloud, kms]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: KMS Secret
        resource_type: alicloud_kms_secret
        resource_name: $NAME
        properties:
          - name: encryption_key_id
            pattern: encryption_key_id = $KEY_ID
          - name: secret_name
            pattern: secret_name = "$SECRET_NAME"
    description: |
      Detects KMS Secret resources in Alibaba Cloud Terraform configurations.
