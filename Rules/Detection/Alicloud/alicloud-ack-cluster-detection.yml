rules:
  - id: context-alicloud-ack-cluster
    message: |
      Alibaba Cloud ACK Managed Kubernetes Cluster detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "alicloud_cs_managed_kubernetes" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*ack[_-]?cluster.*"
    metadata:
      finding_kind: Asset
      asset_provider: alicloud
      rule_type: context_discovery
      category: infrastructure
      subcategory: container
      technology: [terraform, alicloud, container]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: ACK Managed Kubernetes Cluster
        resource_type: alicloud_cs_managed_kubernetes
        resource_name: $NAME
        properties:
          - name: name
            pattern: name = "$CLUSTER_NAME"
          - name: worker_vswitch_ids
            pattern: worker_vswitch_ids = "$VSWITCHES"
    description: |
      Detects ACK Managed Kubernetes Cluster resources in Alibaba Cloud Terraform configurations.
