rules:
  - id: context-alicloud-log-store
    message: |
      Alibaba Cloud Log Service Store detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "alicloud_log_store" $NAME {
            ...
          }
      - pattern: |
          resource "alicloud_log_store" $NAME {
            ...
            project = $PROJECT
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*log[_-]?store.*"
    metadata:
      finding_kind: Asset
      asset_provider: alicloud
      rule_type: context_discovery
      category: infrastructure
      subcategory: logging
      technology: [terraform, alicloud, logging]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Log Service Store
        resource_type: alicloud_log_store
        resource_name: $NAME
        properties:
          - name: project
            pattern: project = $PROJECT
          - name: name
            pattern: name = "$STORE_NAME"
          - name: retention_period
            pattern: retention_period = "$RETENTION"
    description: |
      Detects Log Service Store resources in Alibaba Cloud Terraform configurations.
