rules:
  - id: context-alicloud-oss-bucket
    message: |
      Alibaba Cloud OSS Bucket detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "alicloud_oss_bucket" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*oss[_-]?bucket.*"
    metadata:
      finding_kind: Asset
      asset_provider: alicloud
      rule_type: context_discovery
      category: infrastructure
      subcategory: storage
      technology: [terraform, alicloud, storage]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: OSS Bucket
        resource_type: alicloud_oss_bucket
        resource_name: $NAME
        properties:
          - name: bucket
            pattern: bucket = "$BUCKET_NAME"
          - name: acl
            pattern: acl = "$ACL"
    description: |
      Detects OSS Bucket resources in Alibaba Cloud Terraform configurations.
