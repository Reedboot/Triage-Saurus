rules:
  - id: context-alicloud-vpc
    message: |
      Alibaba Cloud VPC detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "alicloud_vpc" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*alicloud[_-]?vpc.*"
    metadata:
      finding_kind: Asset
      asset_provider: alicloud
      rule_type: context_discovery
      category: infrastructure
      subcategory: network
      technology: [terraform, alicloud, network]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: VPC
        resource_type: alicloud_vpc
        resource_name: $NAME
        properties:
          - name: vpc_name
            pattern: vpc_name = "$VPC_NAME"
          - name: cidr_block
            pattern: cidr_block = "$CIDR"
    description: |
      Detects VPC resources in Alibaba Cloud Terraform configurations.
