rules:
  - id: context-alicloud-rds-instance
    message: |
      Alibaba Cloud RDS Instance detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern: |
      resource "alicloud_db_instance" $NAME {
        ...
      }
    metadata:
      finding_kind: Asset
      asset_provider: alicloud
      rule_type: context_discovery
      category: infrastructure
      subcategory: database
      technology: [terraform, alicloud, database]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: RDS Instance
        resource_type: alicloud_db_instance
        resource_name: $NAME
        properties:
          - name: engine
            pattern: engine = "$ENGINE"
          - name: engine_version
            pattern: engine_version = "$VERSION"
          - name: instance_type
            pattern: instance_type = "$INST_TYPE"
          - name: vswitch_id
            pattern: vswitch_id = "$VSWITCH_ID"
          - name: security_ips
            pattern: security_ips = $SECURITY_IPS
    description: |
      Detects RDS Instance resources in Alibaba Cloud Terraform configurations.
