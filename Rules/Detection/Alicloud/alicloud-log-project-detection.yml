rules:
  - id: context-alicloud-log-project
    message: |
      Alibaba Cloud Log Service Project detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "alicloud_log_project" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*log[_-]?project.*"
    metadata:
      finding_kind: Asset
      asset_provider: alicloud
      rule_type: context_discovery
      category: infrastructure
      subcategory: logging
      technology: [terraform, alicloud, logging]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Log Service Project
        resource_type: alicloud_log_project
        resource_name: $NAME
        properties:
          - name: name
            pattern: name = "$PROJ_NAME"
    description: |
      Detects Log Service Project resources in Alibaba Cloud Terraform configurations.
