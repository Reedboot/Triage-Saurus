rules:
  - id: missing-security-perimeter-firewall
    message: Security perimeter components not rendered in diagram - Azure Firewall missing
    severity: WARNING
    languages: [terraform, hcl]
    pattern: |
      resource "azurerm_firewall" $NAME {
        ...
      }
    metadata:
      category: security-architecture
      finding_kind: Gap
      description: |
        Firewall, VPN, or ExpressRoute resources exist in Infrastructure-as-Code
        but are not displayed in architecture diagrams. These are critical
        security perimeter elements affecting the network threat boundary.
      recommendation: |
        1. Ensure firewall, VPN, and ExpressRoute resources are rendered in diagrams
        2. Update diagram generation to include security perimeter components
        3. Validate diagram completeness

  - id: missing-security-perimeter-vpn
    message: Security perimeter components not rendered in diagram - VPN Gateway missing
    severity: WARNING
    languages: [terraform, hcl]
    pattern: |
      resource "azurerm_vpn_gateway" $NAME {
        ...
      }
    metadata:
      category: security-architecture
      finding_kind: Gap

  - id: missing-security-perimeter-expressroute
    message: Security perimeter components not rendered in diagram - ExpressRoute Circuit missing
    severity: WARNING
    languages: [terraform, hcl]
    pattern: |
      resource "azurerm_express_route_circuit" $NAME {
        ...
      }
    metadata:
      category: security-architecture
      finding_kind: Gap
