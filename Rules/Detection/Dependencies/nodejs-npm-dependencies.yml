rules:
  - id: extract-npm-dependencies
    message: |
      npm dependencies section detected in package.json.
      Identifies files with npm dependency declarations for further analysis.
    severity: INFO
    languages: [json]
    paths:
      include:
        - "package.json"
        - "**/package.json"
    pattern-regex: '"(dependencies|devDependencies)"\s*:\s*\{'
    metadata:
      finding_kind: Dependency
      rule_type: dependency_discovery
      category: dependencies
      technology: [nodejs, npm, javascript, typescript]
      target_files: ["package.json", "**/package.json"]
      extracts:
        package_manager: npm
        language: Node.js
        package: $PACKAGE
        version: $VERSION
      description: |
        Detects npm package dependencies from package.json files.
        Extracts package name and declared version from dependencies and devDependencies.
