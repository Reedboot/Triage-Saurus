rules:
  - id: context-oci-container-registry
    message: |
      Oracle Cloud Infrastructure Container Registry detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "oci_artifacts_container_repository" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*oci[_-]?artifacts[_-]?container[_-]?repository.*"
    metadata:
      finding_kind: Asset
      asset_provider: oracle
      rule_type: context_discovery
      category: infrastructure
      subcategory: container
      technology: [terraform, oci, container]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Container Registry
        resource_type: oci_artifacts_container_repository
        resource_name: $NAME
        properties:
          - name: display_name
            pattern: display_name = "$NAME"
          - name: compartment_id
            pattern: compartment_id = "$COMPARTMENT_ID"
          - name: is_public
            pattern: is_public = "$IS_PUBLIC"
    description: |
      Detects Container Registry resources in Oracle Cloud Infrastructure Terraform configurations.
