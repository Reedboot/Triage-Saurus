rules:
  - id: context-oci-identity-policy
    message: |
      Oracle Cloud Infrastructure Identity Policy detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "oci_identity_policy" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*oci[_-]?identity[_-]?policy.*"
    metadata:
      finding_kind: Asset
      asset_provider: oracle
      rule_type: context_discovery
      category: infrastructure
      subcategory: iam
      technology: [terraform, oci, iam]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Identity Policy
        resource_type: oci_identity_policy
        resource_name: $NAME
        properties:
          - name: name
            pattern: name = "$POLICY_NAME"
          - name: compartment_id
            pattern: compartment_id = "$COMPARTMENT_ID"
    description: |
      Detects Identity Policy resources in Oracle Cloud Infrastructure Terraform configurations.
