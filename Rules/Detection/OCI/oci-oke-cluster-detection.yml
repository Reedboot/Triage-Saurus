rules:
  - id: context-oci-oke-cluster
    message: |
      Oracle Cloud Infrastructure OKE Cluster detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "oci_containerengine_cluster" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*oci[_-]?containerengine[_-]?cluster.*"
    metadata:
      finding_kind: Asset
      asset_provider: oci
      rule_type: context_discovery
      category: infrastructure
      subcategory: container
      technology: [terraform, oci, container]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: OKE Cluster
        resource_type: oci_containerengine_cluster
        resource_name: $NAME
        properties:
          - name: name
            pattern: name = "$CLUSTER_NAME"
          - name: compartment_id
            pattern: compartment_id = "$COMPARTMENT_ID"
          - name: vcn_id
            pattern: vcn_id = "$VCN_ID"
    description: |
      Detects OKE Cluster resources in Oracle Cloud Infrastructure Terraform configurations.
