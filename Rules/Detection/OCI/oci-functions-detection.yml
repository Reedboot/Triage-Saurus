rules:
  - id: context-oci-functions
    message: |
      Oracle Cloud Infrastructure Functions Application detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "oci_functions_application" $NAME {
            ...
          }
      - pattern: |
          resource "oci_functions_function" $NAME {
            ...
            application_id = $APP_ID
            ...
          }
      - pattern: |
          resource "oci_functions_function" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*oci[_-]?functions.*"
    metadata:
      finding_kind: Asset
      asset_provider: oracle
      rule_type: context_discovery
      category: infrastructure
      subcategory: serverless
      technology: [terraform, oci, serverless]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Functions Application
        resource_type: oci_functions_application
        resource_name: $NAME
        properties:
          - name: display_name
            pattern: display_name = "$NAME"
          - name: compartment_id
            pattern: compartment_id = "$COMPARTMENT_ID"
          - name: application_id
            pattern: application_id = "$APP_ID"
          - name: image
            pattern: image = "$IMAGE"
    description: |
      Detects Functions Application resources in Oracle Cloud Infrastructure Terraform configurations.
