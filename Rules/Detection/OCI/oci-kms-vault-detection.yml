rules:
  - id: context-oci-kms-vault
    message: |
      Oracle Cloud Infrastructure KMS Vault detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "oci_kms_vault" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*oci[_-]?kms[_-]?vault.*"
    metadata:
      finding_kind: Asset
      asset_provider: oci
      rule_type: context_discovery
      category: infrastructure
      subcategory: kms
      technology: [terraform, oci, kms]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: KMS Vault
        resource_type: oci_kms_vault
        resource_name: $NAME
        properties:
          - name: display_name
            pattern: display_name = "$NAME"
          - name: compartment_id
            pattern: compartment_id = "$COMPARTMENT_ID"
          - name: vault_type
            pattern: vault_type = "$VAULT_TYPE"
    description: |
      Detects KMS Vault resources in Oracle Cloud Infrastructure Terraform configurations.
