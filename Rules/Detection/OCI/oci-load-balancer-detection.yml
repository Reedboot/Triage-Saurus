rules:
  - id: context-oci-load-balancer
    message: |
      Oracle Cloud Infrastructure Load Balancer detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "oci_load_balancer_load_balancer" $NAME {
            ...
          }
      - pattern: |
          resource "oci_network_load_balancer_network_load_balancer" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*oci[_-]?(network[_-])?load[_-]?balancer.*"
    metadata:
      finding_kind: Asset
      asset_provider: oci
      rule_type: context_discovery
      category: infrastructure
      subcategory: network
      technology: [terraform, oci, network]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Load Balancer
        resource_type: oci_load_balancer_load_balancer
        resource_name: $NAME
        properties:
          - name: display_name
            pattern: display_name = "$NAME"
          - name: compartment_id
            pattern: compartment_id = "$COMPARTMENT_ID"
          - name: is_private
            pattern: is_private = "$IS_PRIVATE"
    description: |
      Detects Load Balancer resources in Oracle Cloud Infrastructure Terraform configurations.
