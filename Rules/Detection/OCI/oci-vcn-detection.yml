rules:
  - id: context-oci-vcn
    message: |
      Oracle Cloud Infrastructure Virtual Cloud Network detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "oci_core_vcn" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*oci[_-]?core[_-]?vcn.*"
    metadata:
      finding_kind: Asset
      asset_provider: oci
      rule_type: context_discovery
      category: infrastructure
      subcategory: network
      technology: [terraform, oci, network]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Virtual Cloud Network
        resource_type: oci_core_vcn
        resource_name: $NAME
        properties:
          - name: display_name
            pattern: display_name = "$NAME"
          - name: cidr_block
            pattern: cidr_block = "$CIDR"
          - name: compartment_id
            pattern: compartment_id = "$COMPARTMENT_ID"
    description: |
      Detects Virtual Cloud Network resources in Oracle Cloud Infrastructure Terraform configurations.
