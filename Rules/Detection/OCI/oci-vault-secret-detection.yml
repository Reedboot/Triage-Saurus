rules:
  - id: context-oci-vault-secret
    message: |
      Oracle Cloud Infrastructure Vault Secret detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "oci_vault_secret" $NAME {
            ...
            vault_id = $VAULT_ID
            ...
          }
      - pattern: |
          resource "oci_vault_secret" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*oci[_-]?vault[_-]?secret.*"
    metadata:
      finding_kind: Asset
      asset_provider: oci
      rule_type: context_discovery
      category: infrastructure
      subcategory: kms
      technology: [terraform, oci, kms]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: Vault Secret
        resource_type: oci_vault_secret
        resource_name: $NAME
        properties:
          - name: vault_id
            pattern: vault_id = "$VAULT_ID"
          - name: secret_name
            pattern: secret_name = "$SECRET_NAME"
          - name: compartment_id
            pattern: compartment_id = "$COMPARTMENT_ID"
    description: |
      Detects Vault Secret resources in Oracle Cloud Infrastructure Terraform configurations.
