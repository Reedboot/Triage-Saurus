rules:
  - id: context-oci-mysql
    message: |
      Oracle Cloud Infrastructure MySQL DB System detected in infrastructure.
    severity: INFO
    languages: [terraform, hcl]
    pattern-either:
      - pattern: |
          resource "oci_mysql_mysql_db_system" $NAME {
            ...
          }
      - patterns:
          - pattern: |
              module $MOD {
                ...
                source = $SRC
                ...
              }
          - metavariable-regex:
              metavariable: $SRC
              regex: "(?i).*oci[_-]?mysql.*"
    metadata:
      finding_kind: Asset
      asset_provider: oci
      rule_type: context_discovery
      category: infrastructure
      subcategory: database
      technology: [terraform, oci, database]
      target_files: ["*.tf", "**/*.tf"]
      extracts:
        service_type: MySQL DB System
        resource_type: oci_mysql_mysql_db_system
        resource_name: $NAME
        properties:
          - name: display_name
            pattern: display_name = "$NAME"
          - name: compartment_id
            pattern: compartment_id = "$COMPARTMENT_ID"
          - name: shape_name
            pattern: shape_name = "$SHAPE"
    description: |
      Detects MySQL DB System resources in Oracle Cloud Infrastructure Terraform configurations.
