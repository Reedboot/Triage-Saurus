[pytest]
testpaths =
    Scripts/Analyze
    Scripts/Context
    Scripts/Generate
    Scripts/Scan
    Scripts/Validate
    Scripts/Persist
    Scripts/Tests
    web
norecursedirs =
    .venv
    .venv-cozo
    .venv-ci
    node_modules
    __pycache__
    .git
    .pytest_cache
    Output
    Intake
    TestsCorpus
python_files = test_*.py
python_classes = Test*
python_functions = test_*
