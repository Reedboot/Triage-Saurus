name: OpenGrep Security Scan

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install opengrep
        run: |
          sudo curl -sSL https://github.com/opengrep/opengrep/releases/latest/download/opengrep_manylinux_x86 \
            -o /usr/local/bin/opengrep
          sudo chmod +x /usr/local/bin/opengrep

      - name: Verify opengrep installation
        run: opengrep --version

      - name: Rule Syntax Check
        run: |
          opengrep scan --validate --config Rules/

      - name: Context Extraction Test
        run: |
          opengrep scan --config Rules/ "Sample Findings/Repos/TestRepo" \
            --json -o context.json

      - name: Extraction Quality Gate
        run: |
          count=$(jq '.results | length' context.json) || { echo "Error: Failed to parse context.json"; exit 1; }
          echo "Findings extracted: $count"
          if [ "$count" -eq 0 ]; then
            echo "Quality Gate Failed: Zero context markers extracted from TestRepo"
            exit 1
          fi

      - name: Upload context.json artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: context-json
          path: context.json
