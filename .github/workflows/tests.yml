name: OpenGrep Security Scan

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install opengrep
        run: |
          sudo curl -sSL https://github.com/opengrep/opengrep/releases/latest/download/opengrep_manylinux_x86 -o /usr/local/bin/opengrep
          sudo chmod +x /usr/local/bin/opengrep

      - name: Verify opengrep installation
        run: opengrep --version

      - name: Set up mock environment and expanded corpus
        run: |
          # Prepare a corpus of sample repos to exercise more rules during CI
          REPOS_ROOT="$(cd "$GITHUB_WORKSPACE/.." && pwd)"
          CORPUS_DIR="$GITHUB_WORKSPACE/TestsCorpus"
          mkdir -p "$CORPUS_DIR"

          # Copy the existing TestRepo into the corpus
          cp -r "$GITHUB_WORKSPACE/Sample Findings/Repos/TestRepo" "$CORPUS_DIR/TestRepo" || true

          # Clone a couple of tiny public sample repos (different languages) to increase coverage
          git clone --depth 1 https://github.com/githubtraining/hellogitworld.git "$CORPUS_DIR/hellogitworld" || true
          git clone --depth 1 https://github.com/octocat/Hello-World.git "$CORPUS_DIR/hello-world" || true

          # Place TestRepo where batch_scan_repos.sh expects it (ensure backward compatibility)
          cp -r "$CORPUS_DIR/TestRepo" "$REPOS_ROOT/TestRepo" || true

          # Tell the script which repos to scan (keep TestRepo entry for existing scripts)
          echo "TestRepo" > "$GITHUB_WORKSPACE/Intake/ReposToScan.txt"

          # Ensure the Learning output directory exists so the DB can be written.
          mkdir -p "$GITHUB_WORKSPACE/Output/Learning"

      - name: Validate Opengrep rules and sample scan against expanded corpus
        working-directory: ${{ github.workspace }}
        run: |
          OUTPUT_FILE="opengrep_output.json"

          # Run opengrep against the expanded corpus to exercise more rules
          opengrep scan --config Rules/ --json --output "$OUTPUT_FILE" "$GITHUB_WORKSPACE/TestsCorpus" || true

          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "❌ opengrep did not produce an output file: $OUTPUT_FILE"
            exit 1
          fi

          python3 - <<'PYCODE'
import json, sys
with open("opengrep_output.json", "r", encoding="utf-8") as f:
    data = json.load(f)
errors = data.get("errors", [])
results = data.get("results", [])
print(f"opengrep findings: {len(results)}, errors: {len(errors)}")
if errors:
    print("❌ opengrep reported rule errors:")
    print(json.dumps(errors, indent=2))
    sys.exit(1)
if len(results) == 0:
    print("❌ opengrep produced zero findings for the corpus; aborting")
    sys.exit(1)
print("✅ opengrep rules validated and sample scan produced results")
PYCODE

      - name: Upload opengrep output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opengrep-output
          path: opengrep_output.json
          if-no-files-found: warn



  init-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run init_cozo_learning test
        run: ./Scripts/tests/test_run_cozo_init.sh
        shell: bash

